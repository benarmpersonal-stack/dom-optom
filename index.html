function relabelStops() {
  __mapState.stops.forEach((s, i) => { s.letter = letterFor(i); });
}

function moveStop(idx, dir) {
  const stops = __mapState.stops;
  const target = idx + dir;
  if (target < 0 || target >= stops.length) return;
  [stops[idx], stops[target]] = [stops[target], stops[idx]];
  relabelStops();
  // Invalidate computed schedule since order changed
  __mapState.schedule = null;
  __mapState.drives = [];
  saveRoute();
  if (__map) { placeMarkers(); }
  renderDailyInput();
}

function removeStop(idx) {
  const stops = __mapState.stops;
  if (idx < 0 || idx >= stops.length) return;
  const removed = stops[idx];
  if (!confirm(`Remove stop ${removed.letter} — ${removed.address}?`)) return;
  stops.splice(idx, 1);
  relabelStops();
  __mapState.schedule = null;
  __mapState.drives = [];
  saveRoute();
  if (__map) {
    __mapState.markers.forEach(m => __map.removeLayer(m));
    __mapState.markers = [];
    placeMarkers();
  }
  renderDailyInput();
}

function clearRoute() {
  __mapState.stops = [];
  __mapState.schedule = null;
  __mapState.drives = [];
  __mapState.trafficSource = null;
  __mapState.home = null;
  __mapState.homeReturn = null;
  if (__map) {
    __mapState.markers.forEach(m => __map.removeLayer(m));
    __mapState.markers = [];
    if (__mapState.homeMarker) { __map.removeLayer(__mapState.homeMarker); __mapState.homeMarker = null; }
  }
  const ta = document.getElementById('bulk-addr');
  if (ta) ta.value = '';
  const status = document.getElementById('parse-status');
  if (status) status.textContent = '';
  clearRouteStorage();
  renderStops();
  if (__map) __map.setView([54.0, -2.5], 6);
  toast('Route cleared');
}

/* ---- Smart address parser ----
 * Handles forwarded email text, prose, bullets, numbered lists, and CSV-ish lines.
 * Strategy:
 *   1. Strip common email cruft (>, signatures after "--", quoted blocks).
 *   2. Split on lines AND on sentence-like commas/semicolons.
 *   3. For each candidate, look for the UK postcode pattern (very strong signal)
 *      OR a number-then-street-name pattern.
 *   4. Trim names/labels like "Mrs Jones at" before the street number.
 */
function parseAddresses(raw) {
  if (!raw) return [];
  // Strip quoted email lines and common preamble
  let text = raw
    .replace(/\r\n/g, '\n')
    .split('\n')
    .filter(line => !/^>/.test(line.trim()))            // drop quoted lines
    .filter(line => !/^(from|to|cc|bcc|subject|sent|date):/i.test(line.trim()))
    .join('\n');
  // Cut off email signature
  const sigIdx = text.search(/\n--\s*\n|\nSent from my /i);
  if (sigIdx > 0) text = text.slice(0, sigIdx);

  // UK postcode regex (strict-ish): A[A]N[N|A] NAA
  const POSTCODE = /\b([A-Z]{1,2}\d{1,2}[A-Z]?)\s?(\d[A-Z]{2})\b/gi;
  // Find all postcodes; for each, walk backwards to capture the address.
  const found = [];
  const seen = new Set();
  let m;
  // Reset regex
  POSTCODE.lastIndex = 0;
  const flat = text.replace(/\s+/g, ' ');
  // Boundary patterns — when walking back from a postcode, stop at the RIGHTMOST of these.
  // Order by specificity; we scan all and take the closest to the postcode.
  const BOUNDARY_RE = /([.;:!?]\s|—\s|–\s|"\s|\bplease\s+visit\s+|\bplease\s+see\s+|\bvisit\s+|\bsee\s+|\bappointment[s]?\s+(?:at|for)\s+|\bnext\s+(?:visit|stop|appointment)\s+(?:at|is)?\s*|\bthen\s+(?:pop\s+over\s+to|head\s+to|to|at)\s+|\bthen\s+|\band\s+(?:then\s+)?(?:pop\s+over\s+to|head\s+to|to|at)\s+|\bafter\s+that[,\s]+(?:there'?s?\s+(?:an?\s+)?(?:appointment\s+)?(?:at\s+)?)?|\bat\s+|\bto\s+)/gi;
  let lastEnd = 0;
  while ((m = POSTCODE.exec(flat)) !== null) {
    const end = m.index + m[0].length;
    // Clamp back-window to start no earlier than the previous postcode's end.
    const winStart = Math.max(lastEnd, m.index - 160);
    const backWindow = flat.slice(winStart, m.index);
    // Find ALL boundary matches in the back-window, pick the RIGHTMOST.
    BOUNDARY_RE.lastIndex = 0;
    let bestBoundaryEnd = 0; // index INTO backWindow where address starts
    let bm;
    while ((bm = BOUNDARY_RE.exec(backWindow)) !== null) {
      bestBoundaryEnd = bm.index + bm[0].length;
      // Avoid infinite loop on zero-width
      if (bm.index === BOUNDARY_RE.lastIndex) BOUNDARY_RE.lastIndex++;
    }
    const candidate = cleanCandidate(backWindow.slice(bestBoundaryEnd) + flat.slice(m.index, end));
    if (candidate && !seen.has(candidate.toLowerCase())) {
      seen.add(candidate.toLowerCase());
      found.push(candidate);
    }
    lastEnd = end;
  }

  // Fallback: line-based parsing for inputs without postcodes
  if (found.length === 0) {
    const lines = text.split('\n').map(stripLineNumbering).map(s => s.trim()).filter(Boolean);
    for (const line of lines) {
      // Likely an address if it has a digit + comma OR starts with a number
      if (/^\d+[\s,]/.test(line) || /\d/.test(line) && /,/.test(line)) {
        const cleaned = cleanCandidate(line);
        if (cleaned && !seen.has(cleaned.toLowerCase())) {
          seen.add(cleaned.toLowerCase());
          found.push(cleaned);
        }
      }
    }
  }

  return found;
}

function cleanCandidate(s) {
  let prev;
  // Strip leading prose iteratively (greetings, names, prepositions).
  do {
    prev = s;
    s = s
      .replace(/^\s*[-•*·–—]+\s*/, '')
      .replace(/^\s*\d+[.)]\s*/, '')
      .replace(/^(hi|hello|hey|dear)\s+\S+[,!.\s-]+/i, '')
      .replace(/^(hope\s+you'?re?\s+well[!,.\s-]*)/i, '')
      .replace(/^(please\s+(?:can\s+you\s+)?(?:visit|see|pop\s+over\s+to|head\s+to|drop\s+in\s+(?:on|at))\s+)/i, '')
      .replace(/^((?:can\s+you\s+)?(?:visit|see|pop\s+over\s+to|head\s+to)\s+)/i, '')
      .replace(/^(mr|mrs|ms|miss|dr|sir|lord|lady|prof|mr\.|mrs\.|ms\.)\s+\S+\s+(?:at|of|in|—|-)\s+/i, '')
      .replace(/^(mr|mrs|ms|miss|dr|sir|lord|lady|prof)\s+\S+[,\s]+/i, '')
      .replace(/^(then|after|next|first|second|third|finally|also|and)\s+/i, '')
      .replace(/^(at|to|in|for)\s+/i, '')
      .replace(/^there'?s?\s+(?:an?\s+)?(?:appointment\s+)?(?:at\s+)?/i, '')
      .replace(/^[\s,;:'"!?]+/, '');
  } while (s !== prev);
  return s
    .replace(/[\s,;:'"]+$/, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function stripLineNumbering(s) {
  return s.replace(/^\s*[-•*·–—]+\s*/, '').replace(/^\s*\d+[.)]\s*/, '');
}

async function parseAndPlot() {
  const raw = document.getElementById('bulk-addr').value;
  const addrs = parseAddresses(raw);
  const times = parseTimesNearAddresses(raw, addrs);
  const status = document.getElementById('parse-status');
  if (addrs.length === 0) {
    status.innerHTML = '<span style="color: var(--danger);">No addresses found. Make sure each address has a UK postcode, or one address per line.</span>';
    return;
  }
  if (addrs.length > 50) {
    toast('Limit 50 addresses per batch.', 'error'); return;
  }
  const timesFound = times.filter(Boolean).length;
  status.innerHTML = `Parsed <strong>${addrs.length}</strong> address${addrs.length===1?'':'es'}${timesFound ? ` and <strong>${timesFound}</strong> appointment time${timesFound===1?'':'s'}` : ''}. Geocoding (~1s each)…`;

  __mapState.stops = addrs.map((address, i) => ({
    letter: letterFor(i), address, lat: null, lng: null, display: null,
    time: times[i] || '',
  }));
  __mapState.schedule = null;
  __mapState.drives = [];
  __mapState.trafficSource = null;
  renderStops();
  saveRoute();
  await geocodeStops();
  status.innerHTML = `Plotted <strong>${__mapState.stops.filter(s => s.lat != null).length}</strong> of <strong>${addrs.length}</strong>.`;
  renderStops();
  fitMap();
  saveRoute();
}

/* ---- Time parsing ----
 * Find appointment times in raw text and pair each one to its NEAREST address
 * (by character distance, with each time consumed only once).
 * Recognises: 10:30am, 10.30am, 2pm, 14:30, 09:00
 */
function parseTimesNearAddresses(raw, addresses) {
  const out = addresses.map(() => '');
  if (!raw || addresses.length === 0) return out;
  const flat = raw.replace(/\s+/g, ' ');
  const flatLower = flat.toLowerCase();

  // Locate each address's character span in the flat text.
  const addrSpans = addresses.map(a => {
    if (!a) return null;
    const idx = flatLower.indexOf(a.toLowerCase());
    if (idx < 0) return null;
    return { start: idx, end: idx + a.length, mid: idx + Math.floor(a.length / 2) };
  });

  // Find every plausible time match in the text.
  const times = findAllTimes(flat);

  // For each time, assign to the address with the closest mid-point.
  // First-come-first-served: each time picks one address, but each address
  // keeps only the time CLOSEST to its midpoint among the times it attracts.
  const bestPerAddr = addrSpans.map(() => ({ dist: Infinity, value: '' }));
  for (const t of times) {
    let bestIdx = -1, bestDist = Infinity;
    for (let i = 0; i < addrSpans.length; i++) {
      const span = addrSpans[i];
      if (!span) continue;
      // Distance: 0 if time is inside address span (rare), else gap to nearest edge.
      let d;
      if (t.pos >= span.start && t.pos <= span.end) d = 0;
      else if (t.pos < span.start) d = span.start - t.pos;
      else d = t.pos - span.end;
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    if (bestIdx >= 0 && bestDist < bestPerAddr[bestIdx].dist) {
      bestPerAddr[bestIdx] = { dist: bestDist, value: t.hhmm };
    }
  }
  for (let i = 0; i < addresses.length; i++) {
    out[i] = bestPerAddr[i].value;
  }
  return out;
}

function findAllTimes(str) {
  const RE = /\b(\d{1,2})(?:[:.](\d{2}))?\s*(am|pm)?\b/gi;
  const out = [];
  let m;
  while ((m = RE.exec(str)) !== null) {
    let h = parseInt(m[1], 10);
    const min = m[2] ? parseInt(m[2], 10) : 0;
    const ampm = (m[3] || '').toLowerCase();
    if (h > 24 || min > 59) continue;
    // Reject bare integers without am/pm AND without :MM (could be house numbers).
    if (!ampm && !m[2]) continue;
    if (ampm) {
      if (h === 12) h = ampm === 'am' ? 0 : 12;
      else if (ampm === 'pm') h += 12;
    }
    if (h > 23) continue;
    out.push({
      pos: m.index,
      hhmm: `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}`,
    });
  }
  return out;
}

async function geocodeStops() {
  const cache = JSON.parse(Store.getItem(GEOCODE_CACHE_KEY) || '{}');
  for (const stop of __mapState.stops) {
    if (stop.lat != null && stop.lng != null) continue; // already located
    const key = stop.address.toLowerCase();
    if (cache[key]) {
      stop.lat = cache[key].lat;
      stop.lng = cache[key].lng;
      stop.display = cache[key].display;
      stop.locateFailed = false;
      renderStops(); placeMarkers();
      continue;
    }
    let located = false;
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(stop.address)}`;
      const r = await fetch(url, {
        headers: { 'Accept': 'application/json', 'Accept-Language': 'en-GB' },
      });
      if (r.ok) {
        const data = await r.json();
        if (data && data[0]) {
          stop.lat = parseFloat(data[0].lat);
          stop.lng = parseFloat(data[0].lon);
          stop.display = data[0].display_name;
          stop.locateFailed = false;
          cache[key] = { lat: stop.lat, lng: stop.lng, display: stop.display };
          located = true;
        }
      }
    } catch (e) {
      console.error('Geocode failed', stop.address, e);
    }
    if (!located) {
      stop.locateFailed = true;
    }
    renderStops(); placeMarkers();
    await new Promise(r => setTimeout(r, 1100)); // be polite to Nominatim
  }
  try { Store.setItem(GEOCODE_CACHE_KEY, JSON.stringify(cache)); } catch {}
}

// Build a stable cache key from the current home + stops (lat/lng + order)
// so we don't re-fetch OSRM for unchanged routes.
function __routeCacheKey() {
  const prefs = getPrefs();
  const parts = [];
  if (prefs.homeLat != null && prefs.homeLng != null && prefs.includeHomeOnMap !== false) {
    parts.push(`H:${prefs.homeLat.toFixed(5)},${prefs.homeLng.toFixed(5)}`);
  }
  for (const s of __mapState.stops) {
    if (s.lat != null && s.lng != null) parts.push(`${s.letter}:${s.lat.toFixed(5)},${s.lng.toFixed(5)}`);
  }
  return parts.join('|');
}

// Draw or remove the road-following route polyline based on showRouteOnMap pref.
// Uses OSRM's free public router (project-osrm.org). Cached per route signature.
async function updateRoutePolyline() {
  if (!__map) return;
  // Always tear down the existing layer first.
  if (__mapState.routeLayer) {
    __map.removeLayer(__mapState.routeLayer);
    __mapState.routeLayer = null;
  }
  const prefs = getPrefs();
  if (!prefs.showRouteOnMap) return;
  const coords = [];
  if (prefs.homeLat != null && prefs.homeLng != null && prefs.includeHomeOnMap !== false) {
    coords.push([prefs.homeLng, prefs.homeLat]);
  }
  for (const s of __mapState.stops) {
    if (s.lat != null && s.lng != null) coords.push([s.lng, s.lat]);
  }
  if (coords.length < 2) return;
  const key = __routeCacheKey();
  let routeLatLngs = null;
  if (__mapState.routeCacheKey === key && Array.isArray(__mapState.routeCacheCoords)) {
    routeLatLngs = __mapState.routeCacheCoords;
  } else {
    try {
      const coordStr = coords.map(([lng, lat]) => `${lng},${lat}`).join(';');
      const url = `https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=full&geometries=geojson`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('OSRM ' + res.status);
      const data = await res.json();
      const geom = data?.routes?.[0]?.geometry?.coordinates;
      if (!Array.isArray(geom) || geom.length < 2) throw new Error('No route geometry');
      // OSRM returns [lng, lat]; Leaflet expects [lat, lng].
      routeLatLngs = geom.map(([lng, lat]) => [lat, lng]);
      __mapState.routeCacheKey = key;
      __mapState.routeCacheCoords = routeLatLngs;
    } catch (e) {
      console.warn('Route fetch failed, falling back to straight line:', e);
      // Fallback: connect points with straight segments so the user still sees something.
      routeLatLngs = coords.map(([lng, lat]) => [lat, lng]);
    }
  }
  __mapState.routeLayer = L.polyline(routeLatLngs, {
    color: '#1f7a85', weight: 4, opacity: 0.8,
  }).addTo(__map);
}

function placeMarkers() {
  if (!__map) return;
  __mapState.markers.forEach(m => __map.removeLayer(m));
  __mapState.markers = [];
  // Home marker (house pin) when configured AND user has chosen to display it
  if (__mapState.homeMarker) { __map.removeLayer(__mapState.homeMarker); __mapState.homeMarker = null; }
  const prefs = getPrefs();
  if (prefs.homeLat != null && prefs.homeLng != null && prefs.includeHomeOnMap !== false) {
    const html = `<svg viewBox="0 0 32 42" width="32" height="42" xmlns="http://www.w3.org/2000/svg" style="display:block;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.3));">
      <path d="M16 0C7.16 0 0 7.16 0 16c0 11 16 24 16 24s16-13 16-24C32 7.16 24.84 0 16 0z" fill="#0f4f57"/>
      <path d="M9 16l7-6 7 6v7a1 1 0 0 1-1 1h-3v-5h-6v5h-3a1 1 0 0 1-1-1z" fill="#fff"/>
    </svg>`;
    const icon = L.divIcon({ className: 'pin-icon home-pin', iconSize: [32, 42], iconAnchor: [16, 40], popupAnchor: [0, -38], html });
    const m = L.marker([prefs.homeLat, prefs.homeLng], { icon }).addTo(__map);
    m.bindPopup(`<div style="font-family: Inter, sans-serif; font-size: 13px;"><strong style="display: block; margin-bottom: 4px;">Home</strong><span style="color: #71717a; font-size: 12px;">${escapeHTML(prefs.homeAddress || '')}</span></div>`);
    __mapState.homeMarker = m;
  }
  for (const stop of __mapState.stops) {
    if (stop.lat == null || stop.lng == null) continue;
    const w = stop.letter.length > 1 ? 36 : 32;
    const h = 42;
    const html = `<svg viewBox="0 0 32 42" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" style="display:block;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.3));">
      <path d="M16 0C7.16 0 0 7.16 0 16c0 11 16 24 16 24s16-13 16-24C32 7.16 24.84 0 16 0z" fill="#1f7a85"/>
      <circle cx="16" cy="16" r="10.5" fill="#fff"/>
      <text x="16" y="20.5" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#14545d">${stop.letter}</text>
    </svg>`;
    const icon = L.divIcon({
      className: 'pin-icon',
      iconSize: [w, h],
      iconAnchor: [w/2, h-2],
      popupAnchor: [0, -h+4],
      html,
    });
    const marker = L.marker([stop.lat, stop.lng], { icon }).addTo(__map);
    const safeAddr = escapeHTML(stop.address);
    const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(stop.address)}&travelmode=driving`;
    marker.bindPopup(`
      <div style="font-family: Inter, sans-serif; font-size: 13px;">
        <strong style="display: block; margin-bottom: 4px;">Stop ${stop.letter}</strong>
        <span style="color: #71717a; font-size: 12px;">${safeAddr}</span><br>
        <a href="${navUrl}" target="_blank" style="color: #1f7a85;">Open in Google Maps →</a>
      </div>`);
    __mapState.markers.push(marker);
  }
  // Refresh the route polyline whenever markers are redrawn so the line
  // tracks new stops, deleted stops, or home-pin toggle changes.
  updateRoutePolyline();
}

function fitMap() {
  if (!__map) return;
  const valid = __mapState.stops.filter(s => s.lat != null);
  const points = valid.map(s => [s.lat, s.lng]);
  const prefs = getPrefs();
  if (prefs.homeLat != null && prefs.homeLng != null && prefs.includeHomeOnMap !== false) points.push([prefs.homeLat, prefs.homeLng]);
  if (points.length === 0) return;
  if (points.length === 1) {
    __map.setView(points[0], 13);
  } else {
    const bounds = L.latLngBounds(points);
    __map.fitBounds(bounds, { padding: [40, 40] });
  }
}

/* ============================================================================
 * SCHEDULE & DRIVING TIMES
 * ============================================================================ */

function parseHHMM(s) {
  if (!s) return null;
  const m = /^(\d{1,2}):(\d{2})$/.exec(s);
  if (!m) return null;
  const h = parseInt(m[1], 10), mi = parseInt(m[2], 10);
  if (h < 0 || h > 23 || mi < 0 || mi > 59) return null;
  return h * 60 + mi;
}
function formatHHMM(mins) {
  while (mins < 0) mins += 24 * 60;
  mins = mins % (24 * 60);
  const h = Math.floor(mins / 60), m = mins % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}
function formatTime12(hhmm) {
  const t = parseHHMM(hhmm);
  if (t == null) return hhmm;
  let h = Math.floor(t / 60); const m = t % 60;
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12; if (h === 0) h = 12;
  return `${h}${m ? ':' + String(m).padStart(2, '0') : ''}${ampm}`;
}

function isPeakUKMinutes(mins) {
  // 7:00–9:00 (420–540) and 16:00–18:00 (960–1080)
  return (mins >= 420 && mins < 540) || (mins >= 960 && mins < 1080);
}

function applyBuffer(seconds, arrivalMins, prefs) {
  if (prefs.bufferMode === 'fixed') {
    return seconds * (1 + prefs.bufferPct / 100);
  }
  // smart
  const peak = isPeakUKMinutes(arrivalMins);
  return seconds * (peak ? 1.30 : 1.15);
}

async function osrmDriveSeconds(a, b) {
  const url = `https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=false`;
  const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if (!r.ok) throw new Error(`OSRM ${r.status}`);
  const data = await r.json();
  if (!data.routes || !data.routes[0]) throw new Error('OSRM: no route');
  return { seconds: data.routes[0].duration, meters: data.routes[0].distance };
}

async function tomtomDriveSeconds(a, b, key) {
  const url = `https://api.tomtom.com/routing/1/calculateRoute/${a.lat},${a.lng}:${b.lat},${b.lng}/json?key=${encodeURIComponent(key)}&traffic=true&computeTravelTimeFor=all&travelMode=car`;
  const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
  if (!r.ok) throw new Error(`TomTom ${r.status}`);
  const data = await r.json();
  const summary = data.routes && data.routes[0] && data.routes[0].summary;
  if (!summary) throw new Error('TomTom: no route summary');
  // travelTimeInSeconds already includes live traffic when traffic=true
  // delaySeconds = with-traffic minus free-flow time (positive when slower than usual).
  const free = summary.noTrafficTravelTimeInSeconds;
  const live = summary.travelTimeInSeconds;
  const delay = (typeof free === 'number' && typeof live === 'number')
    ? Math.max(0, live - free)
    : null;
  return { seconds: live, meters: summary.lengthInMeters, delaySeconds: delay };
}

function metersToMiles(m) { return m == null ? null : m / 1609.344; }

async function driveLeg(a, b, prefs) {
  // Returns { seconds, meters, source, delaySeconds } using TomTom (if key) with OSRM fallback.
  let leg = null, source = null;
  if (prefs.tomtomKey) {
    try { leg = await tomtomDriveSeconds(a, b, prefs.tomtomKey); source = 'tomtom'; }
    catch (e) { console.warn('TomTom failed, falling back to OSRM:', e); }
  }
  if (!leg) {
    leg = await osrmDriveSeconds(a, b);
    source = 'osrm';
  }
  return { seconds: leg.seconds, meters: leg.meters, source, delaySeconds: leg.delaySeconds != null ? leg.delaySeconds : null };
}

async function computeDriveMatrix(stops, prefs, statusEl) {
  // returns { drives: [{seconds, meters, source}], source: 'tomtom'|'osrm'|'mixed' }
  const drives = [];
  let usedTomtom = false, usedOsrm = false;
  for (let i = 1; i < stops.length; i++) {
    const a = stops[i - 1], b = stops[i];
    if (a.lat == null || b.lat == null) {
      drives.push({ seconds: null, meters: null, source: null, error: 'Missing coordinates' });
      continue;
    }
    if (statusEl) statusEl.textContent = `Calculating drive ${i} of ${stops.length - 1}…`;
    try {
      const leg = await driveLeg(a, b, prefs);
      drives.push(leg);
      if (leg.source === 'tomtom') usedTomtom = true;
      else if (leg.source === 'osrm') usedOsrm = true;
    } catch (e) {
      console.error('Routing failed:', e);
      drives.push({ seconds: null, meters: null, source: null, error: e.message || 'Routing failed' });
    }
  }
  let overall;
  if (usedTomtom && !usedOsrm) overall = 'tomtom';
  else if (usedTomtom && usedOsrm) overall = 'mixed';
  else overall = 'osrm';
  return { drives, source: overall };
}

async function computeSchedule() {
  const status = document.getElementById('schedule-status');
  const badge = document.getElementById('traffic-badge');
  const stops = __mapState.stops;
  if (!stops.length) { status.textContent = 'No stops yet.'; return; }
  const withTime = stops.filter(s => s.time);
  if (!withTime.length) {
    status.innerHTML = '<span style="color: var(--danger);">Add at least one appointment time.</span>';
    return;
  }
  if (stops.some(s => s.lat == null)) {
    status.innerHTML = '<span style="color: var(--danger);">Some stops are still locating. Try again in a moment.</span>';
    return;
  }
  const prefs = getPrefs();
  status.textContent = 'Calculating drive times…';
  let matrix;
  try {
    matrix = await computeDriveMatrix(stops, prefs, status);
  } catch (e) {
    status.innerHTML = `<span style="color: var(--danger);">Routing failed: ${escapeHTML(e.message || String(e))}</span>`;
    return;
  }
  __mapState.drives = matrix.drives;
  __mapState.trafficSource = matrix.source;

  // Build schedule. Walk forward from each stop with a known appointment time.
  // For stops between known times, schedule is anchored to the next known time and works backward.
  const cushionMin = prefs.arrivalCushionMin || 5;
  const sched = stops.map(() => ({ departure: null, arrival: null, driveMin: null, delayMin: null, cushion: cushionMin, warn: false }));

  // Carry per-leg live-traffic delay (seconds) onto the destination stop.
  // A drive at index k goes from stop k to stop k+1, so sched[k+1].delayMin reflects
  // the inbound leg into that stop.
  for (let k = 1; k < stops.length; k++) {
    const d = matrix.drives && matrix.drives[k - 1];
    if (d && d.delaySeconds != null) {
      sched[k].delayMin = Math.round(d.delaySeconds / 60);
    }
  }

  // Semantics: sched[i].departure = "Leave by HH:MM heading to stop i".
  // For stop 0, that's "leave wherever you are now" (no preceding drive).
  // For stop i > 0, that's "depart stop i-1 by HH:MM to arrive at stop i on time".
  //
  // Pass 1: for each stop with an appointment time, compute arrival and the
  // departure time for the leg that ENDS at this stop.
  for (let i = 0; i < stops.length; i++) {
    if (!stops[i].time) continue;
    const apptMins = parseHHMM(stops[i].time);
    if (apptMins == null) continue;
    sched[i].arrival = apptMins - cushionMin; // arrive cushion-min early
    if (i === 0) {
      // No preceding drive — "leave by" is the arrival itself.
      sched[i].departure = formatHHMM(sched[i].arrival);
      sched[i].driveMin = null;
    } else {
      const drive = matrix.drives[i - 1];
      if (drive && drive.seconds != null) {
        const buffered = applyBuffer(drive.seconds, apptMins, prefs);
        const driveMin = Math.ceil(buffered / 60);
        sched[i].driveMin = driveMin;
        const depMins = sched[i].arrival - driveMin;
        sched[i].departure = formatHHMM(depMins);
        // Warn if the previous stop's own appointment time would force us
        // to leave that stop BEFORE the appointment itself (overrun risk).
        const prevAppt = parseHHMM(stops[i - 1].time || '');
        if (prevAppt != null && prevAppt > depMins) {
          sched[i].warn = true;
        }
      }
    }
  }
  // Pass 2: trailing stops without times — estimate arrival forward from
  // the latest known anchor and show it as the "leave by" entry.
  for (let i = 1; i < stops.length; i++) {
    if (sched[i].departure || stops[i].time) continue;
    // Anchor = previous stop's arrival (if known) else previous departure.
    const prevAnchorMins = sched[i - 1].arrival != null
      ? sched[i - 1].arrival
      : parseHHMM(sched[i - 1].departure || '');
    const drive = matrix.drives[i - 1];
    if (prevAnchorMins != null && drive && drive.seconds != null) {
      const buffered = applyBuffer(drive.seconds, prevAnchorMins, prefs);
      const driveMin = Math.ceil(buffered / 60);
      sched[i].driveMin = driveMin;
      sched[i].arrival = prevAnchorMins + driveMin;
      sched[i].departure = formatHHMM(prevAnchorMins);
    }
  }

  // Home leg: if a home location is configured, compute the drive from home
  // to the first stop and a corresponding leave-home time.
  let home = null;
  let homeOutMeters = null;
  if (prefs.homeLat != null && prefs.homeLng != null && stops.length > 0) {
    const first = stops[0];
    let leg = null;
    try {
      leg = await driveLeg({ lat: prefs.homeLat, lng: prefs.homeLng }, first, prefs);
    } catch (e) {
      console.error('Home leg routing failed:', e);
    }
    let leaveHome = null, driveMin = null, source = leg ? leg.source : null;
    if (leg && leg.seconds != null) {
      homeOutMeters = leg.meters;
      const firstSched = sched[0];
      const anchorMins = firstSched && firstSched.arrival != null
        ? firstSched.arrival
        : parseHHMM(prefs.departFromHome || '');
      if (anchorMins != null) {
        const buffered = applyBuffer(leg.seconds, anchorMins, prefs);
        driveMin = Math.ceil(buffered / 60);
        if (firstSched && firstSched.arrival != null) {
          leaveHome = formatHHMM(anchorMins - driveMin);
        } else {
          leaveHome = formatHHMM(anchorMins);
          if (firstSched) {
            firstSched.arrival = anchorMins + driveMin;
            firstSched.departure = formatHHMM(anchorMins);
            firstSched.driveMin = driveMin;
          }
        }
      }
    }
    home = {
      address: prefs.homeAddress,
      display: prefs.homeDisplay || '',
      lat: prefs.homeLat, lng: prefs.homeLng,
      driveMin, leaveHome, source,
      meters: homeOutMeters,
      seconds: leg && leg.seconds != null ? leg.seconds : null,
      delayMin: leg && leg.delaySeconds != null ? Math.round(leg.delaySeconds / 60) : null,
      anchored: sched[0] && sched[0].arrival != null ? 'appointment' : (prefs.departFromHome ? 'depart-time' : null),
    };
    // Stop 0 inherits the inbound delay from the home leg.
    if (home.delayMin != null && sched[0]) sched[0].delayMin = home.delayMin;
  }
  __mapState.home = home;

  // Forward-fill remaining trailing stops if Pass-2 hadn't reached them yet because
  // stop 0 only just got an arrival from the Home leg.
  for (let i = 1; i < stops.length; i++) {
    if (sched[i].departure || stops[i].time) continue;
    const prevAnchorMins = sched[i - 1].arrival != null
      ? sched[i - 1].arrival
      : parseHHMM(sched[i - 1].departure || '');
    const drive = matrix.drives[i - 1];
    if (prevAnchorMins != null && drive && drive.seconds != null) {
      const buffered = applyBuffer(drive.seconds, prevAnchorMins, prefs);
      const driveMin = Math.ceil(buffered / 60);
      sched[i].driveMin = driveMin;
      sched[i].arrival = prevAnchorMins + driveMin;
      sched[i].departure = formatHHMM(prevAnchorMins);
    }
  }

  __mapState.schedule = sched;

  // Return-home leg: drive from the last stop back to home.
  // Assume the final appointment lasts the user-configured duration (Settings).
  const assumedFinalMin = getAssumedFinalVisitMin();
  let homeReturn = null;
  if (prefs.homeLat != null && prefs.homeLng != null && stops.length > 0) {
    const last = stops[stops.length - 1];
    if (last && last.lat != null) {
      let leg = null;
      try {
        leg = await driveLeg(last, { lat: prefs.homeLat, lng: prefs.homeLng }, prefs);
      } catch (e) {
        console.error('Return-home leg routing failed:', e);
      }
      if (leg && leg.seconds != null) {
        // Anchor: last appt's appointment time, or fallback to its scheduled arrival,
        // else its scheduled departure.
        const lastAppt = parseHHMM(last.time || '');
        const lastSched = sched[stops.length - 1];
        const anchorMins = lastAppt != null
          ? lastAppt
          : (lastSched && lastSched.arrival != null ? lastSched.arrival
            : parseHHMM(lastSched && lastSched.departure || ''));
        const finishMins = anchorMins != null ? anchorMins + assumedFinalMin : null;
        const buffered = applyBuffer(leg.seconds, finishMins != null ? finishMins : 12*60, prefs);
        const driveMin = Math.ceil(buffered / 60);
        const arriveHomeMins = finishMins != null ? finishMins + driveMin : null;
        homeReturn = {
          driveMin,
          leaveLast: finishMins != null ? formatHHMM(finishMins) : null,
          arriveHome: arriveHomeMins != null ? formatHHMM(arriveHomeMins) : null,
          assumedAppointmentMin: assumedFinalMin,
          source: leg.source,
          meters: leg.meters,
          seconds: leg.seconds,
          delayMin: leg.delaySeconds != null ? Math.round(leg.delaySeconds / 60) : null,
        };
      }
    }
  }
  __mapState.homeReturn = homeReturn;

  // Persist a mileage entry for the day if home is set (closed loop) OR if there are
  // at least 2 stops (so we still capture inter-stop miles even without home).
  try { saveMileageEntry(stops, matrix, home, homeReturn, prefs); } catch (e) { console.error('Mileage save failed:', e); }

  // Update badge
  if (badge) {
    if (matrix.source === 'tomtom') {
      badge.textContent = 'Live traffic';
      badge.className = 'traffic-badge live';
    } else if (matrix.source === 'mixed') {
      badge.textContent = 'Mixed (live + estimate)';
      badge.className = 'traffic-badge live';
    } else {
      badge.textContent = prefs.bufferMode === 'smart' ? 'Estimate (rush-hour buffered)' : `Estimate (+${prefs.bufferPct}%)`;
      badge.className = 'traffic-badge est';
    }
  }
  const homeNote = home && home.leaveHome ? ` Home leg: leave by ${home.leaveHome} (${home.driveMin} min drive).` : '';
  const returnNote = homeReturn && homeReturn.arriveHome
    ? ` Return home by ${homeReturn.arriveHome} (${homeReturn.driveMin} min drive).`
    : '';
  status.textContent = `Computed ${matrix.drives.filter(d => d.seconds != null).length} drive leg${matrix.drives.length === 1 ? '' : 's'}.${homeNote}${returnNote}`;
  renderStops();
}

// Render a small live-traffic delay note under an appointment time.
// Only meaningful when the matrix source is TomTom (free-flow vs traffic available).
function renderDelayLine(delayMin) {
  if (delayMin == null) return '';
  if (delayMin <= 0) {
    return `<div class="stop-delay stop-delay--ok" title="Live traffic: no measurable delay vs free-flow">On time · live traffic</div>`;
  }
  if (delayMin === 1) {
    return `<div class="stop-delay stop-delay--mild" title="Live traffic delay vs free-flow">+1 min delay · live traffic</div>`;
  }
  const tone = delayMin >= 10 ? 'bad' : (delayMin >= 5 ? 'warn' : 'mild');
  return `<div class="stop-delay stop-delay--${tone}" title="Live traffic delay vs free-flow">+${delayMin} min delay · live traffic</div>`;
}

function renderStops() {
  const stopsCard = document.getElementById('stops-card');
  const stopsList = document.getElementById('stops-list');
  const stopsToolbar = document.getElementById('stops-toolbar');
  const emptyHint = document.getElementById('empty-route-hint');
  if (!stopsCard) return;
  const hasStops = __mapState.stops.length > 0;
  stopsCard.style.display = hasStops ? '' : 'none';
  if (emptyHint) emptyHint.style.display = hasStops ? 'none' : '';
  // Toolbar always shows when there are stops (Schedule button is always available);
  // home-pin toggle inside the toolbar only meaningful with home configured.
  const prefsForToolbar = getPrefs();
  if (stopsToolbar) {
    stopsToolbar.style.display = hasStops ? '' : 'none';
    const hasHome = prefsForToolbar.homeLat != null && prefsForToolbar.homeLng != null;
    // Hide only the home-pin toggle (and its label) when no home is set;
    // the route-on-map toggle is independent and always available.
    const homeWrap = document.getElementById('toggle-home-pin')?.closest('label')?.parentElement;
    const homeToggle = document.getElementById('toggle-home-pin');
    const homeLabel = homeToggle ? homeToggle.closest('label') : null;
    // Find the preceding label-text span (the visible "Show home pin on map" text).
    let homeText = null;
    if (homeLabel && homeLabel.previousElementSibling && homeLabel.previousElementSibling.tagName === 'SPAN') {
      homeText = homeLabel.previousElementSibling;
    }
    if (homeLabel) homeLabel.style.display = hasHome ? '' : 'none';
    if (homeText) homeText.style.display = hasHome ? '' : 'none';
    if (homeToggle) homeToggle.checked = !!prefsForToolbar.includeHomeOnMap;
    const rTog = document.getElementById('toggle-route-on-map');
    if (rTog) rTog.checked = !!prefsForToolbar.showRouteOnMap;
  }
  const today = todayISO();
  const sched = __mapState.schedule;

  // Home leg row (rendered above stop A when home is configured AND a schedule exists).
  let homeRowHTML = '';
  const home = __mapState.home;
  if (home && (home.leaveHome || home.driveMin != null)) {
    const homeLine = home.leaveHome
      ? `Leave home by <strong>${home.leaveHome}</strong>${home.driveMin != null ? ` · ${home.driveMin} min drive` : ''}`
      : 'Home leg ready — set an appointment time or depart-from-home time.';
    const subtitle = home.address
      ? escapeHTML(home.address)
      : (home.lat != null ? `${home.lat.toFixed(4)}, ${home.lng.toFixed(4)}` : '');
    homeRowHTML = `
    <div class="stop-row" style="background: var(--surface-muted, rgba(31,122,133,0.05)); border-left: 3px solid var(--accent);">
      <div class="stop-letter" title="Home start" aria-label="Home" style="background: var(--accent); color: #fff;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3 11l9-8 9 8v10a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2V11z"/></svg>
      </div>
      <div class="stop-text">
        <span class="a">Home</span>
        <span class="b">${subtitle}</span>
        <div class="stop-departure" title="Computed leave-home time">${homeLine}</div>
      </div>
      <div></div>
    </div>`;
  }

  // Return-home row HTML (rendered after the last stop)
  let returnRowHTML = '';
  const homeReturn = __mapState.homeReturn;
  if (homeReturn && homeReturn.arriveHome) {
    const subtitle = (__mapState.home && __mapState.home.address)
      ? escapeHTML(__mapState.home.address)
      : 'Home';
    returnRowHTML = `
    <div class="stop-row" style="background: var(--surface-muted, rgba(31,122,133,0.05)); border-left: 3px solid var(--accent);">
      <div class="stop-letter" title="Return home" aria-label="Return home" style="background: var(--accent); color: #fff;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3 11l9-8 9 8v10a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2V11z"/></svg>
      </div>
      <div class="stop-text">
        <span class="a">Return home</span>
        <span class="b">${subtitle}</span>
        <div class="stop-departure" title="Estimated arrival home">Home by <strong>${homeReturn.arriveHome}</strong> · ${homeReturn.driveMin} min drive${homeReturn.leaveLast ? ` · leave last by ${homeReturn.leaveLast}` : ''}</div>
      </div>
      <div></div>
    </div>`;
  }

  stopsList.innerHTML = homeRowHTML + __mapState.stops.map((s, i) => {
    const plannedAnon = `${today}-${s.letter}`;
    // Same-day taken-letter check is scoped to the current user so different optoms can independently use A/B/C.
    const __curUid = Users.current()?.id || 'user-optom';
    const sameDay = State.patients.filter(p => p.visitDate === today && (p.userId || 'user-optom') === __curUid);
    const taken = sameDay.some(p => p.anonId === plannedAnon);
    let depHTML = '';
    if (sched && sched[i] && sched[i].departure) {
      const cls = sched[i].warn ? 'warn' : '';
      const driveMin = sched[i].driveMin != null ? ` · ${sched[i].driveMin} min drive` : '';
      depHTML = `<div class="stop-departure ${cls}" title="Leave by this time to arrive ${sched[i].cushion} min early">Leave by ${sched[i].departure}${driveMin}${sched[i].warn ? ' ⚠' : ''}</div>`;
    }
    const isEditing = !!s._editing;
    let geoLine;
    if (isEditing) {
      geoLine = `<span class="b">Editing…</span>`;
    } else if (s.lat == null && s.locateFailed) {
      geoLine = `<span class="b stop-locate-fail">Couldn't locate — click “Edit address” to fix</span>`;
    } else if (s.lat == null) {
      geoLine = `<span class="b">Locating…</span>`;
    } else {
      geoLine = `<span class="b">${escapeHTML(s.display || `${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}`)}</span>`;
    }
    const editRow = isEditing
      ? `<div class="stop-edit-row">
           <input class="input" data-edit-input="${i}" value="${escapeAttr(s.address)}" placeholder="Enter address">
           <button class="btn btn-primary btn-sm" data-edit-save="${i}">Save</button>
           <button class="btn btn-sm" data-edit-cancel="${i}">Cancel</button>
         </div>`
      : '';
    return `
    <div class="stop-row">
      <div class="stop-letter">${s.letter}</div>
      <div class="stop-text">
        <span class="a">${escapeHTML(s.address)}</span>
        ${geoLine}
        <span class="b" style="color: var(--accent); font-family: var(--mono); font-size: 11px;">
          ${taken ? `✓ ${plannedAnon} — already saved` : `Will save as ${plannedAnon}`}
        </span>
        <div class="stop-time-row">
          <label for="stop-time-${i}">Appt:</label>
          <input type="time" id="stop-time-${i}" data-stop-time="${i}" value="${escapeHTML(s.time || '')}">
          ${s.time ? `<span class="b" style="font-size: 11px;">${formatTime12(s.time)}</span>` : ''}
        </div>
        ${(sched && sched[i] && __mapState.trafficSource === 'tomtom') ? renderDelayLine(sched[i].delayMin) : ''}
        ${editRow}
        ${depHTML}
      </div>
      <div class="flex gap-1" style="flex-direction: column;">
        <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(s.address)}&travelmode=driving"
           target="_blank" class="btn btn-sm">Navigate</a>
        <button class="btn btn-sm" data-edit-address="${i}" title="Edit this stop's address">Edit address</button>
        <button class="btn btn-primary btn-sm" data-new-from-stop="${i}" title="Open this stop in the Active patient tab — re-opens the existing record if one already exists, otherwise creates a new one">
          Open Px
        </button>
      </div>
    </div>
    `;
  }).join('') + returnRowHTML;
  // Bind "Open Px" buttons. Creates a draft record in storage
  // immediately, so opening from the route map = creating the patient record.
  stopsList.querySelectorAll('[data-new-from-stop]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.newFromStop, 10);
      const stop = __mapState.stops[idx];
      if (!stop) return;
      // Auto-save the in-progress active patient first, if any.
      const autosaved = autoSaveActiveFormIfReady();
      // Today's planned anon ID for this stop letter.
      const today = todayISO();
      const plannedAnon = `${today}-${stop.letter}`;
      // If a record already exists for this stop today, RE-OPEN it for editing
      // instead of creating a duplicate. Limit search to the current user's records.
      const myPatients = currentUserPatients();
      const existing = myPatients.find(p => p.visitDate === today && p.anonId === plannedAnon);
      if (existing) {
        // Hydrate the form from the saved record using the same edit-flow path that
        // Records uses, so visit-level dispense + reason re-populate correctly.
        const clone = JSON.parse(JSON.stringify(existing));
        clone._editingId = existing.id;
        clone._preferredLetter = stop.letter;
        // Visit-level dispense migration (mirrors Records edit flow).
        const isDisp = patientIsDispensed(existing);
        const anyNotDisp = (existing.pairs || []).some(x => x.notDispensed);
        if (isDisp) {
          clone.visitDispensed = true;
          clone.visitNonDispenseReason = '';
          clone.pairs = (clone.pairs || []).filter(x => !x.notDispensed);
          if (clone.pairs.length === 0) clone.pairs = [makePair(0)];
        } else if (anyNotDisp) {
          clone.visitDispensed = false;
          const ndPair = (existing.pairs || []).find(x => x.notDispensed);
          clone.visitNonDispenseReason = ndPair ? (ndPair.nonDispenseReason || '') : '';
          clone.pairs = [makePair(0)];
        } else {
          clone.visitDispensed = null;
          clone.visitNonDispenseReason = '';
          if (!clone.pairs || clone.pairs.length === 0) clone.pairs = [makePair(0)];
        }
        __form = clone;
        const msg = autosaved
          ? `Saved ${autosaved} · Re-opened ${plannedAnon}`
          : `Re-opened ${plannedAnon}`;
        toast(msg, 'success');
        navigate('new');
        return;
      }
      // No existing record — create a draft record now so the patient is committed at this click.
      const draft = freshForm();
      draft.address = stop.address;
      if (stop.lat != null) { draft.lat = stop.lat; draft.lng = stop.lng; }
      draft._preferredLetter = stop.letter;
      const created = State.add({
        anonId: plannedAnon,
        visitDate: draft.visitDate,
        address: draft.address,
        visitOutcome: '',
        gradingMark: '',
        pairs: [],
        clinicalReferral: false,
        referralActioned: false,
        additionalActionRequired: false,
        additionalActionActioned: false,
        notes: '',
        lat: draft.lat, lng: draft.lng,
      });
      // Load this record into the active form in EDIT mode so further changes update it.
      const loaded = State.patients.find(p => p.id === created.id) || created;
      const clone = JSON.parse(JSON.stringify(loaded));
      clone._editingId = created.id;
      clone._preferredLetter = stop.letter;
      clone.visitDispensed = null;
      clone.visitNonDispenseReason = '';
      if (!clone.pairs || clone.pairs.length === 0) clone.pairs = [makePair(0)];
      __form = clone;
      const msg = autosaved
        ? `Saved ${autosaved} · Created ${plannedAnon} as the active patient`
        : `Created ${plannedAnon} as the active patient`;
      toast(msg, 'success');
      navigate('new');
    });
  });
  // Bind time inputs
  stopsList.querySelectorAll('[data-stop-time]').forEach(inp => {
    inp.addEventListener('change', () => {
      const idx = parseInt(inp.dataset.stopTime, 10);
      if (__mapState.stops[idx]) {
        __mapState.stops[idx].time = inp.value || '';
        __mapState.schedule = null; // invalidate
        saveRoute();
        renderStops();
      }
    });
  });
  // Bind edit-address buttons
  stopsList.querySelectorAll('[data-edit-address]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.editAddress, 10);
      if (__mapState.stops[idx]) {
        __mapState.stops[idx]._editing = true;
        renderStops();
        const inp = document.querySelector(`[data-edit-input="${idx}"]`);
        if (inp) { inp.focus(); inp.select(); }
      }
    });
  });
  stopsList.querySelectorAll('[data-edit-cancel]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.editCancel, 10);
      if (__mapState.stops[idx]) {
        __mapState.stops[idx]._editing = false;
        renderStops();
      }
    });
  });
  stopsList.querySelectorAll('[data-edit-save]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const idx = parseInt(btn.dataset.editSave, 10);
      const inp = document.querySelector(`[data-edit-input="${idx}"]`);
      if (!inp || !__mapState.stops[idx]) return;
      const newAddr = (inp.value || '').trim();
      if (!newAddr) { toast('Enter an address', 'error'); return; }
      const stop = __mapState.stops[idx];
      stop.address = newAddr;
      stop.lat = null; stop.lng = null; stop.display = null;
      stop.locateFailed = false;
      stop._editing = false;
      __mapState.schedule = null;
      saveRoute();
      renderStops();
      placeMarkers();
      await geocodeStops();
      renderStops();
      placeMarkers();
      fitMap();
      saveRoute();
      const stop2 = __mapState.stops[idx];
      if (stop2 && stop2.lat == null) toast(`Couldn't locate stop ${stop2.letter}`, 'error');
      else if (stop2) toast(`Stop ${stop2.letter} updated`, 'success');
    });
  });
  // Allow Enter in the edit input to save
  stopsList.querySelectorAll('[data-edit-input]').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const idx = inp.dataset.editInput;
        const saveBtn = document.querySelector(`[data-edit-save="${idx}"]`);
        if (saveBtn) saveBtn.click();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        const idx = inp.dataset.editInput;
        const cancelBtn = document.querySelector(`[data-edit-cancel="${idx}"]`);
        if (cancelBtn) cancelBtn.click();
      }
    });
  });
  // Update full route URL: home → stops → home when home set, else first → last with waypoints
  const fullLink = document.getElementById('full-route-link');
  if (fullLink && __mapState.stops.length >= 1) {
    const valid = __mapState.stops.filter(s => s.address);
    if (valid.length === 0) {
      fullLink.style.display = 'none';
    } else {
      const prefsForLink = getPrefs();
      let url;
      if (prefsForLink.homeAddress) {
        const home = encodeURIComponent(prefsForLink.homeAddress);
        const wp = valid.map(s => encodeURIComponent(s.address)).join('|');
        url = `https://www.google.com/maps/dir/?api=1&origin=${home}&destination=${home}&travelmode=driving${wp ? '&waypoints=' + wp : ''}`;
      } else if (valid.length >= 2) {
        const origin = encodeURIComponent(valid[0].address);
        const dest = encodeURIComponent(valid[valid.length - 1].address);
        const wp = valid.slice(1, -1).map(s => encodeURIComponent(s.address)).join('|');
        url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=driving${wp ? '&waypoints=' + wp : ''}`;
      } else {
        // Single stop, no home: just navigate to it
        url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(valid[0].address)}&travelmode=driving`;
      }
      fullLink.href = url;
      fullLink.style.display = '';
    }
  } else if (fullLink) {
    fullLink.style.display = 'none';
  }
}

/* ============================================================================
 * RECORDS
 * ============================================================================ */

let __recordsState = {
  search: '',
  panelOpen: false,
  grading: { A: false, B: false, C: false, D: false, none: false },
  pairs: { p0: false, p1: false, p2: false, p3plus: false },
  outcomes: {}, // outcome -> bool
  unactionedReferral: false,
  unactionedFollowup: false,
};
function recordsActiveFilterCount() {
  const s = __recordsState;
  let n = 0;
  if (Object.values(s.grading).some(Boolean)) n++;
  if (Object.values(s.pairs).some(Boolean)) n++;
  if (Object.values(s.outcomes).some(Boolean)) n++;
  if (s.unactionedReferral) n++;
  if (s.unactionedFollowup) n++;
  return n;
}

function recordsApplyFilters(list) {
  const s = __recordsState;
  const gActive = Object.values(s.grading).some(Boolean);
  const pActive = Object.values(s.pairs).some(Boolean);
  const oActive = Object.values(s.outcomes).some(Boolean);
  return list.filter(p => {
    if (gActive) {
      const g = (p.gradingMark || '').toUpperCase();
      const isNone = !g;
      const ok = (s.grading.A && g === 'A') || (s.grading.B && g === 'B') || (s.grading.C && g === 'C') || (s.grading.D && g === 'D') || (s.grading.none && isNone);
      if (!ok) return false;
    }
    if (pActive) {
      const np = patientDispensedPairs(p);
      const ok = (s.pairs.p0 && np === 0) || (s.pairs.p1 && np === 1) || (s.pairs.p2 && np === 2) || (s.pairs.p3plus && np >= 3);
      if (!ok) return false;
    }
    if (oActive) {
      if (!s.outcomes[p.visitOutcome]) return false;
    }
    if (s.unactionedReferral) {
      if (!(p.clinicalReferral && !p.referralActioned)) return false;
    }
    if (s.unactionedFollowup) {
      if (!(p.additionalActionRequired && !p.additionalActionActioned)) return false;
    }
    return true;
  });
}

function renderRecords() {
  const root = document.getElementById('route-records');
  // Records list is per-user. Admins use OVERSIGHT for cross-user viewing.
  const all = currentUserPatients().slice().sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  const f = __recordsState.search.toLowerCase();
  let rows = !f ? all : all.filter(p =>
    p.anonId.toLowerCase().includes(f) ||
    (p.notes || '').toLowerCase().includes(f) ||
    (p.pairs || []).some(pair => (pair.nonDispenseReason || '').toLowerCase().includes(f))
  );
  rows = recordsApplyFilters(rows);
  const filterCount = recordsActiveFilterCount();
  const s = __recordsState;

      // Ownership guard: a non-admin can only delete their own records.

    btn.addEventListener('click', () => {
      const id = btn.dataset.edit;
      const p = State.patients.find(x => x.id === id);
      if (!p) return;
      // Ownership guard: a non-admin can only edit their own records.
      const __cur = Users.current();
      if (__cur && !Users.isAdmin() && (p.userId || 'user-optom') !== __cur.id) {
        toast("You can only edit your own records", 'error');
        return;

      clone._editingId = id;
      // Derive visit-level dispense state from the saved pairs so the form
      // shows the correct toggle and (when relevant) reason.
      const sourcePairs = (p.pairs || []);
      if (patientIsDispensed(p)) {
        clone.visitDispensed = true;

        clone.pairs = sourcePairs.filter(x => !x.notDispensed);

      } else if (sourcePairs.some(x => x.notDispensed)) {
        clone.visitDispensed = false;
        clone.visitNonDispenseReason = (sourcePairs.find(x => x.notDispensed) || {}).nonDispenseReason || '';
        clone.pairs = [makePair(0)];
      } else {
        clone.visitDispensed = null;
        clone.visitNonDispenseReason = '';
        clone.pairs = sourcePairs.length ? sourcePairs : [makePair(0)];
      }
      __form = clone;
      navigate('new');
    });

function flattenForExport() {
  const rows = [];
  // Admin exports all records; regular users export their own only.
  const source = Users.isAdmin() ? State.patients : currentUserPatients();
  for (const p of source) {
    if (!(p.pairs || []).length) {
      rows.push({
        anonId: p.anonId, visitDate: p.visitDate,
        pairNum: '', pairFrames: '', pairReglaze: '',
        pairPrice: '', pairDispensed: '', pairReason: '',
        patientTotal: 0, patientFrames: 0, patientReglazes: 0,
        clinicalReferral: p.clinicalReferral ? 'Yes' : 'No',
        notes: p.notes || '', createdAt: p.createdAt,
      });
      continue;
    }
    p.pairs.forEach((pair, i) => {
      rows.push({
        anonId: p.anonId, visitDate: p.visitDate,
        pairNum: i + 1, pairFrames: pair.framesCount, pairReglaze: pair.reglaze ? 'Yes' : 'No',
        pairPrice: Number(pair.price) || 0,
        pairDispensed: pair.dispensed ? 'Yes' : 'No',
        pairReason: pair.dispensed ? '' : (pair.nonDispenseReason || ''),
        patientTotal: patientTotal(p),
        patientFrames: patientFramesCount(p),
        patientReglazes: patientReglazes(p),
        clinicalReferral: p.clinicalReferral ? 'Yes' : 'No',
        notes: p.notes || '', createdAt: p.createdAt,
      });
    });
  }
  return rows;
}

function exportCSV() {
  const rows = flattenForExport();
  const headers = ['anon_id', 'visit_date',
    'pair_num', 'pair_frames', 'pair_reglaze', 'pair_price', 'pair_dispensed', 'pair_reason',
    'patient_total', 'patient_frames', 'patient_reglazes',
    'clinical_referral', 'notes', 'created_at'];
  const esc = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const lines = [headers.join(',')];
  for (const r of rows) {
    lines.push([
      r.anonId, r.visitDate,
      r.pairNum, r.pairFrames, r.pairReglaze, r.pairPrice, r.pairDispensed, r.pairReason,
      r.patientTotal, r.patientFrames, r.patientReglazes,
      r.clinicalReferral, r.notes, r.createdAt,
    ].map(esc).join(','));
  }
  download(`dom-optom-${todayISO()}.csv`, lines.join('\n'), 'text/csv;charset=utf-8');
}

function exportXLSX() {
  const rows = flattenForExport();
  const headers = ['Anon ID', 'Visit Date',
    'Pair #', 'Frames', 'Reglaze', 'Price (£)', 'Dispensed', 'Reason',
    'Patient Total (£)', 'Patient Frames', 'Patient Reglazes',
    'Referral', 'Notes', 'Created At'];
  const xmlEsc = (v) => String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const xml = `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
 <Worksheet ss:Name="Records">
  <Table>
   <Row>${headers.map(h => `<Cell><Data ss:Type="String">${xmlEsc(h)}</Data></Cell>`).join('')}</Row>
   ${rows.map(r => {
     const cells = [r.anonId, r.visitDate,
       r.pairNum, r.pairFrames, r.pairReglaze, r.pairPrice, r.pairDispensed, r.pairReason,
       r.patientTotal, r.patientFrames, r.patientReglazes,
       r.clinicalReferral, r.notes, r.createdAt];
     return `<Row>${cells.map(c => {
       const isNum = typeof c === 'number' && !Number.isNaN(c);
       return `<Cell><Data ss:Type="${isNum ? 'Number' : 'String'}">${xmlEsc(c)}</Data></Cell>`;
     }).join('')}</Row>`;
   }).join('\n')}
  </Table>
 </Worksheet>
</Workbook>`;
  download(`dom-optom-${todayISO()}.xls`, xml, 'application/vnd.ms-excel');
}

function exportJSON() {
  // Admin backs up everything; non-admin backs up only their own records.
  const exportPatients = Users.isAdmin() ? State.patients : currentUserPatients();
  const blob = JSON.stringify({
    version: 1,
    exportedAt: new Date().toISOString(),
    exportedBy: Users.current()?.id || null,
    patients: exportPatients,
  }, null, 2);
  download(`dom-optom-backup-${todayISO()}.json`, blob, 'application/json');
}

function importJSONFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const incoming = Array.isArray(parsed) ? parsed : (parsed.patients || []);
      if (!Array.isArray(incoming)) throw new Error('Not an array of patients');
      // Validate minimal shape
      const valid = incoming.filter(p => p && p.anonId && p.visitDate && Array.isArray(p.pairs));
      if (valid.length === 0) throw new Error('No valid patient records found');
      showImportChoiceModal(valid);
    } catch (e) {
      toast(`Import failed: ${e.message}`, 'error');
    }
  };
  reader.readAsText(file);
}

// Modal that asks whether to add the imported records to existing data or replace it entirely.
function showImportChoiceModal(valid) {
  // For non-admin users the count shown is their own records (replace will only swap their own data).
  const existing = (Users.isAdmin() ? State.patients : currentUserPatients()).length;
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.style.display = 'flex';
  backdrop.style.alignItems = 'center';
  backdrop.style.justifyContent = 'center';
  backdrop.innerHTML = `
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Import patient records" style="max-width: 520px; width: 100%;">
      <div class="modal-head">
        <div>
          <h3 style="margin: 0; font-size: 16px;">Import patient records</h3>
          <div class="help" style="margin: 4px 0 0;">${valid.length} valid record${valid.length === 1 ? '' : 's'} in file. You currently have ${existing} record${existing === 1 ? '' : 's'}.</div>
        </div>
        <button class="btn btn-ghost btn-sm" data-modal-close title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" style="padding: 18px;">
        <p style="margin: 0 0 10px; font-size: 14px;">Choose how to handle the imported records:</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button class="btn btn-primary" id="import-mode-add" style="text-align: left; padding: 12px 14px; display: block; width: 100%; height: auto; line-height: 1.4;">
            <div style="font-weight: 600;">Add to existing records</div>
            <div style="margin: 4px 0 0; font-size: 12px; opacity: .9; font-weight: 400;">Keep current ${existing} record${existing === 1 ? '' : 's'} and append imported ones. Duplicates (same Anon ID + date) will be skipped.</div>
          </button>
          <button class="btn" id="import-mode-replace" style="text-align: left; padding: 12px 14px; display: block; width: 100%; height: auto; line-height: 1.4; border-color: var(--danger); color: var(--danger);">
            <div style="font-weight: 600;">Replace all existing records</div>
            <div style="margin: 4px 0 0; font-size: 12px; opacity: .9; font-weight: 400;">Delete current ${existing} record${existing === 1 ? '' : 's'} and use only the imported ${valid.length}. This cannot be undone.</div>
          </button>
          <button class="btn btn-ghost" id="import-mode-cancel" style="text-align: center; padding: 10px 14px;">Cancel</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(backdrop);

  const close = () => {
    try { backdrop.remove(); } catch {}
    document.removeEventListener('keydown', onKey);
  };
  const onKey = (ev) => { if (ev.key === 'Escape') close(); };
  document.addEventListener('keydown', onKey);
  backdrop.addEventListener('click', (ev) => { if (ev.target === backdrop) close(); });
  backdrop.querySelector('[data-modal-close]').addEventListener('click', close);
  backdrop.querySelector('#import-mode-cancel').addEventListener('click', close);

  // Tag imported records with the importing user's id (unless they're admin and the records already carry one).
  const importer = Users.current();
  const isAdmin = Users.isAdmin();
  const tagOwnership = (recs) => recs.map(r => {
    if (isAdmin && r.userId) return r; // admins can preserve original ownership
    return { ...r, userId: importer?.id || 'user-optom' };
  });

  backdrop.querySelector('#import-mode-add').addEventListener('click', () => {
    const tagged = tagOwnership(valid);
    const { added, skipped } = State.appendImported(tagged);
    close();
    const skipNote = skipped > 0 ? ` (${skipped} duplicate${skipped === 1 ? '' : 's'} skipped)` : '';
    toast(`Added ${added} record${added === 1 ? '' : 's'}${skipNote}`, 'success');
    renderData();
  });

  backdrop.querySelector('#import-mode-replace').addEventListener('click', () => {
    if (existing > 0 && !confirm(`Replace all ${existing} current record${existing === 1 ? '' : 's'} with ${valid.length} from file? This cannot be undone.`)) return;
    const tagged = tagOwnership(valid);
    if (isAdmin) {
      State.replaceAll(tagged);
    } else {
      // Non-admin: replace only their own records, preserve others.
      const others = State.patients.filter(p => (p.userId || 'user-optom') !== importer.id);
      State.replaceAll(others.concat(tagged));
    }
    close();
    toast(`Imported ${tagged.length} record${tagged.length === 1 ? '' : 's'}`, 'success');
    renderData();
  });
}

function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function saveMileageEntry(stops, matrix, home, homeReturn, prefs) {
  // Build per-leg breakdown.
  const legs = [];
  let totalMeters = 0, totalSeconds = 0;
  let provider = matrix.source || (home && home.source) || (homeReturn && homeReturn.source) || 'osrm';

  if (home && home.meters != null) {
    legs.push({ kind: 'home-out', from: 'Home', to: stops[0]?.letter || '', meters: home.meters, seconds: home.seconds != null ? home.seconds : null, source: home.source });
    totalMeters += home.meters;
    if (home.seconds) totalSeconds += home.seconds;
  }
  for (let i = 0; i < (matrix.drives || []).length; i++) {
    const d = matrix.drives[i];
    if (!d || d.meters == null) continue;
    legs.push({ kind: 'leg', from: stops[i]?.letter || '', to: stops[i + 1]?.letter || '', meters: d.meters, seconds: d.seconds, source: d.source });
    totalMeters += d.meters;
    if (d.seconds) totalSeconds += d.seconds;
  }
  if (homeReturn && homeReturn.meters != null) {
    legs.push({ kind: 'home-return', from: stops[stops.length - 1]?.letter || '', to: 'Home', meters: homeReturn.meters, seconds: homeReturn.seconds != null ? homeReturn.seconds : null, source: homeReturn.source });
    totalMeters += homeReturn.meters;
    if (homeReturn.seconds) totalSeconds += homeReturn.seconds;
  }
  if (legs.length === 0) return; // nothing to log

  // Save coords so we can render a per-day route map without re-geocoding.
  const homeCoords = (home && home.lat != null && home.lng != null)
    ? { lat: home.lat, lng: home.lng, address: home.address || (prefs && prefs.homeDisplay) || (prefs && prefs.homeAddress) || 'Home' }
    : (prefs && prefs.homeLat != null && prefs.homeLng != null
        ? { lat: prefs.homeLat, lng: prefs.homeLng, address: prefs.homeDisplay || prefs.homeAddress || 'Home' }
        : null);

  const stopCoords = (stops || [])
    .filter(s => s && s.lat != null && s.lng != null)
    .map(s => ({ letter: s.letter, lat: s.lat, lng: s.lng, address: s.display || s.address || '' }));

  const cur = Users.current();
  const userId = (cur && cur.id) || 'user-optom';

  const entry = {
    date: todayISO(),
    userId,
    miles: +(totalMeters / 1609.344).toFixed(2),
    meters: Math.round(totalMeters),
    driveMinutes: Math.round(totalSeconds / 60), // sum of inter-stop driving (raw, pre-buffer)
    stopCount: stops.length,
    homeIncluded: !!home,
    returnIncluded: !!homeReturn,
    provider,
    legs,
    coords: { home: homeCoords, stops: stopCoords },
    savedAt: new Date().toISOString(),
  };

  const log = loadMileage();
  // Replace any existing entry for the same (date, user) — keeps separate optoms' entries distinct.
  log.entries = (log.entries || []).filter(e => !(e.date === entry.date && (e.userId || 'user-optom') === userId));
  log.entries.push(entry);
  log.entries.sort((a, b) => b.date.localeCompare(a.date));
  saveMileage(log);
}

/* ============================================================================
 * END OF DAY
 * --------------------------------------------------------------------------
 * Daily wind-down view. Shows today's visits, lists any that still have a
 * Referral Required or Additional Action Required toggle on so they can be
 * actioned before submission, and provides a Submit flow that:
 *   1. Downloads a JSON backup of today's visits
 *   2. Opens a mailto: link to ben.arm.personal@gmail.com with the JSON in
 *      the body so it can be archived centrally
 *   3. Deletes today's visits from local storage
 * The user confirms via an "Are you sure?" modal before any of that happens.
 * ============================================================================ */

// Default email used for end-of-day submissions. Can be overridden per-device
// in Settings (Prefs.eodEmailTo). Read via getEodEmail() everywhere so the
// user-set value always wins.
const EOD_EMAIL_DEFAULT = 'ben.arm.personal@gmail.com';
function getEodEmail() {
  try {
    const e = (getPrefs().eodEmailTo || '').trim();
    return e || EOD_EMAIL_DEFAULT;
  } catch { return EOD_EMAIL_DEFAULT; }
}

// Today's visits for the current user. Patient records are tagged with userId;
// admin sees everyone's, regular users see only their own.
function eodTodaysVisits() {
  const today = todayISO();
  const userId = Users.currentUserId;
  return State.patients.filter(p => {
    if (p.visitDate !== today) return false;
    if (Users.isAdmin()) return true;
    return (p.userId || 'user-optom') === userId;
  });
}

// A visit is "unactioned" if a Referral was marked Required but not yet ticked
// as Actioned, OR an Additional Action was marked Required but not yet ticked
// as Actioned. The form stores these as:
//   p.clinicalReferral          (referral required toggle)
//   p.referralActioned          (referral actioned sub-toggle)
//   p.additionalActionRequired  (action required toggle)
//   p.additionalActionActioned  (action actioned sub-toggle)
// We surface unactioned items so they can be reviewed before the day's records
// are submitted and wiped.
function eodIsUnactioned(p) {
  const refOutstanding = !!p.clinicalReferral && !p.referralActioned;
  const actOutstanding = !!p.additionalActionRequired && !p.additionalActionActioned;
  return refOutstanding || actOutstanding;
}

// Today's mileage entries for the current user (admin sees everyone's).
// Each (date, user) pair has at most one combined entry; we return as an array
// for forward-compat and to make admin-aggregation natural.
function eodTodaysMileage() {
  const today = todayISO();
  const userId = Users.currentUserId;
  const log = loadMileage();
  const entries = (log.entries || []).filter(e => {
    if (e.date !== today) return false;
    if (Users.isAdmin()) return true;
    return (e.userId || 'user-optom') === userId;
  });
  return entries;
}

// Build the export payload, trigger a JSON download, open the mailto, and
// remove today's visits from storage. Each step is wrapped so a failure in
// (e.g.) mail compose doesn't block the local cleanup.
//
// On iPhone Safari (and any browser that supports navigator.canShare with files)
// we use the Web Share API so the JSON arrives as a real file attachment in Mail.
// The previous mailto approach was capped to ~2000 chars, so larger days
// truncated. The share sheet has no such cap.
async function eodSubmit(visits, mileage) {
  visits = visits || [];
  mileage = mileage || [];
  if (visits.length === 0 && mileage.length === 0) {
    toast('Nothing to submit.', 'error');
    return;
  }

  const today = todayISO();
  const totalMiles = mileage.reduce((s, e) => s + (e.miles || 0), 0);
  const totalDriveMinutes = mileage.reduce((s, e) => s + (e.driveMinutes || 0), 0);
  const payload = {
    submittedAt: new Date().toISOString(),
    submittedBy: (Users.current() && Users.current().username) || 'unknown',
    visitDate: today,
    visitCount: visits.length,
    visits,
    mileageCount: mileage.length,
    totalMiles: Number(totalMiles.toFixed(2)),
    totalDriveMinutes,
    mileage,
  };
  const json = JSON.stringify(payload, null, 2);
  const filename = `dom-optom-${today}.json`;
  const milesLabel = mileage.length > 0 ? `, ${totalMiles.toFixed(1)} mile${totalMiles === 1 ? '' : 's'}` : '';
  const recipient = getEodEmail();
  const subject = `Dom-Optom end of day — ${today} (${visits.length} visit${visits.length === 1 ? '' : 's'}${milesLabel})`;
  const intro = `End-of-day submission for ${today}.\n${visits.length} visit${visits.length === 1 ? '' : 's'}${milesLabel}.`;

  // 1) Try the Web Share API with a File attachment. This is the iOS-native
  //    share sheet — the user picks Mail/Messages/etc. and the JSON travels
  //    as a real attachment with no size cap. Desktop Safari and old browsers
  //    fall through to mailto.
  //
  // The share sheet cannot pre-fill the Mail To: field (iOS limitation), so
  // we copy the recipient address to the clipboard before opening the sheet.
  // The user just taps the To: field and pastes.
  let sharedOk = false;
  let sharedAttempted = false;
  let clipboardOk = false;
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(recipient);
      clipboardOk = true;
    }
  } catch (e) {
    // Clipboard write can fail (no permission, http context, etc.) — not fatal.
    console.warn('Clipboard copy failed:', e);
  }
  try {
    const file = new File([json], filename, { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
      sharedAttempted = true;
      // The share sheet must be opened from a user gesture. The confirm-modal
      // button click is the gesture; this async call still counts on iOS
      // because the click handler is the same task as this promise.
      const shareText = `Send to: ${recipient}${clipboardOk ? ' (already copied to clipboard — paste into To:)' : ''}\n\n${intro}\nThe JSON file is attached.`;
      await navigator.share({
        files: [file],
        title: subject,
        text: shareText,
      });
      sharedOk = true;
    }
  } catch (e) {
    // AbortError = user cancelled the share sheet. Treat as a successful
    // "shown the sheet" so we don't fall back to mailto + download.
    if (e && e.name === 'AbortError') {
      sharedAttempted = true;
      sharedOk = false;
      toast('Share cancelled — records not yet cleared.', 'error');
      return;
    }
    console.error('Web Share failed:', e);
  }

  // 2) If we couldn't share (desktop, old browser, share denied), fall back to
  //    the legacy flow: download the JSON file, then open mailto with a short
  //    body asking the user to attach the downloaded file.
  if (!sharedAttempted) {
    try {
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {
      console.error('JSON download failed:', e);
      toast('Could not download backup.', 'error');
    }
    try {
      const shortBody = `${intro}\n\nThe file ${filename} was just downloaded to your device — please attach it to this email.`;
      window.location.href = `mailto:${getEodEmail()}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(shortBody)}`;
    } catch (e) {
      console.error('mailto failed:', e);
      toast('Could not open mail app. JSON has been downloaded.', 'error');
    }
  }

  // 3) Delete today's visits from local storage. Only this user's records for
  //    today are removed — earlier days and other users are untouched.
  const userId = Users.currentUserId;
  const beforeCount = State.patients.length;
  State.patients = State.patients.filter(p => {
    if (p.visitDate !== today) return true;
    if (!Users.isAdmin() && (p.userId || 'user-optom') !== userId) return true;
    return false;
  });
  State.save();
  const removed = beforeCount - State.patients.length;

  // 4) Clear today's mileage entries for this user. Admin clears all today's
  //    entries (same scope they saw in the EoD summary). Other days untouched.
  let removedMileage = 0;
  try {
    const mLog = loadMileage();
    const beforeM = (mLog.entries || []).length;
    mLog.entries = (mLog.entries || []).filter(e => {
      if (e.date !== today) return true;
      if (!Users.isAdmin() && (e.userId || 'user-optom') !== userId) return true;
      return false;
    });
    saveMileage(mLog);
    removedMileage = beforeM - mLog.entries.length;
  } catch (e) {
    console.error('Mileage clear failed:', e);
  }

  const parts = [];
  if (removed > 0) parts.push(`${removed} visit${removed === 1 ? '' : 's'}`);
  if (removedMileage > 0) parts.push(`${removedMileage} mileage entr${removedMileage === 1 ? 'y' : 'ies'}`);
  const summary = parts.length > 0 ? parts.join(' and ') : 'no records';
  const clipNote = (sharedOk && clipboardOk) ? ` Email address copied — paste into Mail's To: field.` : '';
  toast(`Day ended. ${summary} exported and cleared.${clipNote}`, 'success');
  // Re-render to reflect the cleared state.
  renderEndOfDay();
}

function renderMileage() {
  const root = document.getElementById('route-mileage');
  const log = loadMileage();
  // Each user sees only their own mileage entries; admin sees all on this view too
  // (admin's cross-team comparisons live in OVERSIGHT).
  const entries = Users.isAdmin() ? (log.entries || []) : currentUserMileage(log.entries || []);
  const today = todayISO();

  // Compute totals: today, this ISO week (Mon-start), this calendar month, all-time.
  const now = new Date(today + 'T00:00:00');
  const dayOfWeek = (now.getDay() + 6) % 7; // 0=Mon
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - dayOfWeek);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const ymd = (d) => d.toISOString().slice(0, 10);

  const sumMiles = (filterFn) => entries.filter(filterFn).reduce((s, e) => s + (e.miles || 0), 0);
  const totalToday = sumMiles(e => e.date === today);
  const totalWeek = sumMiles(e => e.date >= ymd(weekStart) && e.date <= today);
  const totalMonth = sumMiles(e => e.date >= ymd(monthStart) && e.date <= today);
  const totalAll = sumMiles(() => true);

  // Round all displayed mileage UP to the nearest whole mile.
  const fmt = (n) => Math.ceil(n).toString();

  // Helpers for leg breakdown formatting.
  const milesOf = (m) => (m / 1609.344);
  const formatLeg = (leg) => {
    const mi = leg.meters != null ? milesOf(leg.meters) : null;
    const min = leg.seconds != null ? Math.round(leg.seconds / 60) : null;
    const src = leg.source === 'tomtom' ? 'Live' : leg.source === 'osrm' ? 'Estimate' : (leg.source || '—');
    return {
      label: leg.kind === 'home-out' ? `Home → ${leg.to}`
           : leg.kind === 'home-return' ? `${leg.from} → Home`
           : `${leg.from} → ${leg.to}`,
      kind: leg.kind === 'leg' ? 'Stop‑to‑stop' : (leg.kind === 'home-out' ? 'Home→first' : 'Last→Home'),
      miles: mi != null ? Math.ceil(mi).toString() : '—',
      mins: min != null ? `${min} min` : '—',
      src,
    };
  };

  const rowsHTML = entries.length === 0
    ? `<tr><td colspan="8" style="text-align: center; padding: 28px; color: var(--text-muted);">
         No mileage logged yet. Compute departures on the Route map (with a home location set) to log a day.
       </td></tr>`
    : entries.flatMap((e, idx) => {
        const provider = e.provider === 'tomtom' ? 'Live (TomTom)'
          : e.provider === 'mixed' ? 'Mixed'
          : 'Estimate (OSRM)';
        const flags = [];
