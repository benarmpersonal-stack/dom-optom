function openMileageMapModal(entry) {
  const coords = entry.coords || { home: null, stops: [] };
  const home = coords.home;
  const stops = coords.stops || [];
  if (!home && stops.length === 0) {
    toast('No coordinates saved for this entry', 'error');
    return;
  }

  // Build modal shell.
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  // Override the legacy .modal-backdrop grid layout (which doesn't stretch children)
  // with a flex layout so our 900px-wide modal-card actually fills available width.
  backdrop.style.display = 'flex';
  backdrop.style.alignItems = 'center';
  backdrop.style.justifyContent = 'center';
  backdrop.innerHTML = `
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Route map for ${entry.date}" style="max-width: 900px; width: 100%;">
      <div class="modal-head">
        <div>
          <h3 style="margin: 0; font-size: 16px;">Route map — ${entry.date}</h3>
          <div class="help" style="margin: 2px 0 0;">${entry.stopCount} stop${entry.stopCount === 1 ? '' : 's'} · ${(entry.miles || 0).toFixed(1)} mi</div>
        </div>
        <button class="btn btn-ghost btn-sm" data-modal-close title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" style="padding: 14px 18px;">
        <div id="mileage-modal-map" style="width: 100%; height: 60vh; min-height: 400px; border-radius: 8px; overflow: hidden;"></div>
      </div>
    </div>`;
  document.body.appendChild(backdrop);

  const close = () => {
    try { backdrop.remove(); } catch {}
    document.removeEventListener('keydown', onKey);
  };
  const onKey = (ev) => { if (ev.key === 'Escape') close(); };
  document.addEventListener('keydown', onKey);
  backdrop.addEventListener('click', (ev) => { if (ev.target === backdrop) close(); });
  backdrop.querySelector('[data-modal-close]').addEventListener('click', close);

  // Initialize Leaflet inside the modal once it's in the DOM.
  setTimeout(() => {
    const mapEl = document.getElementById('mileage-modal-map');
    if (!mapEl || typeof L === 'undefined') return;
    const m = L.map(mapEl, { zoomControl: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors',
    }).addTo(m);

    const points = [];
    if (home) {
      const homeIcon = L.divIcon({
        className: 'home-pin',
        html: '<div style="background: #0ea5a5; color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,.25);">H</div>',
        iconSize: [26, 26], iconAnchor: [13, 13],
      });
      L.marker([home.lat, home.lng], { icon: homeIcon }).addTo(m).bindPopup(`<strong>Home</strong><br>${home.address || ''}`);
      points.push([home.lat, home.lng]);
    }
    stops.forEach(s => {
      const icon = L.divIcon({
        className: 'stop-pin',
        html: `<div style="background: #1e293b; color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-weight: 600; box-shadow: 0 2px 6px rgba(0,0,0,.25);">${s.letter}</div>`,
        iconSize: [26, 26], iconAnchor: [13, 13],
      });
      L.marker([s.lat, s.lng], { icon }).addTo(m).bindPopup(`<strong>Stop ${s.letter}</strong><br>${s.address || ''}`);
      points.push([s.lat, s.lng]);
    });

    // Draw a polyline reflecting the visit order, including home anchor when present.
    const linePoints = [];
    if (entry.homeIncluded && home) linePoints.push([home.lat, home.lng]);
    stops.forEach(s => linePoints.push([s.lat, s.lng]));
    if (entry.returnIncluded && home) linePoints.push([home.lat, home.lng]);
    if (linePoints.length >= 2) {
      L.polyline(linePoints, { color: '#0ea5a5', weight: 3, opacity: 0.75, dashArray: '6 6' }).addTo(m);
    }

    if (points.length === 1) {
      m.setView(points[0], 13);
    } else if (points.length > 1) {
      m.fitBounds(L.latLngBounds(points), { padding: [30, 30] });
    }
    // Force a resize tick after layout.
    setTimeout(() => m.invalidateSize(), 60);
  }, 30);
}

function exportMileageCSV() {
  const log = loadMileage();
  // Admin exports everything; regular user exports only their own entries.
  const sourceEntries = Users.isAdmin() ? (log.entries || []) : currentUserMileage(log.entries || []);
  const entries = sourceEntries.slice().sort((a, b) => a.date.localeCompare(b.date));
  const headers = ['date', 'stops', 'miles', 'meters', 'drive_minutes', 'home_included', 'return_included', 'source', 'leg_count'];
  const esc = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const lines = [headers.join(',')];
  for (const e of entries) {
    lines.push([
      e.date, e.stopCount, e.miles, e.meters, e.driveMinutes,
      e.homeIncluded ? 'Yes' : 'No', e.returnIncluded ? 'Yes' : 'No',
      e.provider, (e.legs || []).length
    ].map(esc).join(','));
  }
  download(`dom-optom-mileage-${todayISO()}.csv`, lines.join('\n'), 'text/csv;charset=utf-8');
}

            <div><div class="kpi-label">Records${Users.isAdmin() ? '' : ' (yours)'}</div><div class="kpi-value" style="font-size: 18px;">${(Users.isAdmin() ? State.patients : currentUserPatients()).length}</div></div>
            <div><div class="kpi-label">Last saved</div><div style="font-size: 13px; margin-top: 8px;">${escapeHTML(saved)}</div></div>
            <div><div class="kpi-label">Size</div><div class="kpi-value" style="font-size: 18px;">${sizeKb} KB</div></div>
          </div>
          <div class="flex gap-2" style="flex-wrap: wrap;">
            <button class="btn btn-primary" id="data-btn-json"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export full backup (JSON)</button>
            <button class="btn" id="data-btn-csv">Export CSV</button>
            <button class="btn" id="data-btn-xlsx">Export Excel</button>
          </div>
          <div class="help mt-3">JSON is the recommended format for backups and moving data between devices — it preserves every field including per-pair details.</div>
          <div class="mt-4">
            <label class="label">Import from JSON</label>
            <input type="file" id="data-file-import" accept="application/json,.json" />
            <div class="help mt-1">⚠ Imports replace all existing records. Export your current data first if unsure.</div>

            <button class="btn btn-danger mt-2" id="data-btn-clear">Erase all records on this device</button>
          </div>

      ${Users.isAdmin() ? `
      <div class="card mb-4" id="manage-users-card">
        <div class="card-head">
          <div>
            <h3 class="card-title">Manage users</h3>
            <div class="card-sub">Admin-only. Reset the optom password or change the optom display name.</div>
          </div>
        </div>
        <div class="card-body">
          <div id="users-list" class="flex" style="flex-direction: column; gap: 8px;">
            ${Users.list.map(u => {
              const isAdminRow = u.id === 'user-admin';
              const ownPx = State.patients.filter(p => (p.userId || 'user-optom') === u.id).length;
              return `
              <div class="flex" data-user-row="${u.id}" style="align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 180px;">
                  <div style="font-weight: 600;">${escapeHTML(u.displayName || u.username)}${isAdminRow ? ' <span class="badge" style="background: var(--accent); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px;">ADMIN</span>' : ''}</div>

  // Theme handlers

  document.getElementById('theme-dark-btn').addEventListener('click', () => {
    setTheme('dark');
    renderSettings();
  });

  document.getElementById('data-btn-json').addEventListener('click', exportJSON);
  document.getElementById('data-btn-csv').addEventListener('click', exportCSV);
  document.getElementById('data-btn-xlsx').addEventListener('click', exportXLSX);

    if (f) importJSONFile(f);
    e.target.value = '';
  });

    const isAdmin = Users.isAdmin();

      const keep = State.patients.filter(p => (p.userId || 'user-optom') !== cur.id);

    const addr = document.getElementById('set-home-address').value.trim();
    const status = document.getElementById('set-home-status');
    if (!addr) {
      status.textContent = 'Enter a home address first.';
      status.style.color = 'var(--danger)';
      return;
    }
    status.textContent = 'Locating…';
    status.style.color = 'var(--text-muted)';
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(addr)}`;
      const r = await fetch(url, { headers: { 'Accept': 'application/json', 'Accept-Language': 'en-GB' } });
      if (!r.ok) throw new Error(`Nominatim ${r.status}`);
      const data = await r.json();
      if (!data || !data[0]) throw new Error('Address not found');
      const lat = parseFloat(data[0].lat), lng = parseFloat(data[0].lon);
      setPrefs({ homeAddress: addr, homeLat: lat, homeLng: lng, homeDisplay: data[0].display_name || '' });
      status.innerHTML = `✓ Located at ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      status.style.color = 'var(--accent)';
      // Invalidate any current schedule so home leg gets recomputed.
      __mapState.schedule = null;
    } catch (e) {
      status.textContent = `Geocoding failed: ${e.message || e}`;
      status.style.color = 'var(--danger)';
    }
  });

  document.getElementById('set-home-clear').addEventListener('click', () => {
    setPrefs({ homeAddress: '', homeLat: null, homeLng: null, homeDisplay: '', departFromHome: '' });
    __mapState.schedule = null;
    renderSettings();
    toast('Home location cleared');
  });

  document.getElementById('set-save').addEventListener('click', () => {
    const tomtomKey = document.getElementById('set-tomtom-key').value.trim();
    const bufferMode = document.querySelector('input[name="set-buffer-mode"]:checked')?.value || 'smart';
    const bufferPct = parseInt(bufRange.value, 10);
    const arrivalCushionMin = parseInt(document.getElementById('set-cushion').value, 10) || 5;
    const homeAddress = document.getElementById('set-home-address').value.trim();
    const departFromHome = document.getElementById('set-depart-time').value || '';
    const cur = getPrefs();
    // If the home address text changed but hasn't been re-geocoded, drop the old coordinates.
    let homeLat = cur.homeLat, homeLng = cur.homeLng, homeDisplay = cur.homeDisplay;
    if (homeAddress !== cur.homeAddress) { homeLat = null; homeLng = null; homeDisplay = ''; }
    if (!homeAddress) { homeLat = null; homeLng = null; homeDisplay = ''; }
    const assumedFinalVisitMinRaw = parseInt(document.getElementById('set-final-visit-min').value, 10);
    const assumedFinalVisitMin = (Number.isFinite(assumedFinalVisitMinRaw) && assumedFinalVisitMinRaw > 0)
      ? assumedFinalVisitMinRaw
      : DEFAULT_LAST_APPT_DURATION_MIN;
    // Read targets. Periodic KPIs also have _daily / _weekly override inputs;
    // a blank field means "clear the override and fall back to scaling from Monthly".
    const targets = { ...DEFAULT_TARGETS };
    for (const t of TARGET_KEYS) {
      const el = document.getElementById(`set-target-${t.key}`);
      const raw = el ? parseFloat(el.value) : NaN;
      if (Number.isFinite(raw) && raw >= 0) targets[t.key] = raw;
      if (t.periodic) {
        for (const period of ['daily', 'weekly']) {
          const pEl = document.getElementById(`set-target-${t.key}_${period}`);
          if (!pEl) continue;
          const trimmed = (pEl.value || '').trim();
          if (trimmed === '') {
            delete targets[`${t.key}_${period}`];
            continue;
          }
          const v = parseFloat(trimmed);
          if (Number.isFinite(v) && v >= 0) targets[`${t.key}_${period}`] = v;
        }
      }
    }
    const eodEmailRaw = (document.getElementById('set-eod-email')?.value || '').trim();
    setPrefs({
      tomtomKey, bufferMode, bufferPct, arrivalCushionMin,
      homeAddress, homeLat, homeLng, homeDisplay, departFromHome,
      assumedFinalVisitMin,
      eodEmailTo: eodEmailRaw,
      targets,
    });
    // Invalidate cached schedule so new cushion / home settings take effect.
    __mapState.schedule = null;
    const cushionEl = document.getElementById('cushion-display');
    if (cushionEl) cushionEl.textContent = String(arrivalCushionMin);
    const ps = document.getElementById('set-save-status');
    ps.textContent = 'Saved.';
    ps.style.color = 'var(--accent)';
    setTimeout(() => { ps.textContent = ''; }, 2500);
    if (homeAddress && homeLat == null) {
      ps.textContent = 'Saved — click Geocode to locate the home address.';
      ps.style.color = 'var(--text-muted)';
    }
  });

  function renderReasonsList() {
    const list = document.getElementById('set-reasons-list');
    if (!list) return;
    const reasons = getNonDispenseReasons();
    if (reasons.length === 0) {
      list.innerHTML = `<div class="help" style="margin: 0;">No reasons defined. Add one below or click Reset to defaults.</div>`;
      return;
    }
    list.innerHTML = reasons.map((r, i) => `
      <div class="reason-row" data-reason-row="${i}">
        <input class="input reason-edit-input" data-reason-input="${i}" value="${escapeAttr(r)}" />
        <button class="btn btn-sm" data-reason-save="${i}" type="button" title="Save this reason">Save</button>
        <button class="btn btn-ghost btn-sm btn-danger" data-reason-delete="${i}" type="button" title="Delete this reason">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
      </div>
    `).join('');

    list.querySelectorAll('[data-reason-save]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.reasonSave, 10);
        const inp = list.querySelector(`[data-reason-input="${idx}"]`);
        const val = (inp?.value || '').trim();
        if (!val) { toast('Reason cannot be empty', 'error'); return; }
        const cur = getNonDispenseReasons().slice();
        if (cur.some((r, j) => j !== idx && r.toLowerCase() === val.toLowerCase())) {
          toast('That reason already exists', 'error');
          return;
        }
        cur[idx] = val;
        setPrefs({ notDispensedReasons: cur });
        toast('Reason updated', 'success');
        renderReasonsList();
      });
    });
    list.querySelectorAll('[data-reason-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.reasonDelete, 10);
        const cur = getNonDispenseReasons().slice();
        if (cur.length <= 1) { toast('Keep at least one reason', 'error'); return; }
        const removed = cur.splice(idx, 1)[0];
        setPrefs({ notDispensedReasons: cur });
        toast(`Removed “${removed}”`, 'success');
        renderReasonsList();
      });
    });
    list.querySelectorAll('[data-reason-input]').forEach(inp => {
      inp.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') {
          ev.preventDefault();
          const idx = inp.dataset.reasonInput;
          list.querySelector(`[data-reason-save="${idx}"]`)?.click();
        }
      });
    });
  }
  renderReasonsList();

  document.getElementById('set-reason-add').addEventListener('click', () => {
    const inp = document.getElementById('set-reason-new');
    const val = (inp.value || '').trim();
    if (!val) { toast('Type a reason first', 'error'); return; }
    const cur = getNonDispenseReasons().slice();
    if (cur.some(r => r.toLowerCase() === val.toLowerCase())) {
      toast('That reason already exists', 'error');
      return;
    }
    cur.push(val);
    setPrefs({ notDispensedReasons: cur });
    inp.value = '';
    toast(`Added “${val}”`, 'success');
    renderReasonsList();
  });
  document.getElementById('set-reason-new').addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') {
      ev.preventDefault();
      document.getElementById('set-reason-add').click();
    }
  });
  document.getElementById('set-reason-reset').addEventListener('click', () => {
    if (!confirm('Reset the non-dispense reasons to the default 6?')) return;
    setPrefs({ notDispensedReasons: DEFAULT_NON_DISPENSE_REASONS.slice() });

  const resetTargetsBtn = document.getElementById('set-targets-reset');
  if (resetTargetsBtn) {
    resetTargetsBtn.addEventListener('click', () => {
      if (!confirm('Reset all KPI targets to the default values?')) return;
      for (const t of TARGET_KEYS) {
        const el = document.getElementById(`set-target-${t.key}`);
        if (el && Number.isFinite(DEFAULT_TARGETS[t.key])) el.value = String(DEFAULT_TARGETS[t.key]);
        if (t.periodic) {
          for (const period of ['daily', 'weekly']) {
            const pEl = document.getElementById(`set-target-${t.key}_${period}`);
            if (pEl) pEl.value = '';
          }
        }
      }
      toast('Targets reset — click Save settings to keep them.', 'success');
    });
  }
}

/* ============================================================================
 * Utilities
 * ============================================================================ */
function escapeHTML(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escapeAttr(s) { return escapeHTML(s); }

/* ============================================================================
 * Theme (light / dark)
 * ============================================================================ */
const THEME_KEY = 'DOMOPTOM_THEME_V1';
function getTheme() {
  try { return Store.getItem(THEME_KEY) === 'dark' ? 'dark' : 'light'; }
  catch { return 'light'; }
}
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme === 'dark' ? 'dark' : 'light';
}
function setTheme(theme) {
  try { Store.setItem(THEME_KEY, theme); } catch {}
  applyTheme(theme);
}
// Apply a best-effort theme synchronously (reads localStorage mirror if present)
// so we don't flash a wrong theme before Store.init resolves.
try {
  const cachedTheme = localStorage.getItem(THEME_KEY);
  applyTheme(cachedTheme === 'dark' ? 'dark' : 'light');
} catch { applyTheme('light'); }

/* ============================================================================
 * Boot
 * ============================================================================ */
(async function boot() {
  try {
    await Store.init();
  } catch (e) {
    console.warn('Store.init failed, continuing with localStorage only:', e);
  }
  // Re-apply theme now that Store cache is populated (IDB value wins).
  applyTheme(getTheme());

  Users.load();
  State.load();
  // Migration: any patient or mileage entry without a userId is treated as belonging
  // to optom1 (ensures legacy data is visible to optom1 by default).
  (function migrateLegacyData() {
    let changed = false;
    for (const p of State.patients) {
      if (!p.userId) { p.userId = 'user-optom'; changed = true; }
    }
    if (changed) State.save();
    try {
      const log = loadMileage();
      let mChanged = false;
      for (const e of (log.entries || [])) {
        if (!e.userId) { e.userId = 'user-optom'; mChanged = true; }
      }
      if (mChanged) saveMileage(log);
    } catch {}
  })();
  if (isAuthed()) showApp(); else showLogin();
})();
</script>
</body>
</html>
