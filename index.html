      <button class="tab ${unit==='week'?'active':''}" data-bestof-unit="week">Weekly</button>
      <button class="tab ${unit==='month'?'active':''}" data-bestof-unit="month">Monthly</button>
    </div>`;
  if (!best) return `
    <div class="card mb-4">
      <div class="card-head">
        <div><h3 class="card-title">Best of</h3><div class="card-sub">All-time records, calculated per ${unitLabel}.</div></div>
        ${tabSwitch}
      </div>
      <div class="card-body"><div class="empty" style="padding: 24px 0;"><p>No data yet.</p></div></div>
    </div>`;
  const rowHTML = (title, hint, cell, format) => {
    if (!cell) {
      return `
        <div class="best-row">
          <div class="best-row-title">${title}</div>
          <div class="best-row-value text-muted">—</div>
          <div class="best-row-when text-muted">${hint || `Need at least ${best.counts.minVisits} ${unitLabel}s of data`}</div>
        </div>`;
    }
    return `
      <div class="best-row">
        <div class="best-row-title">${title}</div>
        <div class="best-row-value">${format(cell)}</div>
        <div class="best-row-when">${escapeHTML(cell.label)}</div>
      </div>`;
  };
  return `
    <div class="card mb-4">
      <div class="card-head">
        <div>
          <h3 class="card-title">Best of</h3>
          <div class="card-sub">All-time records, calculated per ${unitLabel}.</div>
        </div>
        ${tabSwitch}
      </div>
      <div class="card-body">
        <div class="best-grid">
          ${rowHTML('Best revenue', '', best.bestRevenue, c => `£${c.revenue.toFixed(2)}`)}
          ${rowHTML('Best conversion', '', best.bestConversion, c => `${c.conversion.toFixed(1)}% <span class="text-muted" style="font-size:11px;">(${c.dispensed}/${c.total})</span>`)}
          ${rowHTML('Best ATV', '', best.bestAtv, c => `£${c.atv.toFixed(2)}`)}
          ${rowHTML('Best AOV', '', best.bestAov, c => `£${c.aov.toFixed(2)}`)}
          ${rowHTML('Best additional pair %', '', best.bestAdditionalPct, c => `${c.additionalPct.toFixed(0)}%`)}
          ${rowHTML('Lowest reglaze rate', '', best.lowestReglazePct, c => `${c.reglazePct.toFixed(0)}% <span class="text-muted" style="font-size:11px;">(${c.reglazePairs}/${c.dispensedPairs})</span>`)}
        </div>
      </div>
    </div>`;
}

function renderDashboard() {
  const root = document.getElementById('route-dashboard');
  // Each user (including admin) only sees their own data on the personal dashboard.
  // Admins use the OVERSIGHT tab to view team-wide / individual user metrics.
  const all = currentUserPatients();
  const range = __dashState.range; // 'week' | 'month' | 'quarter' | 'year'
  const anchor = dashAnchor();

  const curWin = periodWindow(range, anchor);
  const cur = periodMetrics(all, curWin);
  const filtered = cur.patients;

  // Trailing 3 same-length periods (immediately preceding `cur`).
  const trailing = [1, 2, 3].map(i => periodMetrics(all, periodWindow(range, stepAnchorN(range, anchor, -i))));
  const avgRevenuePrev3 = (trailing[0].revenue + trailing[1].revenue + trailing[2].revenue) / 3;
  // Per-KPI rolling-3 averages. The user can pick an independent cadence in
  // Filters (e.g. "3-week avg" while viewing daily) — the average is always
  // expressed in the *active range's* unit, so on Daily+Week it shows the
  // average DAILY revenue across the trailing 3 weeks (not the weekly total).
  const rollPeriod = __dashState.rollingPeriod || range;
  const rollTrailing = (rollPeriod === range)
    ? trailing
    : [1, 2, 3].map(i => periodMetrics(all, periodWindow(rollPeriod, stepAnchorN(rollPeriod, anchor, -i))));
  // Sum-like KPIs (totals: revenue) must be rescaled from rollPeriod units to range units.
  // Rate-like KPIs (conversion, ATV, AOV, %s) are already per-unit — averaging is enough.
  const SUM_KEYS = new Set(['revenue']);
  const unitsPerRoll = unitsPerRangeIn(range, rollPeriod);
  const roll3 = (key) => {
    const vals = rollTrailing.map(t => kpiValueByKey(t, key)).filter(v => Number.isFinite(v));
    if (vals.length === 0) return null;
    if (SUM_KEYS.has(key)) {
      // Sum all three roll windows, then divide by the total range-units they cover.
      // Example: range=day, rollPeriod=week → sum 3 weekly revenues, divide by 15 working days.
      const total = vals.reduce((a, b) => a + b, 0);
      const denom = unitsPerRoll * vals.length;
      return denom > 0 ? total / denom : null;
    }
    return vals.reduce((a, b) => a + b, 0) / vals.length;
  };

  // Filtered-period totals used by old KPI/chart code below.
  const total = cur.total;
  const dispensed = cur.dispensed;
  const nonDispensed = total - dispensed;
  const revenue = cur.revenue;
  const aov = cur.aov;
  const conversion = cur.conversion;
  const atv = cur.atv;
  const additionalPct = cur.additionalPct;
  const referrals = filtered.filter(p => p.clinicalReferral).length;
  const totalFrames = filtered.reduce((a, p) => a + patientFramesCount(p), 0);
  const totalReglazes = filtered.reduce((a, p) => a + patientReglazes(p), 0);

  // Loss profile: per non-dispensed PAIR (richer signal than per-patient)
  const lossCounts = new Map();
  for (const p of filtered) {
    for (const pair of (p.pairs || [])) {
      if (pair.dispensed) continue;
      const key = pair.nonDispenseReason || 'Unspecified';
      lossCounts.set(key, (lossCounts.get(key) || 0) + 1);
    }
  }
  const lossArr = [...lossCounts.entries()]
    .map(([name, value]) => ({ name, value }))
    .sort((a, b) => b.value - a.value);
  const lossTotal = lossArr.reduce((a, x) => a + x.value, 0);

  // Series buckets: weekly → 7 days; monthly → each day of month; quarterly → ~13 weeks; yearly → 12 months.
  const series = buildSeries(range, curWin, filtered);

  if (all.length === 0) {
    root.innerHTML = `
      <div class="page">
        ${dashHeadHTML(curWin)}
        <div class="card">
          <div class="empty">
            <div class="icon">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
            </div>
            <h3>No records yet</h3>
            <p>Add your first visit to see total revenue, average order value, conversion rate, and your loss profile here.</p>
            <div class="flex gap-2" style="justify-content: center;">
              <button class="btn btn-primary" onclick="navigate('new')">Add first patient</button>
              <button class="btn" onclick="navigate('map')">Plan route</button>
            </div>
          </div>
        </div>
      </div>`;
    bindDashHead();
    return;
  }

  const trailLabel = range === 'day' ? '3-day avg' : range === 'week' ? '3-week avg' : range === 'month' ? '3-month avg' : range === 'quarter' ? '3-quarter avg' : '3-year avg';
  const revDelta = revenue - avgRevenuePrev3;
  const revDeltaPct = avgRevenuePrev3 > 0 ? (revDelta / avgRevenuePrev3) * 100 : 0;

  // Compute KPI overlays (targets + best of), driven by toggles.
  const targetsOn = !!__dashState.targetsOn;
  const showBestOf = !!getPrefs().showBestOf;
  const prefs = getPrefs();
  const scale = targetScaleFor(range);
  // Best of stats for inline display (calculated at the user-chosen unit).
  const bestUnit = __dashState.bestOfUnit || bestOfUnitForRange(range);
  const bestStats = showBestOf ? bestOfBuckets(all, bestUnit) : null;
  // Map dashboard range to a target lookup period for volume KPIs.
  // 'week' → weekly override (or monthly÷4.345), 'month' → monthly,
  // 'quarter' → monthly×3, 'year' → monthly×12.
  const targetPeriod = range === 'day' ? 'daily'
    : range === 'week' ? 'weekly'
    : range === 'month' ? 'monthly'
    : range === 'quarter' ? 'quarter'
    : range === 'year' ? 'year' : 'monthly';
  // Per-KPI helpers.
  function tgt(key) {
    if (!targetsOn) return null;
    const meta = TARGET_KEYS.find(t => t.key === key);
    if (!meta) return null;
    let target;
    if (meta.noScale) {
      target = prefs.targets?.[key];
      if (!Number.isFinite(target)) return null;
    } else if (meta.periodic) {
      target = periodicTargetFor(prefs.targets, key, targetPeriod);
      if (!Number.isFinite(target)) return null;
    } else {
      const monthly = prefs.targets?.[key];
      if (!Number.isFinite(monthly)) return null;
      target = monthly * scale;
    }
    return { meta, target };
  }
  function cmpFor(key, actual) {
    const t = tgt(key);
    if (!t) return null;
    return compareToTarget(actual, t.target, t.meta.dir, t.meta.kind);
  }
  function bestFor(key) {
    if (!showBestOf) return null;
    return bestForKpi(bestStats, key);
  }
  const pairsPerPatientVal = dispensed > 0 ? (cur.dispensedPairs / dispensed) : 0;
  const reglazeShareVal = totalFrames > 0 ? (totalReglazes / Math.max(totalFrames, 1)) * 100 : 0;
  const nonDispensedPctVal = total > 0 ? (nonDispensed / total) * 100 : 0;

  // Rolling-3 average toggle. When on, each KPI tile shows a small sub-line
  // "3-{period} avg · X" derived from the previous three same-length windows.
  const rolling3On = !!__dashState.rolling3On;
  // When rolling cadence matches active range, label is e.g. "3-day avg".
  // When they differ, label conveys the per-range scaling: e.g. on Daily+Week it reads "3-wk avg / day".
  const rollUnitWord = (p) => p === 'day' ? 'day' : p === 'week' ? 'wk' : p === 'month' ? 'mo' : p === 'quarter' ? 'qtr' : 'yr';
  const rollLabel = rollPeriod === range
    ? `3-${rollUnitWord(rollPeriod)} avg`
    : `3-${rollUnitWord(rollPeriod)} avg / ${rollUnitWord(range)}`;
  const rollFor = (key, fmt) => {
    if (!rolling3On) return null;
    const v = roll3(key);
    if (v == null) return null;
    return { label: rollLabel, text: fmt(v) };
  };
  const fmtCur = (v) => `£${Number(v).toFixed(0)}`;
  const fmtPctOne = (v) => `${Number(v).toFixed(1)}%`;
  const fmtPctZero = (v) => `${Number(v).toFixed(0)}%`;
  const fmtDecTwo = (v) => Number(v).toFixed(2);

  root.innerHTML = `
    <div class="page dash-page">
      ${dashHeadHTML(curWin)}
      <div class="row cols-4 mb-3 dash-kpis">
        ${kpiHTML('Total revenue', `£${revenue.toFixed(2)}`, `${total} visit${total === 1 ? '' : 's'}`, 'trending', false, { cmp: cmpFor('revenue', revenue), best: bestFor('revenue'), roll: rollFor('revenue', fmtCur) })}
        ${kpiHTML('Conversion rate', `${conversion.toFixed(1)}%`, `${dispensed} of ${total}`, 'target', false, { cmp: cmpFor('conversion', conversion), best: bestFor('conversion'), roll: rollFor('conversion', fmtPctOne) })}
        ${kpiHTML('Avg transaction value', `£${atv.toFixed(2)}`, `revenue ÷ ${total} visit${total === 1 ? '' : 's'}`, 'shopping', false, { cmp: cmpFor('atv', atv), best: bestFor('atv'), roll: rollFor('atv', fmtCur) })}
        ${kpiHTML('Avg order value', `£${aov.toFixed(2)}`, `revenue ÷ ${cur.dispensedPairs} pair${cur.dispensedPairs === 1 ? '' : 's'}`, 'shopping', false, { cmp: cmpFor('aov', aov), best: bestFor('aov'), roll: rollFor('aov', fmtCur) })}
      </div>
      <div class="row cols-4 mb-3 dash-kpis">
        ${kpiHTML('Additional pair %', `${additionalPct.toFixed(0)}%`, `${cur.additionalPairVisits} of ${dispensed} dispensed`, 'layers', false, { cmp: cmpFor('additionalPct', additionalPct), best: bestFor('additionalPct'), roll: rollFor('additionalPct', fmtPctZero) })}
        ${kpiHTML('Non-dispensed %', `${nonDispensedPctVal.toFixed(0)}%`, `${nonDispensed} of ${total} visit${total === 1 ? '' : 's'}`, 'alert', false, { cmp: cmpFor('nonDispensedPct', nonDispensedPctVal), roll: rollFor('nonDispensedPct', fmtPctZero) })}
        ${kpiHTML('Reglaze share', totalFrames > 0 ? `${reglazeShareVal.toFixed(0)}%` : '0%', 'of total frames', 'recycle', false, { cmp: cmpFor('reglazePct', reglazeShareVal), best: bestFor('reglazePct'), roll: rollFor('reglazePct', fmtPctZero) })}
        ${kpiHTML('Px cancelled %', `${cur.cancelledPct.toFixed(0)}%`, `${cur.cancelledVisits} of ${total} visit${total === 1 ? '' : 's'}`, 'alert', false, { roll: rollFor('cancelledPct', fmtPctZero) })}
      </div>

      <div class="row" style="grid-template-columns: 2fr 1fr;">
        <div class="card dash-chart-card">
          <div class="card-head">
            <div>
              <h3 class="card-title">Revenue trend</h3>
              <div class="card-sub">${range === 'day' ? 'Trailing 7 days, ending on selected date.' : range === 'week' ? 'Per day, selected week.' : range === 'month' ? 'Per day, selected month.' : range === 'quarter' ? 'Per ISO week, selected quarter.' : 'Per month, selected year.'}</div>
            </div>
          </div>
          <div class="card-body">
            <div style="height: 160px; position: relative;">
              <canvas id="revChart"></canvas>
            </div>
          </div>
        </div>

        <div class="card dash-chart-card">
          <div class="card-head">
            <div>
              <h3 class="card-title">Loss profile</h3>
              <div class="card-sub">${lossTotal === 0 ? 'No non-dispensed pairs.' : `${lossTotal} non-dispensed pair${lossTotal === 1 ? '' : 's'}`}</div>
            </div>
          </div>
          <div class="card-body">
            <div style="height: 160px; position: relative;">
              ${lossTotal === 0
                ? '<div class="empty" style="padding: 30px 0;"><p>Nothing to show.</p></div>'
                : '<canvas id="lossChart"></canvas>'}
            </div>
            ${lossArr.length === 0 ? '' : `
            <div class="loss-inline">
              ${lossArr.map((row, i) => `
                <div class="loss-inline-row" title="${escapeAttr(row.name)}">
                  <span class="loss-dot" style="background: ${PIE_COLORS[i % PIE_COLORS.length]}"></span>
                  <span class="loss-name">${escapeHTML(row.name)}</span>
                  <span class="loss-count">${row.value}</span>
                  <span class="loss-pct">${((row.value / lossTotal) * 100).toFixed(0)}%</span>
                </div>
              `).join('')}
            </div>`}
          </div>
        </div>
      </div>
    </div>`;

  bindDashHead();

  // Charts
  if (__dashState.revenueChart) __dashState.revenueChart.destroy();
  if (__dashState.lossChart) __dashState.lossChart.destroy();

  const revCanvas = document.getElementById('revChart');
  if (revCanvas) {
    __dashState.revenueChart = new Chart(revCanvas, {
      type: 'bar',
      data: {
        labels: series.map(s => s.label),
        datasets: [{
          label: 'Revenue (£)',
          data: series.map(s => s.revenue),
          backgroundColor: PIE_COLORS[0],
          borderRadius: 4,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { ticks: { font: { size: 11 }, callback: (v) => '£' + v }, grid: { color: '#eee' } },
        },
      },
    });
  }

  const lossCanvas = document.getElementById('lossChart');
  if (lossCanvas && lossArr.length > 0) {
    __dashState.lossChart = new Chart(lossCanvas, {
      type: 'doughnut',
      data: {
        labels: lossArr.map(x => x.name),
        datasets: [{
          data: lossArr.map(x => x.value),
          backgroundColor: lossArr.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]),
          borderWidth: 2, borderColor: '#fff',
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '62%',
        plugins: {
          legend: { display: false },
        },
      },
    });
  }
}

function countDispensedPairs(patients) {
  return patients.reduce((a, p) => a + (p.pairs || []).filter(x => x.dispensed).length, 0);
}
function countNonDispensedPairs(patients) {
  return patients.reduce((a, p) => a + (p.pairs || []).filter(x => !x.dispensed).length, 0);
}

function dashHeadHTML(curWin) {
  const r = __dashState.range;
  const lbl = curWin ? periodLabel(r, curWin) : '';
  const stepUnit = r === 'day' ? 'day' : r === 'week' ? 'week' : r === 'month' ? 'month' : r === 'quarter' ? 'quarter' : 'year';
  const showBestOf = !!getPrefs().showBestOf;
  const targetsOn = !!__dashState.targetsOn;
  const rolling3On = !!__dashState.rolling3On;
  const rollPeriod = __dashState.rollingPeriod || r;
  const bestUnit = __dashState.bestOfUnit || bestOfUnitForRange(r);
  // The period button shows the current label and opens a calendar popover.
  const popover = __dashState.calendarOpen ? calendarPopoverHTML(r, curWin) : '';
  // Count active filters for the dropdown button badge.
  const activeFilterCount = (targetsOn ? 1 : 0) + (showBestOf ? 1 : 0) + (rolling3On ? 1 : 0);
  const filtersOpen = !!__dashState.filtersOpen;
  return `
    <div class="page-head dash-head">
      <div class="dash-head-title">
        <h1>Dashboard</h1>
        <p>${lbl ? escapeHTML(lbl) + ' · ' : ''}Performance, conversion, additional-pair rate, and Best of overlays.</p>
      </div>
      <div class="dash-head-controls">
        <div class="tabs dash-tabs">
          <button class="tab ${r==='day'?'active':''}" data-range="day">Daily</button>
          <button class="tab ${r==='week'?'active':''}" data-range="week">Weekly</button>
          <button class="tab ${r==='month'?'active':''}" data-range="month">Monthly</button>
          <button class="tab ${r==='quarter'?'active':''}" data-range="quarter">Quarterly</button>
          <button class="tab ${r==='year'?'active':''}" data-range="year">Annual</button>
        </div>
        <div class="period-picker" title="Pick a ${stepUnit}">
          <button class="tab" data-step="prev" aria-label="Previous ${stepUnit}">◀</button>
          <button class="tab period-picker-btn ${__dashState.calendarOpen ? 'active' : ''}" data-period-open title="Open calendar">
            ${escapeHTML(lbl || ('This ' + stepUnit))} <span class="period-caret">▾</span>
          </button>
          <button class="tab" data-step="next" aria-label="Next ${stepUnit}">▶</button>
          ${popover}
        </div>
        <div class="dash-filters" style="position: relative;">
          <button class="tab ${filtersOpen ? 'active' : ''}" data-filters-open type="button" aria-haspopup="true" aria-expanded="${filtersOpen}" title="Dashboard overlay filters">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" style="vertical-align: -2px; margin-right: 4px;"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Filters${activeFilterCount > 0 ? ` <span class="filter-count-badge">${activeFilterCount}</span>` : ''}
            <span class="period-caret">▾</span>
          </button>
          ${filtersOpen ? `
          <div class="period-popover filters-popover" data-filters-popover>
            <div class="filters-section">
              <label class="filters-row" title="Compare actual KPIs to targets set in Settings">
                <input type="checkbox" data-toggle="targets" ${targetsOn ? 'checked' : ''}>
                <span>Targets</span>
                <span class="filters-row-help">Compare to KPI targets</span>
              </label>
              <label class="filters-row" title="Show all-time best records on each KPI">
                <input type="checkbox" data-toggle="bestof" ${showBestOf ? 'checked' : ''}>
                <span>Best of</span>
                <span class="filters-row-help">All-time best per KPI</span>
              </label>
              <label class="filters-row" title="Show a rolling 3-period average sub-line on each KPI">
                <input type="checkbox" data-toggle="rolling3" ${rolling3On ? 'checked' : ''}>
                <span>3-period avg</span>
                <span class="filters-row-help">Trailing 3-window average</span>
              </label>
            </div>
            ${showBestOf ? `
            <div class="filters-section">
              <div class="filters-section-label">Best of bucket size</div>
              <div class="tabs dash-tabs" style="margin-top: 6px;">
                <button class="tab ${bestUnit==='day'?'active':''}" data-bestof-unit="day" type="button">Daily</button>
                <button class="tab ${bestUnit==='week'?'active':''}" data-bestof-unit="week" type="button">Weekly</button>
                <button class="tab ${bestUnit==='month'?'active':''}" data-bestof-unit="month" type="button">Monthly</button>
              </div>
            </div>` : ''}
            ${rolling3On ? `
            <div class="filters-section">
              <div class="filters-section-label">3-period avg cadence</div>
              <div class="tabs dash-tabs" style="margin-top: 6px;">
                <button class="tab ${rollPeriod==='day'?'active':''}" data-roll-period="day" type="button">Day</button>
                <button class="tab ${rollPeriod==='week'?'active':''}" data-roll-period="week" type="button">Week</button>
                <button class="tab ${rollPeriod==='month'?'active':''}" data-roll-period="month" type="button">Month</button>

// ----- Calendar popover for the dashboard period picker --------------------
// For each range, render the appropriate selector inside a small popover.
// Weekly: a month grid where each Sunday-row is selectable + week number.
// Monthly/Quarterly: a year grid; Annual: list of years.
function calendarPopoverHTML(range, curWin) {
  const today = new Date();
  const calMonth = __dashState.calendarMonth ? new Date(__dashState.calendarMonth) : new Date(curWin.start);
  const monthName = calMonth.toLocaleString('en-GB', { month: 'long', year: 'numeric' });
  if (range === 'day') {
    return `
      <div class="period-popover" data-period-popover>
        <div class="period-popover-head">
          <button class="btn btn-sm" data-cal-step="prev" aria-label="Previous month">◀</button>
          <div class="period-popover-title">${escapeHTML(monthName)}</div>
          <button class="btn btn-sm" data-cal-step="next" aria-label="Next month">▶</button>
        </div>
        ${dayGridHTML(calMonth, curWin)}
        <div class="period-popover-foot">
          <button class="btn btn-sm" data-cal-today type="button">Go to today</button>
        </div>
      </div>`;
  }
  if (range === 'week') {
    return `
      <div class="period-popover" data-period-popover>
        <div class="period-popover-head">
          <button class="btn btn-sm" data-cal-step="prev" aria-label="Previous month">◀</button>
          <div class="period-popover-title">${escapeHTML(monthName)}</div>
          <button class="btn btn-sm" data-cal-step="next" aria-label="Next month">▶</button>
        </div>
        ${weekGridHTML(calMonth, curWin)}
      </div>`;
  }
  if (range === 'month') {
    return `
      <div class="period-popover" data-period-popover>
        <div class="period-popover-head">
          <button class="btn btn-sm" data-cal-step="prev-year" aria-label="Previous year">◀</button>
          <div class="period-popover-title">${calMonth.getFullYear()}</div>
          <button class="btn btn-sm" data-cal-step="next-year" aria-label="Next year">▶</button>
        </div>
        ${monthGridHTML(calMonth.getFullYear(), curWin)}
      </div>`;
  }
  if (range === 'quarter') {
    return `
      <div class="period-popover" data-period-popover>
        <div class="period-popover-head">
          <button class="btn btn-sm" data-cal-step="prev-year" aria-label="Previous year">◀</button>
          <div class="period-popover-title">${calMonth.getFullYear()}</div>
          <button class="btn btn-sm" data-cal-step="next-year" aria-label="Next year">▶</button>
        </div>
        ${quarterGridHTML(calMonth.getFullYear(), curWin)}
      </div>`;
  }
  // Annual: a list of years centred on the current selection.
  return `
    <div class="period-popover" data-period-popover>
      ${yearGridHTML(calMonth.getFullYear(), curWin)}
    </div>`;
}

// Daily picker: a full Sun–Sat day grid for `calMonth`. The selected day is highlighted.
function dayGridHTML(calMonth, curWin) {
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const sundayBeforeFirst = new Date(firstOfMonth);
  sundayBeforeFirst.setDate(firstOfMonth.getDate() - firstOfMonth.getDay());
  const todayIso = isoDateStr(startOfDay(new Date()));
  const selectedIso = curWin ? isoDateStr(curWin.start) : null;
  const headers = ['S','M','T','W','T','F','S']
    .map(h => `<div class="period-day-header">${h}</div>`).join('');
  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(sundayBeforeFirst);
    d.setDate(sundayBeforeFirst.getDate() + i);
    const within = d.getMonth() === month;
    if (!within && i >= 35) break;
    const iso = isoDateStr(d);
    const sel = iso === selectedIso;
    const today = iso === todayIso;
    const weekend = d.getDay() === 0 || d.getDay() === 6;
    const cls = ['period-cell','period-cell--day'];
    if (sel) cls.push('is-selected');
    if (!within) cls.push('is-other-month');
    if (today && !sel) cls.push('is-today');
    if (weekend) cls.push('is-weekend');
    // Weekend cells are disabled — business runs Mon–Fri only.
    if (weekend) {
      cells.push(`<button class="${cls.join(' ')}" disabled aria-disabled="true" title="Closed (weekend)" type="button" tabindex="-1">${d.getDate()}</button>`);
    } else {
      cells.push(`<button class="${cls.join(' ')}" data-pick-day="${iso}" type="button">${d.getDate()}</button>`);
    }
  }
  return `<div class="period-grid period-grid--days">${headers}${cells.join('')}</div>`;
}

function weekGridHTML(calMonth, curWin) {
  // Show 6 Sunday-rows that cover the calendar month plus overflow.
  const firstOfMonth = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
  const sundayBeforeFirst = new Date(firstOfMonth);
  sundayBeforeFirst.setDate(firstOfMonth.getDate() - firstOfMonth.getDay());
  const rows = [];
  for (let r = 0; r < 6; r++) {
    const sunday = new Date(sundayBeforeFirst);
    sunday.setDate(sundayBeforeFirst.getDate() + r * 7);
    const saturday = new Date(sunday);
    saturday.setDate(sunday.getDate() + 6);
    const wkNum = sundayWeekNumber(sunday);
    const sel = curWin && +sunday === +curWin.start;
    const within = sunday.getMonth() === calMonth.getMonth() || saturday.getMonth() === calMonth.getMonth();
    if (!within && r >= 5) break;
    const fmt = (d) => `${String(d.getDate()).padStart(2,'0')} ${d.toLocaleString('en-GB',{month:'short'})}`;
    rows.push(`
      <button class="period-cell period-cell--week ${sel ? 'is-selected' : ''} ${within ? '' : 'is-other-month'}"
              data-pick-week="${isoDateStr(sunday)}" type="button">
        <span class="period-cell-num">W${wkNum}</span>
        <span class="period-cell-range">${fmt(sunday)} – ${fmt(saturday)}</span>
      </button>`);
  }
  return `<div class="period-grid period-grid--weeks">${rows.join('')}</div>`;
}

function monthGridHTML(year, curWin) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `<div class="period-grid period-grid--months">${
    months.map((m, i) => {
      const sel = curWin && curWin.start.getFullYear() === year && curWin.start.getMonth() === i;
      return `<button class="period-cell ${sel ? 'is-selected' : ''}" data-pick-month="${year}-${String(i+1).padStart(2,'0')}" type="button">${m}</button>`;
    }).join('')
  }</div>`;
}

function quarterGridHTML(year, curWin) {
  return `<div class="period-grid period-grid--quarters">${
    [0,1,2,3].map(q => {
      const sel = curWin && curWin.start.getFullYear() === year && Math.floor(curWin.start.getMonth()/3) === q;
      const months = ['Jan–Mar','Apr–Jun','Jul–Sep','Oct–Dec'][q];
      return `<button class="period-cell period-cell--quarter ${sel ? 'is-selected' : ''}" data-pick-quarter="${year}-Q${q+1}" type="button"><div>Q${q+1}</div><div class="period-cell-sub">${months}</div></button>`;
    }).join('')
  }</div>`;
}

function yearGridHTML(centerYear, curWin) {
  // Render an 8-year ladder around the current year (or centre).
  const start = centerYear - 4;
  const yrs = Array.from({length: 8}, (_, i) => start + i);
  return `<div class="period-grid period-grid--years">${
    yrs.map(y => {
      const sel = curWin && curWin.start.getFullYear() === y;
      return `<button class="period-cell ${sel ? 'is-selected' : ''}" data-pick-year="${y}" type="button">${y}</button>`;
    }).join('')
  }</div>`;
}

// Build a daily/weekly/monthly bucket series for the current window so the
// revenue chart auto-scales with the chosen period.
function buildSeries(range, win, patients) {
  const out = [];
  const dayMs = 24 * 60 * 60 * 1000;
  const fmtDate = (d) => d.toISOString().slice(0,10);
  const startOfWeek = (d) => {
    const x = startOfDay(d); const day = x.getDay();
    const off = day === 0 ? -6 : 1 - day; x.setDate(x.getDate() + off); return x;
  };
  if (range === 'day') {
    // Trailing 7 working days (Mon–Fri) ending on (and including) the selected day.
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const days = [];
    let cursor = new Date(win.start);
    while (days.length < 7) {
      if (cursor.getDay() !== 0 && cursor.getDay() !== 6) days.unshift(new Date(cursor));
      cursor = new Date(cursor.getTime() - dayMs);
    }
    for (const d of days) {
      const iso = fmtDate(d);
      const day = patients.filter(p => p.visitDate === iso);
      out.push({
        label: dayNames[d.getDay()] + ' ' + String(d.getDate()).padStart(2,'0'),
        revenue: day.reduce((a,p) => a + patientTotal(p), 0),
        visits: day.length,
      });
    }
  } else if (range === 'week') {
    for (let i = 0; i < 7; i++) {
      const d = new Date(win.start.getTime() + i * dayMs);
      const iso = fmtDate(d);
      const day = patients.filter(p => p.visitDate === iso);
      out.push({ label: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i], revenue: day.reduce((a,p) => a + patientTotal(p), 0), visits: day.length });
    }
  } else if (range === 'month') {
    const last = new Date(win.end.getTime() - dayMs);
    const days = last.getDate();
    for (let i = 0; i < days; i++) {
      const d = new Date(win.start); d.setDate(win.start.getDate() + i);
      const iso = fmtDate(d);
      const day = patients.filter(p => p.visitDate === iso);
      out.push({ label: String(i+1), revenue: day.reduce((a,p) => a + patientTotal(p), 0), visits: day.length });
    }
  } else if (range === 'quarter') {
    // ~13 ISO weeks
    let cursor = startOfWeek(win.start);
    let wkIdx = 1;
    while (cursor < win.end) {
      const next = new Date(cursor); next.setDate(cursor.getDate() + 7);
      const fromISO = fmtDate(cursor), toISO = fmtDate(next);
      const inB = patients.filter(p => p.visitDate >= fromISO && p.visitDate < toISO);
      out.push({ label: `W${wkIdx}`, revenue: inB.reduce((a,p) => a + patientTotal(p), 0), visits: inB.length });
      cursor = next; wkIdx++;
    }
  } else { // year
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    for (let m = 0; m < 12; m++) {
      const start = new Date(win.start.getFullYear(), m, 1);
      const end = new Date(win.start.getFullYear(), m + 1, 1);
      const fromISO = fmtDate(start), toISO = fmtDate(end);
      const inB = patients.filter(p => p.visitDate >= fromISO && p.visitDate < toISO);
      out.push({ label: months[m], revenue: inB.reduce((a,p) => a + patientTotal(p), 0), visits: inB.length });
    }
  }
  return out;
}
// Outside-click handler for the calendar popover. Installed once per page.
let __dashOutsideHandlerInstalled = false;
function installDashOutsideHandler() {
  if (__dashOutsideHandlerInstalled) return;
  __dashOutsideHandlerInstalled = true;
  document.addEventListener('click', (e) => {
    const t = e.target;
    let changed = false;
    // Close calendar popover when clicking outside the period picker.
    if (__dashState.calendarOpen) {
      if (!(t && t.closest && t.closest('.period-picker'))) {
        __dashState.calendarOpen = false;
        changed = true;
      }
    }
    // Close filters dropdown when clicking outside the filters control.
    if (__dashState.filtersOpen) {
      if (!(t && t.closest && t.closest('.dash-filters'))) {
        __dashState.filtersOpen = false;
        changed = true;
      }
    }
    if (changed && document.getElementById('route-dashboard')) renderDashboard();
  });
}

function bindDashHead() {
  installDashOutsideHandler();
  // Range tabs (Weekly / Monthly / Quarterly / Annual). When the user switches
  // range we keep the anchorDate so the new view 'snaps' to the parent that
  // contains the previously selected period (e.g. week→containing month).
  document.querySelectorAll('[data-range]').forEach(btn => {
    btn.addEventListener('click', () => {
      __dashState.range = btn.dataset.range;
      __dashState.calendarOpen = false;
      __dashState.filtersOpen = false;
      renderDashboard();
    });
  });
  // Filters dropdown open/close (clicking the Filters button toggles it).
  document.querySelectorAll('[data-filters-open]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      __dashState.filtersOpen = !__dashState.filtersOpen;
      if (__dashState.filtersOpen) __dashState.calendarOpen = false;
      renderDashboard();
    });
  });
  // Toggle checkboxes (Targets / Best of / 3-period avg). Keep dropdown open.
  document.querySelectorAll('[data-toggle]').forEach(input => {
    input.addEventListener('change', (e) => {
      e.stopPropagation();
      const kind = input.dataset.toggle;
      const on = !!input.checked;
      if (kind === 'targets') __dashState.targetsOn = on;
      else if (kind === 'bestof') setPrefs({ showBestOf: on });
      else if (kind === 'rolling3') __dashState.rolling3On = on;
      __dashState.filtersOpen = true; // stay open after toggle
      renderDashboard();
    });
  });
  // Best-of bucket size (only visible when Best of is on). Keep dropdown open.
  document.querySelectorAll('[data-bestof-unit]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      __dashState.bestOfUnit = btn.dataset.bestofUnit; // 'day' | 'week' | 'month'
      __dashState.filtersOpen = true; // stay open after picking unit
      renderDashboard();
    });
  });
  // 3-period avg cadence picker (only visible when rolling3 is on). Keep dropdown open.
  document.querySelectorAll('[data-roll-period]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      __dashState.rollingPeriod = btn.dataset.rollPeriod; // 'day' | 'week' | 'month' | 'quarter' | 'year'
      __dashState.filtersOpen = true; // stay open after picking cadence
      renderDashboard();
    });
  });
  // Period stepper: previous / next moves the anchor by one unit of the range.
  document.querySelectorAll('[data-step]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.step;
      const dir = action === 'prev' ? -1 : action === 'next' ? 1 : 0;
      if (dir !== 0) __dashState.anchorDate = stepAnchor(__dashState.range, dashAnchor(), dir);
      __dashState.calendarOpen = false;
      renderDashboard();
    });
  });
  // Period picker button: open/close the calendar popover.
  document.querySelectorAll('[data-period-open]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const opening = !__dashState.calendarOpen;
      __dashState.calendarOpen = opening;
      if (opening) {
        // Centre the calendar on the currently selected window.
        const cur = periodWindow(__dashState.range, dashAnchor());
        __dashState.calendarMonth = new Date(cur.start);
      }
      renderDashboard();
    });
  });
  // Calendar popover navigation (prev/next month or year).
  document.querySelectorAll('[data-cal-step]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.calStep;
      const cm = __dashState.calendarMonth ? new Date(__dashState.calendarMonth) : new Date();
      if (action === 'prev') cm.setMonth(cm.getMonth() - 1);
      else if (action === 'next') cm.setMonth(cm.getMonth() + 1);
      else if (action === 'prev-year') cm.setFullYear(cm.getFullYear() - 1);
      else if (action === 'next-year') cm.setFullYear(cm.getFullYear() + 1);
      __dashState.calendarMonth = cm;
      renderDashboard();
    });
  });
  // Pickers: week / month / quarter / year. Each sets the anchor and closes.
  // Daily picker: pick a specific day from the calendar grid.
  document.querySelectorAll('[data-pick-day]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const iso = btn.dataset.pickDay; // YYYY-MM-DD
      const [y, m, d] = iso.split('-').map(Number);
      __dashState.anchorDate = new Date(y, m - 1, d);
      __dashState.calendarOpen = false;
      renderDashboard();
    });
  });
  // "Go to today" button inside the daily calendar popover.
  document.querySelectorAll('[data-cal-today]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      __dashState.anchorDate = null; // null = track current day
      __dashState.calendarOpen = false;
      renderDashboard();
    });
  });
  document.querySelectorAll('[data-pick-week]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const iso = btn.dataset.pickWeek; // YYYY-MM-DD (Sunday)
      const [y, m, d] = iso.split('-').map(Number);
      __dashState.anchorDate = new Date(y, m - 1, d);
      __dashState.calendarOpen = false;
      renderDashboard();
    });
  });
  document.querySelectorAll('[data-pick-month]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const v = btn.dataset.pickMonth; // YYYY-MM
      const [y, m] = v.split('-').map(Number);
      __dashState.anchorDate = new Date(y, m - 1, 1);
      __dashState.calendarOpen = false;
      renderDashboard();
    });
  });
  document.querySelectorAll('[data-pick-quarter]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const v = btn.dataset.pickQuarter; // YYYY-Qn
      const m = /^([0-9]+)-Q([1-4])$/.exec(v);
      if (!m) return;
      const y = Number(m[1]);
      const q = Number(m[2]);
      __dashState.anchorDate = new Date(y, (q - 1) * 3, 1);
      __dashState.calendarOpen = false;
      renderDashboard();
    });
  });
  document.querySelectorAll('[data-pick-year]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const y = Number(btn.dataset.pickYear);
      if (!Number.isFinite(y)) return;
      __dashState.anchorDate = new Date(y, 0, 1);
      __dashState.calendarOpen = false;
      renderDashboard();
    });
  });
}

    recycle: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 19H4.815a1.83 1.83 0 0 1-1.57-.881 1.785 1.785 0 0 1-.004-1.784L7.196 9.5"/><path d="M11 19h8.203a1.83 1.83 0 0 0 1.556-.89 1.784 1.784 0 0 0 0-1.775l-1.226-2.12"/><path d="m14 16-3 3 3 3"/><path d="M8.293 13.596 4.196 9.5"/><path d="m16.804 9.5 1.226-2.12a1.785 1.785 0 0 0 0-1.775 1.83 1.83 0 0 0-1.556-.89H7.5"/><path d="m13 4 3 3-3 3"/></svg>',
  };
  // opts.cmp = compareToTarget(...)
  // opts.best = { val, label, fmt, prefix? }
  const cmp = opts.cmp || null;

  const cmpClass = cmp ? (cmp.good === true ? 'kpi-target--good' : cmp.good === false ? 'kpi-target--bad' : 'kpi-target--neutral') : '';
  const targetRow = cmp ? `
        <div class="kpi-target ${cmpClass}">
          <span class="kpi-target-label">Target</span>
          <span class="kpi-target-value">${cmp.targetText}</span>

  const varianceBadge = cmp ? `<span class="kpi-variance kpi-variance--${cmp.good === true ? 'good' : cmp.good === false ? 'bad' : 'neutral'}">${cmp.pctText} · ${cmp.absText}</span>` : '';
  const bestRow = best ? `
        <div class="kpi-best">

  const rollRow = roll ? `
        <div class="kpi-roll">
          <span class="kpi-roll-label">${escapeHTML(roll.label)}</span>
          <span class="kpi-roll-value">${escapeHTML(String(roll.text))}</span>
        </div>` : '';
  return `
    <div class="card">
      <div class="kpi">

          <div class="kpi-label">${label}</div>

        </div>

        <div class="kpi-hint">${hint}</div>

      </div>
    </div>`;
}

  // Programmatically sync the reason <select> to __form.visitNonDispenseReason

  const vReasonSel = document.getElementById('f-visit-reason');

function rerenderPairs() {
  document.getElementById('pairs-container').innerHTML = renderPairs();
  bindPairEvents();
}

function bindPairEvents() {
  document.querySelectorAll('[data-remove-pair]').forEach(btn => {
    btn.addEventListener('click', () => {
      syncForm();
      __form.pairs = __form.pairs.filter(p => p.id !== btn.dataset.removePair);
      if (__form.pairs.length === 0) __form.pairs.push(makePair(0));
      rerenderPairs();
    });
  });
  document.querySelectorAll('.pair').forEach(card => {
    const pairId = card.dataset.pairId;
    card.querySelectorAll('[data-field]').forEach(input => {
      const handler = () => {
        syncForm();
        const idx = __form.pairs.findIndex(p => p.id === pairId);
        if (idx >= 0) {
          const wasFocused = document.activeElement;
          const focusField = wasFocused?.dataset?.field;
          rerenderPairs();
          if (focusField) {
            const newCard = document.querySelector(`.pair[data-pair-id="${pairId}"]`);
            const newInput = newCard?.querySelector(`[data-field="${focusField}"]`);
            newInput?.focus();
            // Number inputs throw on setSelectionRange in some browsers — only on text/textarea.
            if (newInput?.type === 'text' || newInput?.tagName === 'TEXTAREA') {
              try { newInput.setSelectionRange?.(newInput.value.length, newInput.value.length); } catch {}
            }
          }
        }
      };
      if (input.type === 'checkbox' || input.tagName === 'SELECT') {
        input.addEventListener('change', handler);
      }
    });
  });
}

function syncForm() {
  // Reject weekend dates — the practice operates Mon–Fri only. Snap to the previous Friday.
  let _vd = document.getElementById('f-visitDate').value;
  if (_vd) {
    const _d = new Date(_vd + 'T00:00:00');
    if (_d.getDay() === 0 || _d.getDay() === 6) {
      const corrected = toPrevWeekday(_d);
      _vd = `${corrected.getFullYear()}-${String(corrected.getMonth()+1).padStart(2,'0')}-${String(corrected.getDate()).padStart(2,'0')}`;
      document.getElementById('f-visitDate').value = _vd;
      try { toast && toast('Visit date snapped to the previous Friday (Mon–Fri only).'); } catch(_) {}
    }
  }
  __form.visitDate = _vd;
  __form.address = document.getElementById('f-address').value.trim();
  const outcomeEl = document.getElementById('f-visitOutcome');
  if (outcomeEl) __form.visitOutcome = outcomeEl.value || '';
  const gradingEl = document.getElementById('f-grading');
  if (gradingEl) __form.gradingMark = gradingEl.value || '';
  // Visit-level dispense status (mutually exclusive checkboxes).
  const vDispEl = document.getElementById('f-visit-dispensed');
  const vNotDispEl = document.getElementById('f-visit-not-dispensed');
  if (vDispEl && vNotDispEl) {
    if (vDispEl.checked) __form.visitDispensed = true;
    else if (vNotDispEl.checked) __form.visitDispensed = false;
    else __form.visitDispensed = null;
  }
  const vReasonEl = document.getElementById('f-visit-reason');
  if (vReasonEl) {
    __form.visitNonDispenseReason = (__form.visitDispensed === false) ? (vReasonEl.value || '') : '';
  }
  __form.clinicalReferral = document.getElementById('f-referral').checked;
  const refActionedEl = document.getElementById('f-referral-actioned');
  __form.referralActioned = !!(__form.clinicalReferral && refActionedEl && refActionedEl.checked);
  const actionEl = document.getElementById('f-action');
  if (actionEl) __form.additionalActionRequired = actionEl.checked;
  const actActionedEl = document.getElementById('f-action-actioned');
  __form.additionalActionActioned = !!(__form.additionalActionRequired && actActionedEl && actActionedEl.checked);
  __form.notes = document.getElementById('f-notes').value.trim();
  document.querySelectorAll('.pair').forEach(card => {
    const id = card.dataset.pairId;
    const pair = __form.pairs.find(p => p.id === id);
    if (!pair) return;
    const pr = card.querySelector('[data-field="price"]');
    const re = card.querySelector('[data-field="reglaze"]');
    const gt = card.querySelector('[data-field="glassesType"]');
    const sg = card.querySelector('[data-field="sunglasses"]');
    if (pr) pair.price = Math.max(0, parseFloat(pr.value || '0'));
    if (re) pair.reglaze = re.checked;
    if (gt) pair.glassesType = gt.value || '';
    if (sg) pair.sunglasses = sg.checked;
    // Pair-level status mirrors the visit-level decision.
    pair.dispensed = (__form.visitDispensed === true);
    pair.notDispensed = false;
    pair.nonDispenseReason = '';
  });
}

// Auto-save the active form silently. Returns the saved anonId on success,
// or null if nothing was saved (no data, or validation would fail).
// Used when navigating away from a partially-filled active patient form.
function autoSaveActiveFormIfReady() {
  if (!__form) return null;
  // Try to capture any latest input from a currently-rendered form.
  if (document.getElementById('np-form')) {
    try { syncForm(); } catch (e) {}
  }
  const isEdit = !!__form._editingId;
  const hasMeaningfulData = isEdit
    || (__form.notes && __form.notes.trim())
    || __form.visitOutcome
    || __form.clinicalReferral
    || __form.additionalActionRequired
    || __form.visitDispensed != null;
  if (!hasMeaningfulData) return null;
  // Validate visit-level dispense decision. Px Cancelled bypasses pair validation.
  if (__form.visitOutcome !== 'Px Cancelled') {
    if (__form.visitDispensed == null) return null;
    if (__form.visitDispensed === false && !__form.visitNonDispenseReason) return null;
  }
  // Build pairs payload appropriate to the visit-level decision.
  let pairsPayload;
  if (__form.visitOutcome === 'Px Cancelled') {
    pairsPayload = [];
  } else if (__form.visitDispensed === true) {
    pairsPayload = (__form.pairs || []).map(p => ({ ...p, dispensed: true, notDispensed: false, nonDispenseReason: '' }));
    if (pairsPayload.length === 0) pairsPayload = [{ ...makePair(0), dispensed: true }];
  } else {
    // Not dispensed — single synthetic pair captures the reason.
    pairsPayload = [{ ...makePair(0), dispensed: false, notDispensed: true, nonDispenseReason: __form.visitNonDispenseReason }];
  }
  try {
    if (isEdit) {
      const updated = State.update(__form._editingId, {
        visitDate: __form.visitDate,
        visitOutcome: __form.visitOutcome,
        gradingMark: __form.gradingMark,
        pairs: pairsPayload,
        clinicalReferral: __form.clinicalReferral,
        referralActioned: __form.referralActioned,
        additionalActionRequired: __form.additionalActionRequired,
        additionalActionActioned: __form.additionalActionActioned,
        notes: __form.notes,
      });
      return updated && updated.anonId ? updated.anonId : 'patient';
    } else {
      const saved = State.add({
        visitDate: __form.visitDate,
        visitOutcome: __form.visitOutcome,
        gradingMark: __form.gradingMark,
        pairs: pairsPayload,
        clinicalReferral: __form.clinicalReferral,
        referralActioned: __form.referralActioned,
        additionalActionRequired: __form.additionalActionRequired,
        additionalActionActioned: __form.additionalActionActioned,
        notes: __form.notes,
        _preferredLetter: __form._preferredLetter,
      });
      return saved && saved.anonId ? saved.anonId : 'patient';
    }
  } catch (e) {
    console.error('Auto-save failed:', e);
    return null;
  }
}

function handleSavePatient(e) {
  e.preventDefault();
  syncForm();

  // Address is optional now — it's never persisted, only used in-session for
  // route context and to prefill the form when picking an active patient from
  // the route map. Records keep only anonymous, clinical and commercial data.
  let pairsPayload;
  if (__form.visitOutcome === 'Px Cancelled') {
    // Strip any partial pair data since the visit didn't take place.
    pairsPayload = [];
  } else {
    if (__form.visitDispensed == null) {
      toast('Pick Dispensed or Not dispensed in the Visit section', 'error');
      return;
    }
    if (__form.visitDispensed === false) {
      if (!__form.visitNonDispenseReason) {
        toast('Choose a reason for not dispensing', 'error');
        return;
      }
      pairsPayload = [{ ...makePair(0), dispensed: false, notDispensed: true, nonDispenseReason: __form.visitNonDispenseReason }];
    } else {
      // Dispensed — require at least one pair with price > 0 or a glasses type.
      const pairs = (__form.pairs || []).map(p => ({ ...p, dispensed: true, notDispensed: false, nonDispenseReason: '' }));
      const hasContent = pairs.some(p => (p.price && p.price > 0) || (p.glassesType && p.glassesType.trim()));
      if (!hasContent) {
        toast('Add a price or glasses type for at least one pair', 'error');
        return;
      }
      pairsPayload = pairs;
    }
  }

  if (__form._editingId) {
    const updated = State.update(__form._editingId, {
      visitDate: __form.visitDate,
      visitOutcome: __form.visitOutcome,
      gradingMark: __form.gradingMark,
      pairs: pairsPayload,
      clinicalReferral: __form.clinicalReferral,
      referralActioned: __form.referralActioned,
      additionalActionRequired: __form.additionalActionRequired,
      additionalActionActioned: __form.additionalActionActioned,
      notes: __form.notes,
    });
    toast(`${updated.anonId} updated`, 'success');
    __form = freshForm();
    navigate('records');
  } else {
    const saved = State.add({
      visitDate: __form.visitDate,
      visitOutcome: __form.visitOutcome,
      gradingMark: __form.gradingMark,
      pairs: pairsPayload,
      clinicalReferral: __form.clinicalReferral,
      referralActioned: __form.referralActioned,
      additionalActionRequired: __form.additionalActionRequired,
      additionalActionActioned: __form.additionalActionActioned,
      notes: __form.notes,
      _preferredLetter: __form._preferredLetter,
    });
    toast(`Saved ${saved.anonId}`, 'success');
    // Reset form but stay on page; show banner
    __form = freshForm();
    renderNewPatient(__form, saved);
  }
}

let __map = null;

// Targets schema:
//   - Volume KPIs (revenue, pairsDispensed, frames) have separate Daily / Weekly / Monthly
//     inputs. When the dashboard range matches one of those periods we use that exact value;
//     for Quarter/Year we scale Monthly × 3 / × 12.
//   - Rate/average KPIs (conversion %, ATV, AOV, additional pair %, pairs/patient,
//     reglaze %, non-dispensed %) use a single value that's the same across periods.
// Direction tells variance colouring: 'up' = higher is better, 'down' = lower is better.
const TARGET_KEYS = [
  { key: 'revenue', label: 'Total revenue (£)', dir: 'up', kind: 'currency', periodic: true },
  { key: 'pairsDispensed', label: 'Pairs dispensed', dir: 'up', kind: 'integer', periodic: true },
  { key: 'frames', label: 'Frames dispensed', dir: 'up', kind: 'integer', periodic: true },
  { key: 'conversion', label: 'Conversion rate (%)', dir: 'up', kind: 'percent', noScale: true },
  { key: 'nonDispensedPct', label: 'Non-dispensed % (%)', dir: 'down', kind: 'percent', noScale: true },
  { key: 'atv', label: 'Avg transaction value (£)', dir: 'up', kind: 'currency', noScale: true },
  { key: 'aov', label: 'Avg order value (£)', dir: 'up', kind: 'currency', noScale: true },
  { key: 'additionalPct', label: 'Additional pair % (%)', dir: 'up', kind: 'percent', noScale: true },
  { key: 'pairsPerPatient', label: 'Pairs per patient', dir: 'up', kind: 'decimal', noScale: true },
  { key: 'reglazePct', label: 'Reglaze share (%)', dir: 'down', kind: 'percent', noScale: true },
];
// Monthly baselines used as fallbacks. Per-period overrides live alongside as
// `<key>_daily` and `<key>_weekly` when the user has typed them in.
const DEFAULT_TARGETS = {
  revenue: 25000, conversion: 70, atv: 175, aov: 200, additionalPct: 20,
  pairsDispensed: 130, frames: 110, pairsPerPatient: 1.3, reglazePct: 10,
  nonDispensedPct: 30,
};
const TARGET_PERIODS = ['daily', 'weekly', 'monthly'];
// Working days per month assumption for the Daily ↔ Monthly auto-scale display hint.
const DAILY_PERIOD_DIVISOR = 21.7;
// Periodic target lookup. Falls back to scaling Monthly when a period override isn't set.
function periodicTargetFor(targets, key, period) {
  if (!targets) return null;
  if (period === 'daily') {
    const v = targets[`${key}_daily`];
    if (Number.isFinite(v)) return v;
    const m = targets[key];
    return Number.isFinite(m) ? m / DAILY_PERIOD_DIVISOR : null;
  }
  if (period === 'weekly') {
    const v = targets[`${key}_weekly`];
    if (Number.isFinite(v)) return v;
    const m = targets[key];
    return Number.isFinite(m) ? m / 4.345 : null;
  }
  if (period === 'monthly') {
    const m = targets[key];
    return Number.isFinite(m) ? m : null;
  }
  if (period === 'quarter') {
    const m = targets[key];
    return Number.isFinite(m) ? m * 3 : null;
  }
  if (period === 'year') {
    const m = targets[key];
    return Number.isFinite(m) ? m * 12 : null;
  }
  return null;
}
function getPrefs() {
  const fallback = {
    tomtomKey: '', bufferMode: 'smart', bufferPct: 20, arrivalCushionMin: 5,
    homeAddress: '', homeLat: null, homeLng: null, homeDisplay: '',
    departFromHome: '', includeHomeOnMap: true, showRouteOnMap: false,
    notDispensedReasons: DEFAULT_NON_DISPENSE_REASONS.slice(),
    assumedFinalVisitMin: DEFAULT_LAST_APPT_DURATION_MIN,
    showBestOf: true,
    eodEmailTo: '',
    targets: { ...DEFAULT_TARGETS },
  };
  try {
    const p = JSON.parse(Store.getItem(PREFS_KEY) || '{}');
    return {
      tomtomKey: p.tomtomKey || '',
      bufferMode: p.bufferMode || 'smart', // 'smart' | 'fixed'
      bufferPct: typeof p.bufferPct === 'number' ? p.bufferPct : 20,
      arrivalCushionMin: typeof p.arrivalCushionMin === 'number' ? p.arrivalCushionMin : 5,
      homeAddress: p.homeAddress || '',
      homeLat: typeof p.homeLat === 'number' ? p.homeLat : null,
      homeLng: typeof p.homeLng === 'number' ? p.homeLng : null,
      homeDisplay: p.homeDisplay || '',
      departFromHome: p.departFromHome || '',
      includeHomeOnMap: typeof p.includeHomeOnMap === 'boolean' ? p.includeHomeOnMap : true,
      showRouteOnMap: typeof p.showRouteOnMap === 'boolean' ? p.showRouteOnMap : false,
      notDispensedReasons: Array.isArray(p.notDispensedReasons) && p.notDispensedReasons.length > 0
        ? p.notDispensedReasons.slice()
        : DEFAULT_NON_DISPENSE_REASONS.slice(),
      assumedFinalVisitMin: (typeof p.assumedFinalVisitMin === 'number' && p.assumedFinalVisitMin > 0)
        ? p.assumedFinalVisitMin
        : DEFAULT_LAST_APPT_DURATION_MIN,
      showBestOf: typeof p.showBestOf === 'boolean' ? p.showBestOf : true,
      eodEmailTo: typeof p.eodEmailTo === 'string' ? p.eodEmailTo : '',
      targets: (() => {
        const out = { ...DEFAULT_TARGETS };
        const t = p.targets || {};
        // Pull through any finite numeric target: monthly baselines AND per-period
        // overrides like `revenue_daily`, `pairsDispensed_weekly`, etc.
        for (const k of Object.keys(t)) {
          const v = t[k];
          if (typeof v === 'number' && Number.isFinite(v) && v >= 0) out[k] = v;
        }
        // Drop legacy `referrals` target if present — it has been removed.
        delete out.referrals;
        return out;
      })(),
    };
  } catch { return fallback; }
}
function setPrefs(patch) {
  const cur = getPrefs();
  const next = { ...cur, ...patch };
  try { Store.setItem(PREFS_KEY, JSON.stringify(next)); } catch {}
  return next;
}

function saveRoute() {
  try {
    const data = {
      addressText: (document.getElementById('bulk-addr')?.value) || '',
      stops: __mapState.stops.map(s => ({
        letter: s.letter, address: s.address, lat: s.lat, lng: s.lng,
        display: s.display, time: s.time || '',
      })),
    };
    Store.setItem(ROUTE_KEY, JSON.stringify(data));
  } catch {}
}
function loadRoute() {
  try {
    const raw = Store.getItem(ROUTE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}
function clearRouteStorage() {
  try { Store.removeItem(ROUTE_KEY); } catch {}
}

function letterFor(idx) {
  let n = idx, s = '';
  do { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; } while (n >= 0);
  return s;
}
