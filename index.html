<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#0f766e" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dom-Optom" />
<meta name="format-detection" content="telephone=no" />
<title>Dom-Optom · Domiciliary Optometry Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  /* ============== Design tokens (calm clinical: deep teal + warm neutrals) ============== */
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-2: #f4f4f5;
    --border: #e5e5e5;
    --border-strong: #d4d4d4;
    --text: #18181b;
    --text-muted: #71717a;
    --text-subtle: #a1a1aa;
    --primary: #1f7a85;       /* deep teal */
    --primary-hover: #186671;
    --primary-soft: #e6f1f3;
    --primary-text-on-soft: #14545d;
    --danger: #c0392b;
    --danger-soft: #fdecea;
    --warning: #b8761f;
    --success: #1f7a4a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.04);
    --radius: 8px;
    --radius-lg: 12px;

    --c1: #1f7a85;
    --c2: #d97757;
    --c3: #c4a032;
    --c4: #7d5fa3;
    --c5: #4f8d6f;
    --c6: #b85a5a;
    --c7: #6b7280;
  }
  /* Dark mode overrides */
  html[data-theme="dark"] {
    --bg: #0f1419;
    --surface: #1a1f24;
    --surface-2: #252b32;
    --border: #313842;
    --border-strong: #3f4854;
    --text: #e8eaed;
    --text-muted: #9aa0a6;
    --text-subtle: #6b7280;
    --primary: #4dbac6;
    --primary-hover: #5fc9d4;
    --primary-soft: #1d3a3f;
    --primary-text-on-soft: #8fd9e2;
    --danger: #e57063;
    --danger-soft: #3a1f1c;
    --warning: #d8a256;
    --success: #6abf8e;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
    --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.25);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.5), 0 4px 10px rgba(0,0,0,.25);
  }
  html[data-theme="dark"] body { background: var(--bg); color: var(--text); }
  html[data-theme="dark"] .sidebar { background: var(--surface); }
  html[data-theme="dark"] .grade-A { background: rgba(34, 197, 94, 0.18); color: #6ee7b7; }
  html[data-theme="dark"] .grade-B { background: rgba(59, 130, 246, 0.18); color: #93c5fd; }
  html[data-theme="dark"] .grade-C { background: rgba(245, 158, 11, 0.18); color: #fcd34d; }
  html[data-theme="dark"] .grade-D { background: rgba(239, 68, 68, 0.18); color: #fca5a5; }
  html[data-theme="dark"] tbody tr.row-unactioned > td { background: rgba(245, 158, 11, 0.18); }
  html[data-theme="dark"] tbody tr.row-unactioned:hover > td { background: rgba(245, 158, 11, 0.28); }
  html[data-theme="dark"] .records-filter-bar { background: var(--surface-2); }
  html[data-theme="dark"] .leaflet-container { filter: hue-rotate(180deg) invert(0.92) brightness(0.95) contrast(0.95); }
  html[data-theme="dark"] .leaflet-popup-content-wrapper, html[data-theme="dark"] .leaflet-popup-tip { filter: hue-rotate(180deg) invert(0.92); }
  html[data-theme="dark"] input, html[data-theme="dark"] textarea, html[data-theme="dark"] select { background: var(--surface-2); color: var(--text); border-color: var(--border); }
  html[data-theme="dark"] .badge:not(.primary):not(.danger) { background: var(--surface-2); color: var(--text-muted); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    /* Disable pinch-zoom and double-tap-zoom globally; pages can still scroll. */
    touch-action: pan-x pan-y;
    -ms-content-zooming: none;
  }
  /* Leaflet manages its own gestures (drag + pinch-zoom on the map). */
  #map, #map *, .leaflet-container, .leaflet-container * { touch-action: none; }
  button { font: inherit; cursor: pointer; }
  input, textarea, select, button { font-family: inherit; }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ============== Layout ============== */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 232px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    padding: 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--primary); color: #fff;
    display: grid; place-items: center;
  }
  .brand-name { font-weight: 600; font-size: 14px; line-height: 1; }
  .brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .nav { padding: 10px; flex: 1; overflow: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 6px;
    color: var(--text); font-size: 13.5px;
    border: none; background: transparent; width: 100%; text-align: left;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface-2); }
  .nav-item.active { background: var(--primary-soft); color: var(--primary-text-on-soft); font-weight: 500; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-footer {
    padding: 12px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }

  .main { flex: 1; min-width: 0; }
  .page { padding: 24px 28px; max-width: 1280px; margin: 0 auto; }
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 16px; margin-bottom: 20px;
  }
  .page-head h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  .page-head p { color: var(--text-muted); margin: 0; font-size: 13.5px; }

  /* ============== Components ============== */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
  }
  .card-head {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .card-title { font-weight: 600; font-size: 14px; margin: 0; }
  .card-sub { color: var(--text-muted); font-size: 12.5px; margin-top: 2px; }
  .card-body { padding: 20px; }
  .card-body.dense { padding: 12px 16px; }
  .card-body.flush { padding: 0; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 6px; border: 1px solid transparent;
    font-size: 13px; font-weight: 500; line-height: 1;
    background: var(--surface); color: var(--text); border-color: var(--border-strong);
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: var(--surface-2); }
  .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn svg { width: 14px; height: 14px; }

  .input, .textarea, .select {
    width: 100%;
    padding: 7px 10px; font-size: 13.5px;
    border: 1px solid var(--border-strong); border-radius: 6px; background: var(--surface);
    color: var(--text);
  }
  .textarea { resize: vertical; min-height: 90px; }
  .label { display: block; font-size: 12.5px; font-weight: 500; margin-bottom: 5px; }
  .help { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .row { display: grid; gap: 14px; }
  .row.cols-2 { grid-template-columns: 1fr 1fr; }
  .row.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .row.cols-4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 720px) {
    .row.cols-2, .row.cols-3, .row.cols-4 { grid-template-columns: 1fr; }
    .sidebar { width: 64px; }
    .nav-item span, .brand div, .sidebar-footer .btn span { display: none; }
  }

  /* Switch / toggle */
  .switch {
    position: relative; display: inline-block; width: 38px; height: 22px; flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch span {
    position: absolute; inset: 0; background: #d4d4d8; border-radius: 999px;
    transition: background .15s; cursor: pointer;
  }
  .switch span::before {
    content: ''; position: absolute; left: 2px; top: 2px;
    width: 18px; height: 18px; background: #fff; border-radius: 50%;
    transition: transform .15s; box-shadow: 0 1px 2px rgba(0,0,0,.15);
  }
  .switch input:checked + span { background: var(--primary); }
  .switch input:checked + span::before { transform: translateX(16px); }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px;
  }
  .toggle-row .meta { flex: 1; min-width: 0; }
  .toggle-row strong { font-size: 13px; font-weight: 500; display: block; }
  .toggle-row small { color: var(--text-muted); font-size: 12px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px; font-size: 11.5px; font-weight: 500;
    background: var(--surface-2); color: var(--text);
  }
  .badge.primary { background: var(--primary-soft); color: var(--primary-text-on-soft); }
  .badge.danger { background: var(--danger-soft); color: var(--danger); }
  .badge.warning { background: #fef3e6; color: var(--warning); }
  .badge.muted { background: var(--surface-2); color: var(--text-muted); }

  /* Tabs */
  .tabs {
    display: inline-flex; background: var(--surface-2); padding: 3px;
    border-radius: 8px; gap: 2px;
  }
  .tab {
    padding: 5px 12px; border-radius: 6px; border: none; background: transparent;
    font-size: 12.5px; color: var(--text-muted); font-weight: 500;
  }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
  .tab[disabled] { opacity: 0.4; cursor: not-allowed; }
  .period-stepper .tab[data-step="prev"], .period-stepper .tab[data-step="next"] { padding: 5px 8px; min-width: 28px; }
  .period-stepper .tab[data-step="today"] { font-variant-numeric: tabular-nums; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 10px 14px; color: var(--text-muted);
    font-weight: 500; font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em;
    border-bottom: 1px solid var(--border);
  }
  tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface-2); }
  td.right, th.right { text-align: right; }
  td.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  /* Records: rows with un-actioned referral or additional action */
  tbody tr.row-unactioned > td { background: rgba(245, 158, 11, 0.14); }
  tbody tr.row-unactioned:hover > td { background: rgba(245, 158, 11, 0.22); }
  tbody tr.row-unactioned > td:first-child { box-shadow: inset 4px 0 0 #f59e0b; }
  /* Records filter panel */
  .records-filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
  .records-filter-bar .filter-toggle { display: inline-flex; align-items: center; gap: 8px; }
  .records-filter-bar .filter-count { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; }
  .records-filter-panel { padding: 14px; border-bottom: 1px solid var(--border); background: var(--surface); display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .records-filter-panel .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .records-filter-panel .filter-group .filter-label { font-size: 11.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .records-filter-panel .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .records-filter-panel .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); cursor: pointer; user-select: none; font-size: 12.5px; transition: all 0.15s; }
  .records-filter-panel .chip:hover { background: var(--surface); }
  .records-filter-panel .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .records-filter-panel .chip input { display: none; }
  .records-filter-panel .filter-toggle-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  /* Grading mark badge */
  .grade-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 6px; font-weight: 700; font-size: 12px; }
  .grade-A { background: #d1fae5; color: #065f46; }
  .grade-B { background: #dbeafe; color: #1e40af; }
  .grade-C { background: #fef3c7; color: #92400e; }
  .grade-D { background: #fee2e2; color: #991b1b; }
  .yesno { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .actioned-chk { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--text-muted); cursor: pointer; user-select: none; }
  .actioned-chk input[type="checkbox"] { margin: 0; cursor: pointer; }

  /* KPIs */
  .kpi { padding: 18px; }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); font-weight: 500; }
  .kpi-value { font-size: 22px; font-weight: 600; margin-top: 8px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .kpi-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .kpi-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--primary-soft); color: var(--primary);
    display: grid; place-items: center; margin-left: auto;
  }
  .kpi-icon.danger { background: var(--danger-soft); color: var(--danger); }
  /* KPI target overlay (top row, shown when Targets toggled on) */
  .kpi-target {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    margin-top: 8px; padding: 4px 8px; border-radius: 6px;
    background: var(--primary-soft); color: var(--primary);
    font-size: 11px; font-weight: 500;
  }
  .kpi-target--good { background: rgba(34, 197, 94, 0.10); color: #15803d; }
  .kpi-target--bad  { background: rgba(239, 68, 68, 0.10); color: #b91c1c; }
  .kpi-target--neutral { background: rgba(100, 116, 139, 0.10); color: #475569; }
  .kpi-target-label { text-transform: uppercase; letter-spacing: .05em; opacity: 0.85; }
  .kpi-target-value { font-variant-numeric: tabular-nums; font-weight: 600; }
  /* Variance badge inline next to the actual KPI value */
  .kpi-variance {
    display: inline-block; margin-left: 6px; padding: 2px 7px; border-radius: 999px;
    font-size: 11px; font-weight: 600; vertical-align: middle;
    font-variant-numeric: tabular-nums;
  }
  .kpi-variance--good { background: rgba(34, 197, 94, 0.15); color: #15803d; }
  .kpi-variance--bad  { background: rgba(239, 68, 68, 0.15); color: #b91c1c; }
  .kpi-variance--neutral { background: rgba(100, 116, 139, 0.15); color: #475569; }
  /* KPI best overlay (bottom row, shown when Best of toggled on) */
  .kpi-best {
    margin-top: 8px; padding: 6px 8px; border-radius: 6px;
    background: var(--surface-soft, #f8fafc);
    border-left: 3px solid var(--accent, #0d9488);
    display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
    font-size: 11px;
  }
  .kpi-best-label {
    text-transform: uppercase; letter-spacing: .05em;
    color: var(--accent, #0d9488); font-weight: 600;
  }
  .kpi-best-value { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text); }
  .kpi-best-when { color: var(--text-muted); margin-left: auto; }

  /* Round 9: 3-period rolling-average pill, matches Target row sizing/colour scheme */
  .kpi-roll {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    margin-top: 6px; padding: 4px 8px; border-radius: 6px;
    background: rgba(99, 102, 241, 0.10); color: #4338ca;
    font-size: 11px; font-weight: 500;
  }
  .kpi-roll-label { text-transform: uppercase; letter-spacing: .05em; opacity: 0.85; }
  .kpi-roll-value { font-variant-numeric: tabular-nums; font-weight: 600; }

  /* Round 8: Dashboard head controls (checkboxes + period picker) */
  .dash-head { display: flex; flex-direction: column; gap: 10px; }
  .dash-head-title h1 { margin: 0 0 2px; }
  .dash-head-title p { margin: 0; color: var(--text-muted); font-size: 13px; }
  .dash-head-controls {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 8px 10px;
  }
  .dash-check {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 12px; cursor: pointer; user-select: none;
  }
  .dash-check:hover { background: var(--surface-soft, #f8fafc); }
  .dash-check input[type="checkbox"] {
    accent-color: var(--accent, #0d9488);
    width: 14px; height: 14px; margin: 0; cursor: pointer;
  }

  /* Round 8: Period stepper + calendar popover */
  .period-picker { position: relative; display: inline-flex; align-items: center; gap: 4px; }
  .period-picker-btn { min-width: 180px; justify-content: center; }
  .period-caret { margin-left: 6px; font-size: 10px; color: var(--text-muted); }
  .period-popover {
    position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    z-index: 100; min-width: 280px; max-width: 340px;
    background: var(--surface, #fff); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 12px 32px rgba(15, 23, 42, 0.16), 0 2px 6px rgba(15, 23, 42, 0.06);
    padding: 10px;
  }
  .period-popover-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 8px;
  }
  .period-popover-title { font-weight: 600; font-size: 13px; }
  .period-grid { display: grid; gap: 4px; }
  .period-grid--weeks { grid-template-columns: 1fr; }
  .period-grid--months { grid-template-columns: repeat(3, 1fr); }
  .period-grid--quarters { grid-template-columns: repeat(2, 1fr); }
  .period-grid--years { grid-template-columns: repeat(4, 1fr); }
  .period-grid--days { grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .period-day-header {
    text-align: center; font-size: 10px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase;
    padding: 4px 0;
  }
  .period-cell--day {
    padding: 6px 0; min-width: 28px; font-variant-numeric: tabular-nums;
  }
  .period-cell.is-today {
    border-color: var(--accent, #0d9488); font-weight: 600; color: var(--accent, #0d9488);
  }
  .period-cell.is-weekend {
    color: var(--text-faint, #b9b9b9); opacity: 0.4; cursor: not-allowed;
    background: repeating-linear-gradient(45deg, transparent 0 4px, rgba(0,0,0,0.04) 4px 5px);
  }
  .period-cell.is-weekend:hover { background: repeating-linear-gradient(45deg, transparent 0 4px, rgba(0,0,0,0.04) 4px 5px); }
  .period-cell {
    appearance: none; border: 1px solid transparent; background: transparent;
    border-radius: 6px; padding: 6px 8px; cursor: pointer;
    font-size: 12px; color: var(--text);
    text-align: center; font-family: inherit;
  }
  .period-cell:hover { background: var(--surface-soft, #f1f5f9); }
  .period-cell.is-selected {
    background: var(--accent, #0d9488); color: #fff;
    border-color: var(--accent, #0d9488);
  }
  .period-cell.is-selected:hover { background: var(--accent, #0d9488); }
  .period-cell.is-other-month { opacity: .55; }
  .period-cell--week {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; text-align: left;
  }
  .period-cell-num {
    font-variant-numeric: tabular-nums; font-weight: 600;
    color: var(--accent, #0d9488); min-width: 32px;
  }
  .period-cell.is-selected .period-cell-num { color: #fff; }
  .period-cell-range { font-size: 11px; color: var(--text-muted); }

  /* Filters dropdown (Targets / Best of / 3-period avg + Best-of bucket size) */
  .dash-filters { position: relative; display: inline-flex; align-items: center; }
  .filter-count-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px; margin-left: 4px;
    background: var(--accent, #0d9488); color: #fff;
    border-radius: 9px; font-size: 11px; font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .filters-popover { min-width: 260px; max-width: 320px; left: auto; right: 0; transform: none; }
  .filters-section { padding: 4px 2px; }
  .filters-section + .filters-section { margin-top: 6px; padding-top: 10px; border-top: 1px solid var(--border); }
  .filters-section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-muted); font-weight: 600;
  }
  .filters-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 6px; border-radius: 6px; cursor: pointer;
    font-size: 13px;
  }
  .filters-row:hover { background: var(--surface-soft, #f1f5f9); }
  .filters-row input[type="checkbox"] { margin: 0; }
  .filters-row span:nth-of-type(1) { font-weight: 500; flex-shrink: 0; }
  .filters-row-help { color: var(--text-muted); font-size: 11px; margin-left: auto; }
  /* Today button used inside the daily calendar popover */
  .period-popover-foot {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 6px; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .period-cell.is-selected .period-cell-range { color: rgba(255,255,255,0.85); }
  .period-cell--quarter { padding: 10px 6px; }
  .period-cell-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .period-cell.is-selected .period-cell-sub { color: rgba(255,255,255,0.85); }

  /* Round 8: One-page dashboard tightening */
  .dash-page { padding: 12px 18px 8px; }
  .dash-page .row { row-gap: 8px; }
  .dash-page .mb-3 { margin-bottom: 8px !important; }
  .dash-head { gap: 8px; margin-bottom: 6px; }
  .dash-head-title h1 { font-size: 18px; margin: 0; }
  .dash-head-title p { font-size: 12px; }
  .dash-kpis { margin-bottom: 8px !important; }
  .dash-kpis .card { padding: 10px 12px; }
  .dash-kpis .kpi { gap: 2px; }
  .dash-kpis .kpi-label { font-size: 11px; }
  .dash-kpis .kpi-value { font-size: 20px; }
  .dash-kpis .kpi-hint { font-size: 11px; }
  .dash-kpis .kpi-target { padding: 3px 6px; font-size: 10px; }
  .dash-kpis .kpi-best { margin-top: 6px; padding: 4px 7px; font-size: 10px; }
  .dash-kpis .kpi-roll { padding: 3px 6px; font-size: 10px; margin-top: 3px; }
  .dash-chart-card .card-body { padding: 8px 12px 12px; }
  .dash-chart-card .card-head { padding: 10px 12px 4px; }
  .dash-chart-card .card-title { font-size: 13px; }
  .dash-chart-card .card-sub { font-size: 11px; }

  /* Round 8: Loss profile inline legend list (replaces external Chart.js legend) */
  .loss-inline {
    display: flex; flex-direction: column; gap: 3px;
    margin-top: 8px; max-height: 130px; overflow-y: auto;
  }
  .loss-inline-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; line-height: 1.3;
  }
  .loss-dot {
    flex: 0 0 auto; width: 8px; height: 8px; border-radius: 999px;
  }
  .loss-name { flex: 1 1 auto; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .loss-count, .loss-pct {
    flex: 0 0 auto; font-variant-numeric: tabular-nums; color: var(--text-muted);
  }
  .loss-count { font-weight: 600; color: var(--text); }

  /* Map */
  #map { height: 600px; width: 100%; border-radius: var(--radius-lg); }
  .leaflet-container { font-family: inherit; }

  /* Sticky map column on Route map page (desktop) */
  .map-grid { display: grid; gap: 14px; grid-template-columns: 420px 1fr; align-items: start; }
  .map-sticky { position: sticky; top: 16px; align-self: start; }
  .map-sticky #map { height: calc(100vh - 56px); min-height: 480px; max-height: 820px; }
  /* Scrollable stops list — fits ~8 rows on desktop, internal scroll for more */
  .stops-scroll { max-height: calc(100vh - 180px); min-height: 360px; overflow-y: auto; padding-right: 4px; }
  /* Toggle row above the stops scroll */
  .stops-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 8px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .stops-toolbar .switch { transform: scale(0.85); transform-origin: right center; }
  .stops-toolbar .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .stops-toolbar .toolbar-right { display: flex; align-items: center; gap: 8px; }
  /* Schedule popover */
  .schedule-popover {
    position: absolute; right: 0; top: calc(100% + 6px); z-index: 50;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow-lg);
    padding: 14px; min-width: 280px; max-width: 360px;
  }
  .schedule-popover .popover-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .schedule-popover .popover-title { font-weight: 600; font-size: 14px; }
  .schedule-pop-wrap { position: relative; display: inline-block; }
  /* Inline edit-address */
  .stop-edit-row { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
  .stop-edit-row .input { flex: 1; min-width: 180px; font-size: 12.5px; padding: 6px 8px; }
  .stop-locate-fail { color: var(--danger); font-size: 11.5px; }
  /* Mileage expansion */
  .mileage-row.expanded { background: var(--surface-2, #f7f7f8); }
  .mileage-detail-row td { padding: 0 !important; }
  .mileage-detail-inner { padding: 12px 18px; background: var(--surface-2, #f7f7f8); border-top: 1px solid var(--border); }
  .mileage-leg-table { width: 100%; font-size: 12.5px; border-collapse: collapse; }
  .mileage-leg-table th, .mileage-leg-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .mileage-leg-table th { font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 9000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-card {
    background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-lg);
    width: 100%; max-width: 900px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .modal-body { flex: 1; overflow: auto; padding: 14px 18px; }
  /* Pair dispensed/not-dispensed checkbox row */
  .pair-status-row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; padding: 10px 0; }
  .pair-status-row label { display: inline-flex; gap: 6px; align-items: center; font-size: 13.5px; cursor: pointer; }
  .pair-status-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
  /* Reason list (settings) */
  .reason-row { display: flex; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .reason-row:last-child { border-bottom: 0; }
  .reason-row .reason-text { flex: 1; font-size: 13px; }
  .reason-row .reason-edit-input { flex: 1; }

  /* Compact New-Patient layout */
  .np-compact .card-head.compact { padding: 10px 14px; }
  .np-compact .card-body.compact { padding: 10px 14px 12px; }
  .np-compact .card-title { font-size: 14px; }
  .np-compact .card-sub { font-size: 12px; }
  .np-compact .label { margin-bottom: 3px; font-size: 12px; }
  .np-compact .input, .np-compact .select, .np-compact .textarea { padding: 6px 9px; font-size: 13px; }
  .np-compact .toggle-row { padding: 6px 10px; }
  .np-compact .toggle-row .meta strong { font-size: 13px; }
  .np-compact .toggle-row .meta small { font-size: 11.5px; }
  .np-compact .pair { padding: 10px 12px; }
  .np-compact .pair-status-row { padding: 4px 0 6px; gap: 16px; }
  .np-compact .btn { white-space: nowrap; }
  .np-compact .card-head.compact { gap: 10px; }
  .np-grid { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(280px, 1fr); gap: 16px; align-items: start; }
  .pair-flags { display: flex; gap: 14px; flex-wrap: wrap; }
  .pair-flags .pair-flag { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-subtle, #fafafa); }
  .pair-flags .pair-flag input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
  .pair-flags .pair-flag small { color: var(--text-muted); margin-left: 4px; font-size: 11.5px; }
  @media (max-width: 980px) { .np-grid { grid-template-columns: 1fr; } }

  /* Dashboard period tabs auto-wrap on narrow screens */
  .dash-tabs { flex-wrap: wrap; }

  @media (max-width: 1024px) {
    .map-grid { grid-template-columns: 1fr; }
    .map-sticky { position: static; }
    .map-sticky #map { height: 420px; }
    .stops-scroll { max-height: none; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: #18181b; color: #fff; padding: 10px 14px;
    border-radius: 8px; font-size: 13px; box-shadow: var(--shadow-lg);
    transform: translateY(20px); opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s; z-index: 10000;
    max-width: 360px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); }

  /* Login */
  .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
  .login-card { width: 100%; max-width: 420px; }

  /* Glasses pair card */
  .pair {
    border: 1px solid var(--border); border-radius: 8px; padding: 14px;
    background: var(--surface-2);
  }
  .pair + .pair { margin-top: 10px; }
  .pair-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .pair-title { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .pair-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 11px; font-weight: 700;
    display: grid; place-items: center;
  }

  /* Empty state */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .empty .icon {
    width: 48px; height: 48px; border-radius: 50%; background: var(--primary-soft);
    color: var(--primary); display: grid; place-items: center;
    margin: 0 auto 14px;
  }
  .empty h3 { font-size: 15px; color: var(--text); margin: 0 0 6px; font-weight: 600; }
  .empty p { font-size: 13px; max-width: 400px; margin: 0 auto 16px; }

  /* Custom map pin */
  .pin-icon { background: transparent !important; border: none !important; }

  /* Saved banner */
  .saved-banner {
    display: flex; align-items: center; gap: 12px;
    background: var(--primary-soft); border: 1px solid #cae3e6;
    color: var(--primary-text-on-soft);
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
    margin-bottom: 16px;
  }
  .saved-banner .check {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--primary); color: #fff;
    display: grid; place-items: center; flex-shrink: 0;
  }

  /* Hidden */
  .hidden { display: none !important; }

  /* Search input */
  .search-input { max-width: 280px; }

  /* Stops list — compact so ~8 rows fit alongside the map */
  .stop-row {
    display: flex; gap: 8px; align-items: flex-start;
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px;
    margin-bottom: 4px; font-size: 12px; line-height: 1.3;
  }
  .stop-letter {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--primary); color: #fff;
    font-size: 10px; font-weight: 700;
    display: grid; place-items: center; flex-shrink: 0; margin-top: 1px;
  }
  .stop-text { flex: 1; min-width: 0; }
  .stop-text .a {
    display: block; word-wrap: break-word;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
  }
  .stop-text .b {
    color: var(--text-muted); font-size: 11px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
  }
  .stop-row .stop-actions { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .stop-row button, .stop-row .btn { font-size: 11px; padding: 3px 7px; }
  .stop-time-row {
    display: flex; align-items: center; gap: 6px; margin-top: 4px;
    font-size: 11px;
  }
  .stop-time-row label { color: var(--text-muted); }
  .stop-time-row input[type="time"] {
    font-family: var(--mono); font-size: 11px;
    padding: 2px 5px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--surface);
  }
  .stop-departure {
    color: var(--accent); font-family: var(--mono); font-size: 11px;
    font-weight: 600;
  }
  .stop-departure.warn { color: var(--danger); }
  .stop-delay {
    margin-top: 2px; font-size: 11px; font-family: var(--mono);
    display: inline-block; padding: 1px 6px; border-radius: 3px;
  }
  .stop-delay--ok { color: #15803d; background: rgba(34, 197, 94, 0.10); }
  .stop-delay--mild { color: #b45309; background: rgba(245, 158, 11, 0.10); }
  .stop-delay--warn { color: #c2410c; background: rgba(249, 115, 22, 0.14); }
  .stop-delay--bad { color: #b91c1c; background: rgba(239, 68, 68, 0.15); }
  .schedule-card .traffic-badge {
    display: inline-block; font-size: 10px; padding: 2px 6px;
    border-radius: 99px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .schedule-card .traffic-badge.live { background: #dcfce7; color: #166534; }
  .schedule-card .traffic-badge.est { background: #fef9c3; color: #854d0e; }

  /* Loss row */
  .loss-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .loss-row:last-child { border-bottom: none; }
  .loss-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
  .loss-name { flex: 1; }
  .loss-count { font-variant-numeric: tabular-nums; width: 50px; text-align: right; }
  .loss-pct { font-variant-numeric: tabular-nums; width: 50px; text-align: right; color: var(--text-muted); }

  /* Best-of grid */
  .best-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 880px) { .best-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .best-grid { grid-template-columns: 1fr; } }
  .best-row { padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface-2, var(--surface)); display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .best-row-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 600; }
  .best-row-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; word-break: break-word; }
  .best-row-when { font-size: 12px; color: var(--text-muted); word-break: break-word; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    display: grid; place-items: center; z-index: 9000; padding: 20px;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg); max-width: 560px; width: 100%;
    max-height: 90vh; overflow: auto; box-shadow: var(--shadow-lg);
  }
  .modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 20px; }
  .modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  .text-muted { color: var(--text-muted); }
  .text-mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  .flex { display: flex; }
  .flex-1 { flex: 1; }
  .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
  .items-center { align-items: center; } .justify-between { justify-content: space-between; }
  .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; }
  .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
  .w-full { width: 100%; }

  /* ============== Mobile (≤ 640px) ============== */
  .mobile-tabbar { display: none; }
  .mobile-more-sheet { display: none; }
  /* Mobile More-sheet title (shown only at mobile widths). */
  .mobile-more-title { font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: .04em; text-transform: uppercase; padding: 4px 14px 8px; }

  @media (max-width: 820px) {
    /* Body: leave room for bottom tab bar; respect safe-area on both ends. */
    body { padding-bottom: calc(64px + env(safe-area-inset-bottom)); }

    /* Hide left sidebar, switch app to column layout */
    .app { flex-direction: column; }
    .sidebar { display: none; }

    /* Hide Dashboard route entirely on mobile — it's a desktop-only view. */
    #route-dashboard { display: none !important; }

    /* Pages: full-width, tighter padding, plus notch / Dynamic Island top safe-area
       and landscape side safe-areas. */
    .page {
      padding:
        calc(14px + env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        8px
        max(14px, env(safe-area-inset-left));
      max-width: 100%;
    }
    .page-head { gap: 8px; margin-bottom: 14px; }
    .page-head h1 { font-size: 18px; }
    .page-head p { font-size: 12.5px; }

    /* Tap targets */
    .btn { padding: 10px 14px; font-size: 14px; min-height: 40px; }
    .btn-sm { padding: 7px 10px; font-size: 12.5px; min-height: 32px; }
    .input, .textarea, .select { padding: 10px 12px; font-size: 16px; min-height: 42px; } /* 16px prevents iOS zoom */
    .nav-item { padding: 12px 14px; font-size: 15px; }
    .tab { padding: 8px 14px; font-size: 13px; }

    /* KPI grid: 2 columns on phones */
    .row.cols-2, .row.cols-3, .row.cols-4 { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    /* Patient form: Visit date / Outcome / Address — force single column so the
       native iOS date picker doesn't crowd the outcome select. */
    .np-col-left .row.cols-3 { grid-template-columns: 1fr !important; }
    .np-col-left .row.cols-2 { grid-template-columns: 1fr !important; }
    /* Chart row (inline-styled 2fr 1fr in source) collapses to single column */
    .row[style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    /* Charts: Chart.js writes inline width on the canvas at first render; ensure cards
       and canvases can shrink. min-width:0 lets grid children shrink below content size. */
    .dash-chart-card, .card { min-width: 0; }
    canvas { max-width: 100% !important; }
    .loss-inline, .loss-inline-row { max-width: 100%; min-width: 0; }
    .loss-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dash-kpis .kpi-value { font-size: 18px; }
    .dash-kpis .card { padding: 12px; }
    .kpi { padding: 14px; }
    .kpi-value { font-size: 20px; }

    /* Cards a touch tighter */
    .card-head { padding: 12px 14px; }
    .card-body { padding: 14px; }
    .card-body.dense { padding: 10px 12px; }

    /* Filter / settings panels stack */
    .records-filter-panel { grid-template-columns: 1fr; gap: 10px; padding: 12px; }

    /* Filters popover: full-width-ish bottom sheet feel */
    .filters-popover { position: fixed !important; left: 12px !important; right: 12px !important; top: auto !important; bottom: calc(74px + env(safe-area-inset-bottom)) !important; max-width: none !important; max-height: 70vh; overflow: auto; }

    /* Period popover (date picker) likewise */
    .period-popover { position: fixed !important; left: 12px !important; right: 12px !important; top: auto !important; bottom: calc(74px + env(safe-area-inset-bottom)) !important; max-width: none !important; }

    /* Modals */
    .modal-card { max-height: 90vh !important; width: calc(100vw - 24px) !important; }

    /* Hide chunky inline maxWidths inherited from desktop layout */
    [style*="max-width: 1200px"], [style*="max-width: 820px"], [style*="max-width: 900px"], [style*="max-width: 1280px"] { max-width: 100% !important; }

    /* Records: list-like rows instead of squashed table headers */
    .search-input { max-width: 100% !important; width: 100% !important; }

    /* Best-grid stays single column */
    .best-grid { grid-template-columns: 1fr !important; }

    /* Reveal bottom tab bar — fixed, safe-area-aware (home indicator + landscape ears). */
    .mobile-tabbar {
      display: grid; grid-template-columns: repeat(5, 1fr);
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 90;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-top: 6px;
      padding-bottom: calc(6px + env(safe-area-inset-bottom));
      padding-left: max(4px, env(safe-area-inset-left));
      padding-right: max(4px, env(safe-area-inset-right));
      box-shadow: 0 -4px 12px rgba(0,0,0,.04);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }
    .mobile-tab {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; padding: 6px 2px; border: none; background: transparent;
      color: var(--text-muted); font-size: 10.5px; font-weight: 500; line-height: 1.1;
      border-radius: 8px; min-height: 52px;
    }
    .mobile-tab svg { width: 20px; height: 20px; }
    .mobile-tab.active { color: var(--primary); }
    .mobile-tab.active span { font-weight: 600; }

    /* Mobile More bottom sheet */
    .mobile-more-sheet {
      display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 95;
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 12px 12px calc(16px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 24px rgba(0,0,0,.18);
      max-height: 70vh; overflow: auto;
    }
    .mobile-more-sheet.open { display: block; }
    .mobile-more-backdrop {
      display: none; position: fixed; inset: 0; z-index: 94;
      background: rgba(0,0,0,.35);
    }
    .mobile-more-backdrop.open { display: block; }
    .mobile-more-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border-strong); margin: 4px auto 12px;
    }
    .mobile-more-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; width: 100%; border: none; background: transparent;
      border-radius: 8px; font-size: 15px; color: var(--text); text-align: left;
    }
    .mobile-more-item:hover, .mobile-more-item:active { background: var(--surface-2); }
    .mobile-more-item svg { width: 20px; height: 20px; flex-shrink: 0; }
    .mobile-more-item .danger-text { color: var(--danger); }

    /* Hide things that don’t make sense on mobile */
    .mobile-hide { display: none !important; }

    /* ---------- Mobile table → card-list transformation ----------
       Applies to the records table inside #route-records and the
       mileage daily-log table inside #route-mileage. Each row becomes
       a stacked card; headers are hidden; each cell shows its label
       via a data-mobile-label or by position-aware pseudo-elements. */
    #route-records .card-body.flush > div[style*="overflow-x: auto"] {
      overflow-x: visible !important;
      padding: 4px;
    }
    #route-records table,
    #route-records thead,
    #route-records tbody,
    #route-records tr,
    #route-records th,
    #route-records td {
      display: block;
    }
    #route-records thead { display: none; }
    #route-records tr {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 0 0 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    #route-records tr.row-unactioned {
      border-color: var(--danger);
      box-shadow: 0 1px 3px rgba(255,80,80,.08);
    }
    #route-records td {
      padding: 4px 0;
      border: none;
      text-align: left !important;
      font-size: 13.5px;
    }
    #route-records td:empty { display: none; }
    /* First cell (Anon ID) becomes the card header */
    #route-records td:nth-child(1) {
      font-size: 15px;
      font-weight: 600;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    /* Label cells with their column meaning */
    #route-records td:nth-child(2)::before { content: "Date: "; color: var(--text-muted); font-weight: 500; }
    #route-records td:nth-child(3)::before { content: "Grade: "; color: var(--text-muted); font-weight: 500; }
    #route-records td:nth-child(4)::before { content: "Outcome: "; color: var(--text-muted); font-weight: 500; }
    #route-records td:nth-child(5)::before { content: "Sales: £"; color: var(--text-muted); font-weight: 500; }
    #route-records td:nth-child(5) { font-variant-numeric: tabular-nums; }
    #route-records td:nth-child(6)::before { content: "Dispenses: "; color: var(--text-muted); font-weight: 500; }
    #route-records td:nth-child(7)::before { content: "Reglazes: "; color: var(--text-muted); font-weight: 500; }
    #route-records td:nth-child(8)::before { content: "Referral: "; color: var(--text-muted); font-weight: 500; }
    #route-records td:nth-child(9)::before { content: "Follow-up: "; color: var(--text-muted); font-weight: 500; }
    /* Action buttons row */
    #route-records td:nth-child(10) {
      display: flex !important;
      gap: 6px;
      padding-top: 8px;
      margin-top: 6px;
      border-top: 1px solid var(--border);
      justify-content: flex-end;
    }
    #route-records td:nth-child(10) .btn { flex: 0 0 auto; }
    /* Make Yes/No (referral/followup) inline-aligned nicely */
    #route-records .yesno {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      vertical-align: middle;
    }
    /* Empty state row spans full card */
    #route-records td[colspan] { padding: 24px 0; text-align: center !important; }
    #route-records td[colspan]::before { content: "" !important; }

    /* ---------- Mileage daily-log table → card-list ---------- */
    #route-mileage .card-body.flush > div[style*="overflow-x: auto"] {
      overflow-x: visible !important;
      padding: 4px;
    }
    #route-mileage > .page > .card > .card-body.flush table {
      display: block;
    }
    #route-mileage > .page > .card > .card-body.flush thead { display: none; }
    #route-mileage > .page > .card > .card-body.flush tbody { display: block; }
    #route-mileage tr.mileage-row {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "date toggle"
        "miles miles"
        "stops stops"
        "meta meta"
        "actions actions";
      gap: 4px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 0 0 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    #route-mileage tr.mileage-row > td {
      display: block;
      padding: 2px 0;
      border: none;
      font-size: 13.5px;
      text-align: left !important;
      white-space: normal !important;
    }
    #route-mileage tr.mileage-row > td:nth-child(1) { grid-area: toggle; justify-self: end; }
    #route-mileage tr.mileage-row > td:nth-child(2) { grid-area: date; font-weight: 600; font-size: 15px !important; font-family: var(--mono, ui-monospace, monospace); }
    #route-mileage tr.mileage-row > td:nth-child(3) { grid-area: stops; }
    #route-mileage tr.mileage-row > td:nth-child(3)::before { content: "Stops: "; color: var(--text-muted); }
    #route-mileage tr.mileage-row > td:nth-child(4) { grid-area: miles; font-size: 16px !important; }
    #route-mileage tr.mileage-row > td:nth-child(5) { grid-area: meta; color: var(--text-muted); font-size: 12.5px; }
    #route-mileage tr.mileage-row > td:nth-child(5)::before { content: "Drive time: "; }
    #route-mileage tr.mileage-row > td:nth-child(6) { grid-area: meta; }
    #route-mileage tr.mileage-row > td:nth-child(7) { display: none !important; }
    #route-mileage tr.mileage-row > td:nth-child(8) {
      grid-area: actions;
      display: flex !important;
      gap: 6px;
      justify-content: flex-end;
      padding-top: 6px;
      margin-top: 4px;
      border-top: 1px solid var(--border);
    }
    /* Stack meta cells (source + drive time) on rows 4-5 of grid */
    #route-mileage tr.mileage-row {
      grid-template-areas:
        "date toggle"
        "miles miles"
        "stops drivetime"
        "source source"
        "actions actions";
    }
    #route-mileage tr.mileage-row > td:nth-child(5) { grid-area: drivetime; }
    #route-mileage tr.mileage-row > td:nth-child(6) { grid-area: source; }
    /* Detail row (leg breakdown) — let it take full width when shown */
    #route-mileage tr.mileage-detail-row {
      display: block;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      margin: -6px 0 10px;
    }
    /* Respect the [hidden] attribute that the toggle button manages. */
    #route-mileage tr.mileage-detail-row[hidden] { display: none !important; }
    #route-mileage tr.mileage-detail-row > td { display: block; padding: 0; border: none; }
    /* Leg sub-table inside detail row stays a real table but scrolls horizontally */
    #route-mileage .mileage-detail-inner { overflow-x: auto; }
    #route-mileage .mileage-leg-table { display: table !important; width: 100%; font-size: 12.5px; }
    #route-mileage .mileage-leg-table thead { display: table-header-group !important; }
    #route-mileage .mileage-leg-table tbody { display: table-row-group !important; }
    #route-mileage .mileage-leg-table tr { display: table-row !important; background: transparent; border: none; padding: 0; margin: 0; box-shadow: none; }
    #route-mileage .mileage-leg-table th,
    #route-mileage .mileage-leg-table td { display: table-cell !important; padding: 4px 6px !important; border-bottom: 1px solid var(--border); }
    /* Mileage empty-state row */
    #route-mileage tr.mileage-row > td[colspan] {
      grid-area: unset;
      grid-column: 1 / -1;
      padding: 24px 0 !important;
      text-align: center !important;
      color: var(--text-muted);
    }
    #route-mileage tr.mileage-row > td[colspan]::before { content: "" !important; }

    /* Top mileage KPI row: 4 cards → 2 cols on mobile (matches generic .cols-2/3/4 rule
       but the inline-styled grid-template-columns overrides it, so force here). */
    #route-mileage .row.cols-4[style*="grid-template-columns"] {
      grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
    }

    /* ---------- End of day KPI grid: 3 → 1 column on phones ----------
       The page uses .row.cols-3 which becomes 2-col via the generic rule
       above, leaving "Unactioned" stranded on row 2 alone. Force single-col
       inside the End of day route so all three KPIs stack cleanly. */
    #route-end-of-day .row.cols-3 { grid-template-columns: 1fr !important; }

    /* ---------- Settings: Home location card stacks cleanly ----------
       The depart-time input and Clear button live in a .cols-2 grid; on
       mobile that grid was inheriting 2-col from the generic rule above
       and looking cramped. Force single column inside this card only. */
    #route-settings .card .row.cols-2 { grid-template-columns: 1fr !important; }
    /* The "&nbsp;" placeholder label above the Clear button isn't needed on mobile */
    #route-settings .card .row.cols-2 > div > .label:empty { display: none; }
  }

  /* ---------- Tablet portrait (iPad-ish): 2-column card grids ----------
     For widths between 640px and 820px we render the mobile shell, but
     there's room for a 2-up records grid which uses the screen better. */
  @media (min-width: 640px) and (max-width: 820px) {
    /* Records list: render the table’s tbody as a 2-column grid */
    #route-records .card-body.flush > div[style*="overflow-x: auto"] > table > tbody {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    /* Empty-state row should still span both columns */
    #route-records tbody tr:has(> td[colspan]) { grid-column: 1 / -1; }
    /* Mileage daily-log: also 2-up, but keep detail rows full-width */
    #route-mileage > .page > .card > .card-body.flush table > tbody {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    #route-mileage tr.mileage-detail-row { grid-column: 1 / -1; }
    /* Top KPI strip can stretch to 4 columns on tablet portrait */
    #route-mileage .row.cols-4[style*="grid-template-columns"] {
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
    }
    /* End-of-day KPIs comfortable as 3-up on tablet portrait */
    #route-end-of-day .row.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
  }
</style>

<script>
/* ============================================================================
 * DOM-OPTOM — single-file analytics app
 * ============================================================================
 *
 * STORAGE: data is auto-saved to localStorage under DOMOPTOM_DATA_V1.
 *          Use Data & Backup to export/import JSON, or download CSV/Excel.
 *
 * PASSWORD: change DEFAULT_PASSWORD below for production use.
 * ============================================================================ */

const DEFAULT_PASSWORD = 'domoptom';
const STORAGE_KEY = 'DOMOPTOM_DATA_V1';
const SESSION_KEY = 'DOMOPTOM_SESSION_V1';
const GEOCODE_CACHE_KEY = 'DOMOPTOM_GEOCACHE_V1';
const ROUTE_KEY = 'DOMOPTOM_ROUTE_V1';
const PREFS_KEY = 'DOMOPTOM_PREFS_V1';
const MILEAGE_KEY = 'DOMOPTOM_MILEAGE_V1';
const USERS_KEY = 'DOMOPTOM_USERS_V1';
const DEFAULT_LAST_APPT_DURATION_MIN = 70; // default assumed length of final appointment of the day; user-adjustable in Settings

/* ============================================================================
 * Persistent storage (IndexedDB-backed, localStorage-compatible API)
 *
 * iOS Safari aggressively evicts localStorage data when the page is opened
 * from a file:// URL (e.g. opened directly from Files / iCloud Drive). To make
 * the app reliable for offline / on-device use we store everything in an
 * IndexedDB object store and keep a synchronous in-memory cache so the rest
 * of the code can keep using a familiar getItem / setItem / removeItem shape.
 *
 * Boot order:
 *   1. IDB.open()
 *   2. Read every key from the object store into the in-memory cache
 *   3. One-time migration: copy any existing localStorage values for our
 *      known keys into IDB so existing users don’t lose data
 *   4. The rest of the app boots (Users.load(), State.load(), etc.)
 *
 * Writes are synchronous from the caller’s point of view: the cache is
 * updated immediately, and the write to IDB is fire-and-forget. We also
 * mirror writes to localStorage as a fallback (in case IDB ever fails),
 * but IDB is the source of truth on next load.
 * ============================================================================ */
const DOMOPTOM_DB_NAME = 'domoptom';
const DOMOPTOM_DB_VERSION = 1;
const DOMOPTOM_DB_STORE = 'kv';
const DOMOPTOM_ALL_KEYS = [
  'DOMOPTOM_DATA_V1',
  'DOMOPTOM_GEOCACHE_V1',
  'DOMOPTOM_ROUTE_V1',
  'DOMOPTOM_PREFS_V1',
  'DOMOPTOM_MILEAGE_V1',
  'DOMOPTOM_USERS_V1',
  'DOMOPTOM_THEME_V1',
  // Note: DOMOPTOM_SESSION_V1 stays in sessionStorage on purpose (per-tab).
];

const Store = (function () {
  const cache = Object.create(null);
  let db = null;
  let ready = false;

  function openDB() {
    return new Promise((resolve, reject) => {
      let req;
      try { req = indexedDB.open(DOMOPTOM_DB_NAME, DOMOPTOM_DB_VERSION); }
      catch (e) { reject(e); return; }
      req.onupgradeneeded = () => {
        const _db = req.result;
        if (!_db.objectStoreNames.contains(DOMOPTOM_DB_STORE)) {
          _db.createObjectStore(DOMOPTOM_DB_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
      req.onblocked = () => reject(new Error('IDB blocked'));
    });
  }

  function idbGet(key) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DOMOPTOM_DB_STORE, 'readonly');
      const req = tx.objectStore(DOMOPTOM_DB_STORE).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  function idbSet(key, value) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DOMOPTOM_DB_STORE, 'readwrite');
      const req = tx.objectStore(DOMOPTOM_DB_STORE).put(value, key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
  function idbDelete(key) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DOMOPTOM_DB_STORE, 'readwrite');
      const req = tx.objectStore(DOMOPTOM_DB_STORE).delete(key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function init() {
    try {
      db = await openDB();
    } catch (e) {
      console.warn('IndexedDB unavailable, falling back to localStorage only:', e);
      // Populate cache from localStorage so synchronous getItem still works.
      for (const k of DOMOPTOM_ALL_KEYS) {
        try { const v = localStorage.getItem(k); if (v != null) cache[k] = v; } catch {}
      }
      ready = true;
      return;
    }
    // Load every known key into the cache.
    for (const k of DOMOPTOM_ALL_KEYS) {
      try {
        const v = await idbGet(k);
        if (typeof v === 'string') cache[k] = v;
      } catch (e) { /* ignore individual key errors */ }
    }
    // One-time migration: if a key is missing from IDB but present in
    // localStorage (older install), copy it across so the user keeps their data.
    for (const k of DOMOPTOM_ALL_KEYS) {
      if (cache[k] != null) continue;
      let lv = null;
      try { lv = localStorage.getItem(k); } catch {}
      if (lv != null) {
        cache[k] = lv;
        try { await idbSet(k, lv); } catch {}
      }
    }
    ready = true;
  }

  return {
    init,
    isReady() { return ready; },
    getItem(key) {
      return cache[key] != null ? cache[key] : null;
    },
    setItem(key, value) {
      const v = String(value);
      cache[key] = v;
      // Mirror to localStorage as a fallback (best-effort) so legacy code
      // paths and manual debugging via DevTools still work.
      try { localStorage.setItem(key, v); } catch {}
      if (db) { idbSet(key, v).catch(e => console.warn('IDB write failed', key, e)); }
    },
    removeItem(key) {
      delete cache[key];
      try { localStorage.removeItem(key); } catch {}
      if (db) { idbDelete(key).catch(() => {}); }
    },
    // Diagnostic: list all cached keys (for backup-style features).
    keys() { return Object.keys(cache); },
  };
})();
function getAssumedFinalVisitMin() {
  const v = getPrefs().assumedFinalVisitMin;
  return (typeof v === 'number' && v > 0) ? v : DEFAULT_LAST_APPT_DURATION_MIN;
}

// Defaults for non-dispense reasons (editable in Settings).
const DEFAULT_NON_DISPENSE_REASONS = [
  'Patient Declined (Personal preference)',
  'Existing Glasses Satisfactory (No change in prescription)',
  'Price / Budget',
  'Inadequate Frame Selection',
  'Hospital Referral Required (Clinical priority)',
  'Complex Medical History (Unable to complete dispense)',
];
// Convenience accessor used by the patient form.
function getNonDispenseReasons() {
  const list = getPrefs().notDispensedReasons;
  if (Array.isArray(list) && list.length > 0) return list.slice();
  return DEFAULT_NON_DISPENSE_REASONS.slice();
}

// Visit outcomes available on the patient form.
const VISIT_OUTCOMES = ['New Rx', 'No Rx', 'No Change in Rx', 'Rx not possible', 'Px Cancelled'];

// Grading mark options shown in the Active patient form.
const GRADING_MARKS = ['A', 'B', 'C', 'D'];

// Glasses types per dispensed pair.
const GLASSES_TYPES = ['DV', 'NV', 'Vari', 'Bif'];

const PIE_COLORS = [
  getComputedStyle(document.documentElement).getPropertyValue('--c1').trim(),
  getComputedStyle(document.documentElement).getPropertyValue('--c2').trim(),
  getComputedStyle(document.documentElement).getPropertyValue('--c3').trim(),
  getComputedStyle(document.documentElement).getPropertyValue('--c4').trim(),
  getComputedStyle(document.documentElement).getPropertyValue('--c5').trim(),
  getComputedStyle(document.documentElement).getPropertyValue('--c6').trim(),
  getComputedStyle(document.documentElement).getPropertyValue('--c7').trim(),
];

/* ============== Users / Auth ==============
 * Two-account model: a single optom user plus an admin account.
 * The optom uses the app day-to-day; the admin can change passwords and
 * manage data via Settings.
 *
 * On first run we seed two built-in accounts:
 *   optom  / optom  (role: optom)
 *   admin  / admin  (role: admin)
 * The admin account cannot be deleted.
 */
const Users = {
  list: [], // [{ id, username, password, role, displayName, createdAt }]
  currentUserId: null,
  load() {
    try {
      const raw = Store.getItem(USERS_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        this.list = Array.isArray(data.list) ? data.list : [];
      }
    } catch (e) {
      console.error('Users load failed:', e);
      this.list = [];
    }
    // Seed defaults on first run.
    if (this.list.length === 0) {
      const _ts = new Date().toISOString();
      this.list = [
        { id: 'user-admin', username: 'admin', password: 'admin', role: 'admin', displayName: 'Admin', createdAt: _ts },
        { id: 'user-optom', username: 'optom', password: 'optom', role: 'optom', displayName: 'Optom', createdAt: _ts },
        { id: 'user-optom1', username: 'optom1', password: 'optom1', role: 'optom', displayName: 'Optom 1', createdAt: _ts },
      ];
      this.save();
    } else {
      // Top-up: ensure optom1 exists on already-seeded installs.
      if (!this.list.some(u => u.username === 'optom1')) {
        this.list.push({
          id: 'user-optom1', username: 'optom1', password: 'optom1',
          role: 'optom', displayName: 'Optom 1', createdAt: new Date().toISOString(),
        });
        this.save();
      }
    }
  },
  save() {
    try { Store.setItem(USERS_KEY, JSON.stringify({ list: this.list })); }
    catch (e) { console.error('Users save failed:', e); }
  },
  authenticate(username, password) {
    const u = this.list.find(x => x.username === (username || '').trim().toLowerCase() && x.password === password);
    return u || null;
  },
  current() {
    return this.list.find(u => u.id === this.currentUserId) || null;
  },
  isAdmin() {
    const u = this.current();
    return !!u && u.role === 'admin';
  },
  byId(id) { return this.list.find(u => u.id === id) || null; },
  optomUsers() { return this.list.filter(u => u.role === 'optom'); },
  add({ username, password, displayName }) {
    username = (username || '').trim().toLowerCase();
    if (!username) return { ok: false, error: 'Username is required.' };
    if (!/^[a-z0-9_-]{3,20}$/.test(username)) return { ok: false, error: 'Username must be 3–20 chars (a–z, 0–9, _ or -).' };
    if (!password || password.length < 3) return { ok: false, error: 'Password must be at least 3 characters.' };
    if (this.list.some(u => u.username === username)) return { ok: false, error: 'Username already exists.' };
    const id = 'user-' + Math.random().toString(36).slice(2, 10);
    const u = {
      id, username, password, role: 'optom',
      displayName: (displayName || username).trim(),
      createdAt: new Date().toISOString(),
    };
    this.list.push(u);
    this.save();
    return { ok: true, user: u };
  },
  update(id, patch) {
    const u = this.byId(id);
    if (!u) return { ok: false, error: 'User not found.' };
    if (u.role === 'admin' && patch.role && patch.role !== 'admin') {
      return { ok: false, error: 'Cannot change role of the admin account.' };
    }
    if (patch.username) {
      const uname = patch.username.trim().toLowerCase();
      if (!/^[a-z0-9_-]{3,20}$/.test(uname)) return { ok: false, error: 'Username must be 3–20 chars (a–z, 0–9, _ or -).' };
      if (this.list.some(x => x.id !== id && x.username === uname)) return { ok: false, error: 'Username already exists.' };
      u.username = uname;
    }
    if (patch.password) {
      if (patch.password.length < 3) return { ok: false, error: 'Password must be at least 3 characters.' };
      u.password = patch.password;
    }
    if (patch.displayName != null) u.displayName = patch.displayName.trim() || u.username;
    this.save();
    return { ok: true, user: u };
  },
  remove(id) {
    const u = this.byId(id);
    if (!u) return { ok: false, error: 'User not found.' };
    if (u.role === 'admin') return { ok: false, error: 'Cannot remove the admin account.' };
    // We don't delete the user's existing patient records — they remain tagged
    // with this userId so admin OVERSIGHT can still account for historical data.
    this.list = this.list.filter(x => x.id !== id);
    this.save();
    return { ok: true };
  },
};

// Convenience accessors used throughout the app.
function currentUserPatients() {
  const u = Users.current();
  if (!u) return [];
  // Untagged patients are treated as belonging to the optom user (legacy migration).
  return State.patients.filter(p => (p.userId || 'user-optom') === u.id);
}
function currentUserMileage(entries) {
  const u = Users.current();
  if (!u) return [];
  return (entries || []).filter(e => (e.userId || 'user-optom') === u.id);
}
function patientUserId(p) { return p.userId || 'user-optom'; }
function mileageUserId(e) { return e.userId || 'user-optom'; }

/* ============== State ============== */
const State = {
  patients: [],
  load() {
    try {
      const raw = Store.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        this.patients = Array.isArray(data.patients) ? data.patients : [];
      }
    } catch (e) {
      console.error('Load failed:', e);
      this.patients = [];
    }
    // Privacy migration: address/lat/lng are never persisted on records.
    // Strip them from any pre-existing data and re-save if anything changed.
    let migrated = false;
    this.patients = this.patients.map(p => {
      if (p && ('address' in p || 'lat' in p || 'lng' in p)) {
        migrated = true;
        const { address, lat, lng, ...rest } = p;
        return rest;
      }
      return p;
    });
    if (migrated) this.save();
  },
  save() {
    try {
      Store.setItem(STORAGE_KEY, JSON.stringify({
        patients: this.patients,
        savedAt: new Date().toISOString(),
        version: 1,
      }));
    } catch (e) {
      console.error('Save failed:', e);
      toast('Could not auto-save. Browser storage may be full.', 'error');
    }
  },
  add(patient) {
    patient.id = crypto.randomUUID();
    // Tag with the current user so multi-user filtering works. If somehow no user
    // is signed in (shouldn't happen), default to optom1 for safety.
    const cur = Users.current();
    patient.userId = (cur && cur.id) || 'user-optom';
    // If the patient was started from a route stop, honor the requested letter when available.
    patient.anonId = nextAnonId(patient.visitDate, patient._preferredLetter);
    delete patient._preferredLetter;
    // Privacy: never persist address / lat / lng on saved records.
    delete patient.address;
    delete patient.lat;
    delete patient.lng;
    patient.createdAt = new Date().toISOString();
    this.patients.push(patient);
    this.save();
    return patient;
  },
  update(id, patch) {
    const idx = this.patients.findIndex(p => p.id === id);
    if (idx < 0) return null;
    // Privacy: never persist address / lat / lng on saved records.
    const safe = { ...patch };
    delete safe.address;
    delete safe.lat;
    delete safe.lng;
    Object.assign(this.patients[idx], safe);
    // Defensive cleanup in case older clones still carried these fields.
    delete this.patients[idx].address;
    delete this.patients[idx].lat;
    delete this.patients[idx].lng;
    this.save();
    return this.patients[idx];
  },
  delete(id) {
    const before = this.patients.length;
    this.patients = this.patients.filter(p => p.id !== id);
    if (this.patients.length === before) return false;
    this.save();
    return true;
  },
  replaceAll(patients) {
    this.patients = patients;
    this.save();
  },
  // Append imported patients, skipping duplicates by id and (anonId+visitDate) key.
  // Returns { added, skipped }.
  appendImported(incoming) {
    const idSet = new Set(this.patients.map(p => p.id).filter(Boolean));
    const keySet = new Set(this.patients.map(p => `${p.anonId}|${p.visitDate}`));
    let added = 0, skipped = 0;
    for (const p of incoming) {
      const key = `${p.anonId}|${p.visitDate}`;
      if ((p.id && idSet.has(p.id)) || keySet.has(key)) { skipped++; continue; }
      // If imported record carries the same id as an existing one we already filtered above.
      // If id missing, mint one so internal lookups work.
      const newP = p.id ? p : { ...p, id: crypto.randomUUID() };
      this.patients.push(newP);
      if (newP.id) idSet.add(newP.id);
      keySet.add(key);
      added++;
    }
    if (added > 0) this.save();
    return { added, skipped };
  },
};

function letterToIndex(letters) {
  // 'A' -> 0, 'Z' -> 25, 'AA' -> 26, etc.
  let n = -1;
  for (const ch of letters.toUpperCase()) {
    n = (n + 1) * 26 + (ch.charCodeAt(0) - 65);
  }
  return n;
}
function indexToLetter(n) {
  let s = '';
  do {
    s = String.fromCharCode(65 + (n % 26)) + s;
    n = Math.floor(n / 26) - 1;
  } while (n >= 0);
  return s;
}
function nextAnonId(visitDate, preferredLetter) {
  // Anon IDs are scoped to (current user + visit date) so each optom has their own
  // A/B/C... sequence per day; this also avoids collisions between users.
  const cur = Users.current();
  const userId = (cur && cur.id) || 'user-optom';
  const sameDay = State.patients.filter(p => p.visitDate === visitDate && (p.userId || 'user-optom') === userId);
  const taken = new Set(sameDay.map(p => (p.anonId || '').split('-').pop()));
  // If a preferred letter is supplied and free, use it.
  if (preferredLetter) {
    const L = preferredLetter.toUpperCase();
    if (!taken.has(L)) return `${visitDate}-${L}`;
  }
  // Otherwise pick the lowest free letter (so A, B, C... fill in order even if a stop was skipped).
  let i = 0;
  while (taken.has(indexToLetter(i))) i++;
  return `${visitDate}-${indexToLetter(i)}`;
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ---- Weekday helpers (the practice operates Mon–Fri only) -------------------
function isWeekend(d) {
  const day = (d instanceof Date) ? d.getDay() : new Date(d + 'T00:00:00').getDay();
  return day === 0 || day === 6;
}
// Roll a date backwards to the nearest Mon–Fri (if already Mon–Fri, return as-is).
function toPrevWeekday(d) {
  const out = new Date(d);
  while (out.getDay() === 0 || out.getDay() === 6) out.setDate(out.getDate() - 1);
  return out;
}
// Step a date by ±1 working day (skip weekends entirely).
function stepWeekday(d, dir) {
  const out = new Date(d);
  do { out.setDate(out.getDate() + (dir >= 0 ? 1 : -1)); } while (out.getDay() === 0 || out.getDay() === 6);
  return out;
}
// ISO YYYY-MM-DD of today's date, snapped to the previous weekday on Sat/Sun.
function todayWeekdayISO() {
  const d = toPrevWeekday(new Date());
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function makePair(idx = 0) {
  return {
    id: crypto.randomUUID(),
    reglaze: false,
    price: 0,
    glassesType: '',     // 'DV' | 'NV' | 'Vari' | 'Bif' | ''
    sunglasses: false,
    dispensed: false,
    notDispensed: false, // mutually exclusive with `dispensed`
    nonDispenseReason: '',
    notes: '',
  };
}

function patientTotal(p) {
  return (p.pairs || []).reduce((a, x) => a + (Number(x.price) || 0), 0);
}
// Number of frames is derived: each dispensed, non-reglaze pair consumes one new frame.
// Legacy records may carry a stored `framesCount` per pair — fall back to it if present so old data still totals.
function patientFramesCount(p) {
  return (p.pairs || []).reduce((a, x) => {
    if (x.dispensed && !x.reglaze) return a + 1;
    if (typeof x.framesCount === 'number' && !x.dispensed && !x.notDispensed) return a + (x.framesCount || 0);
    return a;
  }, 0);
}
function patientReglazes(p) {
  return (p.pairs || []).filter(x => x.reglaze).length;
}
// Total number of dispensed pairs (frames + reglazes that were actually dispensed).
function patientDispensedPairs(p) {
  return (p.pairs || []).filter(x => x.dispensed).length;
}
function patientIsDispensed(p) {
  return (p.pairs || []).some(x => x.dispensed);
}

/* ============== Toast ============== */
let toastTimer;
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast ' + type; }, 3000);
}

/* ============== Auth ============== */
// Session stores the authenticated userId. Legacy sessions ('ok') are migrated
// to the optom user the first time someone signs in after the auth upgrade.
function isAuthed() {
  const sid = sessionStorage.getItem(SESSION_KEY);
  if (!sid) return false;
  if (sid === 'ok') {
    // Legacy single-user session: migrate to the optom user.
    sessionStorage.setItem(SESSION_KEY, 'user-optom');
    Users.currentUserId = 'user-optom';
    return true;
  }
  if (Users.byId(sid)) {
    Users.currentUserId = sid;
    return true;
  }
  // Stale session id, drop it.
  sessionStorage.removeItem(SESSION_KEY);
  return false;
}
function login(username, password) {
  // Backwards-compat shim: if called with one arg, treat as legacy access password.
  if (arguments.length === 1) {
    if (username === DEFAULT_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, 'user-optom');
      Users.currentUserId = 'user-optom';
      return true;
    }
    return false;
  }
  const u = Users.authenticate(username, password);
  if (!u) return false;
  sessionStorage.setItem(SESSION_KEY, u.id);
  Users.currentUserId = u.id;
  return true;

  if (route === 'dashboard' && window.matchMedia('(max-width: 820px)').matches) {

}
